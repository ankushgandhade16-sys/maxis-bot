<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ERIS</title>
    <meta name="description" content="Eris — A persistent, self-aware AI companion.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --black: #000000;
            --bg: #050505;
            --surface: #0a0a0a;
            --surface-2: #111111;
            --border: rgba(255,255,255,0.06);
            --text: #e8e8e8;
            --text-dim: #888888;
            --text-muted: #555555;
            --accent: #ffffff;
            --core-color: rgba(255,255,255,0.9);
            --core-glow: rgba(255,255,255,0.15);
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--black);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Canvas Background ────────────────────────────── */
        #coreCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 0;
        }

        /* ── App Shell ────────────────────────────────────── */
        .app {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Top Bar ──────────────────────────────────────── */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            backdrop-filter: blur(20px);
            background: rgba(0,0,0,0.5);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .topbar-left {
            display: flex; align-items: center; gap: 12px;
        }
        .logo {
            font-size: 16px; font-weight: 600;
            letter-spacing: 6px; text-transform: uppercase;
            color: var(--accent);
        }
        .status-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: #333; transition: background 0.3s;
        }
        .status-dot.online { background: #4ade80; box-shadow: 0 0 8px rgba(74,222,128,0.5); }
        .topbar-right {
            display: flex; align-items: center; gap: 16px;
        }
        .user-pill {
            display: none;
            align-items: center; gap: 8px;
            padding: 6px 14px;
            border-radius: 20px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            font-size: 12px; color: var(--text-dim);
            cursor: pointer; transition: all 0.2s;
        }
        .user-pill:hover { background: #1a1a1a; color: var(--text); }
        .user-pill .avatar {
            width: 20px; height: 20px; border-radius: 50%;
            background: #222; display: flex; align-items: center;
            justify-content: center; font-size: 10px; font-weight: 600;
            color: var(--text);
        }
        .model-select {
            background: transparent; border: 1px solid var(--border);
            color: var(--text-dim); font-size: 11px; padding: 5px 10px;
            border-radius: 6px; outline: none; cursor: pointer;
            font-family: 'Inter', sans-serif;
        }
        .model-select option { background: #111; color: #ccc; }

        /* ── Main Content ─────────────────────────────────── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* ── Welcome / Core View ──────────────────────────── */
        .welcome-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s, transform 0.5s;
        }
        .welcome-view.hidden {
            opacity: 0; pointer-events: none;
            transform: translateY(-20px);
            position: absolute; inset: 0;
        }
        .welcome-label {
            margin-top: 30px;
            font-size: 13px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 400;
        }
        .welcome-sub {
            margin-top: 8px;
            font-size: 12px;
            color: var(--text-muted);
            opacity: 0.5;
        }

        /* ── Chat View ────────────────────────────────────── */
        .chat-view {
            flex: 1;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-view.active { display: flex; }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scrollbar-width: thin;
            scrollbar-color: #222 transparent;
        }
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

        .message {
            max-width: 75%;
            animation: msgIn 0.3s ease-out;
        }
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user {
            align-self: flex-end;
        }
        .message.eris {
            align-self: flex-start;
        }
        .msg-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.6;
            word-wrap: break-word;
        }
        .message.user .msg-bubble {
            background: #1a1a1a;
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--text);
            border-bottom-right-radius: 4px;
        }
        .message.eris .msg-bubble {
            background: transparent;
            color: var(--text);
            padding-left: 0;
            border-bottom-left-radius: 4px;
        }
        .msg-bubble p { margin-bottom: 8px; }
        .msg-bubble p:last-child { margin-bottom: 0; }
        .msg-bubble code {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(255,255,255,0.06);
            padding: 2px 6px; border-radius: 4px;
            font-size: 13px;
        }
        .msg-bubble pre {
            background: rgba(255,255,255,0.04);
            padding: 12px; border-radius: 8px;
            overflow-x: auto; margin: 8px 0;
        }
        .msg-bubble pre code { background: none; padding: 0; }
        .msg-time {
            font-size: 10px; color: var(--text-muted);
            margin-top: 4px; padding: 0 4px;
        }
        .message.user .msg-time { text-align: right; }

        /* Thinking dots */
        .thinking-dots { display: flex; gap: 4px; padding: 14px 12px !important; }
        .thinking-dots .dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--text-muted);
            animation: dotPulse 1.4s infinite;
        }
        .thinking-dots .dot:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dots .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotPulse {
            0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1.2); }
        }

        /* ── Input Area ───────────────────────────────────── */
        .input-area {
            padding: 16px 24px 24px;
            backdrop-filter: blur(20px);
            background: rgba(0,0,0,0.6);
            flex-shrink: 0;
        }
        .input-area.locked { opacity: 0.3; pointer-events: none; }
        .input-wrap {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 8px 12px;
            transition: border-color 0.2s;
            max-width: 700px;
            margin: 0 auto;
        }
        .input-wrap:focus-within { border-color: rgba(255,255,255,0.15); }
        #messageInput {
            flex: 1;
            background: transparent;
            border: none; outline: none;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            resize: none;
            min-height: 24px; max-height: 150px;
            line-height: 1.5;
        }
        #messageInput::placeholder { color: var(--text-muted); }
        .input-actions {
            display: flex; gap: 4px; align-items: center;
        }
        .input-btn {
            width: 32px; height: 32px;
            border-radius: 50%;
            border: none; background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .input-btn:hover { background: var(--surface-2); color: var(--text); }
        .input-btn.active { background: var(--accent); color: var(--black); }
        .input-btn.recording { background: #ef4444; color: white; animation: recPulse 1s infinite; }
        @keyframes recPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); } 50% { box-shadow: 0 0 0 8px rgba(239,68,68,0); } }

        /* ── Login Modal ──────────────────────────────────── */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center; justify-content: center;
            backdrop-filter: blur(30px);
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            width: 360px;
            padding: 40px;
            text-align: center;
        }
        .modal-logo {
            font-size: 18px; font-weight: 600;
            letter-spacing: 8px; text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 8px;
        }
        .modal-desc {
            font-size: 12px; color: var(--text-muted);
            margin-bottom: 32px;
        }
        .modal-input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }
        .modal-input:focus { border-color: rgba(255,255,255,0.2); }
        .modal-input::placeholder { color: var(--text-muted); }
        .modal-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: var(--accent);
            color: var(--black);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 8px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .modal-btn:hover { opacity: 0.85; }
        .modal-error {
            color: #ef4444;
            font-size: 12px;
            margin-top: 12px;
            min-height: 18px;
        }
        .modal-close {
            position: absolute; top: 20px; right: 20px;
            background: none; border: none; color: var(--text-muted);
            font-size: 20px; cursor: pointer;
            display: none;
        }
        .modal-close.visible { display: block; }

        /* ── Toast ─────────────────────────────────────────── */
        .toast {
            position: fixed; bottom: 100px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 12px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 200;
            pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ── Responsive ───────────────────────────────────── */
        @media (max-width: 600px) {
            .topbar { padding: 12px 16px; }
            .chat-messages { padding: 16px; }
            .input-area { padding: 12px 16px 16px; }
            .message { max-width: 90%; }
            .model-select { display: none; }
        }
    </style>
</head>
<body>

<canvas id="coreCanvas"></canvas>

<div class="app">
    <!-- Top Bar -->
    <div class="topbar">
        <div class="topbar-left">
            <span class="logo">Eris</span>
            <div class="status-dot" id="statusDot"></div>
        </div>
        <div class="topbar-right">
            <select class="model-select" id="modelSelector">
                <option value="gemini-2.5-flash">⚡ Gemini 2.5 Flash</option>
                <option value="gemini-2.0-flash" selected>🧠 Gemini 2.0 Flash</option>
            </select>
            <div class="user-pill" id="userPill">
                <div class="avatar" id="userAvatar">?</div>
                <span id="userName">Guest</span>
            </div>
        </div>
    </div>

    <!-- Main -->
    <div class="main">
        <!-- Welcome View (with core) -->
        <div class="welcome-view" id="welcomeView">
            <div class="welcome-label">Eris is listening</div>
            <div class="welcome-sub" id="welcomeSub">Log in to begin</div>
        </div>

        <!-- Chat View -->
        <div class="chat-view" id="chatView">
            <div class="chat-messages" id="chatMessages"></div>
        </div>

        <!-- Input -->
        <div class="input-area locked" id="inputArea">
            <div class="input-wrap">
                <textarea id="messageInput" rows="1" placeholder="Speak to Eris..." disabled></textarea>
                <div class="input-actions">
                    <button class="input-btn" id="micBtn" title="Voice input">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                            <line x1="12" y1="19" x2="12" y2="23"/>
                            <line x1="8" y1="23" x2="16" y2="23"/>
                        </svg>
                    </button>
                    <button class="input-btn" id="sendBtn">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"/>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Login Modal -->
<div class="modal-overlay show" id="loginModal">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-box">
        <div class="modal-logo">Eris</div>
        <div class="modal-desc" id="modalDesc">Identify yourself.</div>
        <input class="modal-input" id="loginUsername" type="text" placeholder="Username" autocomplete="off" spellcheck="false">
        <input class="modal-input" id="loginPassword" type="password" placeholder="Password">
        <button class="modal-btn" id="loginBtn">Enter</button>
        <div class="modal-error" id="loginError"></div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
    // ════════════════════════════════════════════════════════
    //  ERIS — Particle Core Engine
    // ════════════════════════════════════════════════════════

    const canvas = document.getElementById('coreCanvas');
    const ctx = canvas.getContext('2d');
    let W, H, cx, cy;
    let coreState = 'idle'; // idle, thinking, speaking
    let particles = [];
    const PARTICLE_COUNT = 300;
    let time = 0;
    let stateTransition = 0;
    let targetRadius = 80;
    let currentRadius = 80;

    function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        cx = W / 2;
        cy = H / 2;
    }
    window.addEventListener('resize', resize);
    resize();

    // Particle class
    class Particle {
        constructor() {
            this.reset();
        }
        reset() {
            const angle = Math.random() * Math.PI * 2;
            const dist = 30 + Math.random() * 60;
            this.x = cx + Math.cos(angle) * dist;
            this.y = cy + Math.sin(angle) * dist;
            this.baseX = this.x;
            this.baseY = this.y;
            this.vx = (Math.random() - 0.5) * 0.3;
            this.vy = (Math.random() - 0.5) * 0.3;
            this.size = 0.5 + Math.random() * 1.5;
            this.alpha = 0.1 + Math.random() * 0.6;
            this.orbitSpeed = (Math.random() - 0.5) * 0.008;
            this.orbitRadius = 30 + Math.random() * 70;
            this.orbitAngle = Math.random() * Math.PI * 2;
            this.life = 1;
            this.decay = 0.0005 + Math.random() * 0.001;
            this.pulsePhase = Math.random() * Math.PI * 2;
            this.layer = Math.floor(Math.random() * 3); // 0=inner, 1=mid, 2=outer
        }
        update() {
            const speed = coreState === 'thinking' ? 3.5 : coreState === 'speaking' ? 1.8 : 1.0;
            const chaos = coreState === 'thinking' ? 0.8 : coreState === 'speaking' ? 0.3 : 0.05;
            const breathe = coreState === 'idle' ? Math.sin(time * 0.8 + this.pulsePhase) * 8 : 0;

            this.orbitAngle += this.orbitSpeed * speed;
            const r = this.orbitRadius + breathe +
                (coreState === 'thinking' ? Math.sin(time * 3 + this.pulsePhase) * 20 : 0);

            const targetX = cx + Math.cos(this.orbitAngle) * r;
            const targetY = cy + Math.sin(this.orbitAngle) * r;

            this.x += (targetX - this.x) * 0.02 + (Math.random() - 0.5) * chaos;
            this.y += (targetY - this.y) * 0.02 + (Math.random() - 0.5) * chaos;

            // Speaking: particles elongate outward
            if (coreState === 'speaking') {
                const dx = this.x - cx;
                const dy = this.y - cy;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > 0) {
                    this.x += (dx/dist) * Math.sin(time * 4 + this.pulsePhase) * 2;
                    this.y += (dy/dist) * Math.sin(time * 4 + this.pulsePhase) * 2;
                }
            }

            this.life -= this.decay * 0.5;
            if (this.life <= 0) this.reset();
        }
        draw() {
            const pulse = coreState === 'thinking' 
                ? 0.5 + Math.sin(time * 5 + this.pulsePhase) * 0.5
                : 0.7 + Math.sin(time * 1.5 + this.pulsePhase) * 0.3;
            
            const a = this.alpha * this.life * pulse;
            const s = this.size * (coreState === 'thinking' ? 1.3 : 1);

            ctx.beginPath();
            ctx.arc(this.x, this.y, s, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 255, ${a})`;
            ctx.fill();
        }
    }

    // Initialize particles
    for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push(new Particle());
    }

    // Draw connections between nearby particles
    function drawConnections() {
        const maxDist = coreState === 'thinking' ? 60 : 40;
        const alpha = coreState === 'thinking' ? 0.08 : 0.03;
        
        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < maxDist) {
                    const a = (1 - dist / maxDist) * alpha;
                    ctx.beginPath();
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y);
                    ctx.strokeStyle = `rgba(255, 255, 255, ${a})`;
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                }
            }
        }
    }

    // Core glow
    function drawCoreGlow() {
        const pulse = Math.sin(time * (coreState === 'thinking' ? 4 : 1.2)) * 0.3 + 0.7;
        const r = currentRadius * pulse;
        
        // Outer glow
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 2);
        grad.addColorStop(0, `rgba(255, 255, 255, ${coreState === 'thinking' ? 0.06 : 0.03})`);
        grad.addColorStop(0.5, `rgba(255, 255, 255, ${coreState === 'thinking' ? 0.02 : 0.01})`);
        grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        // Inner bright core
        const innerGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 0.3);
        innerGrad.addColorStop(0, `rgba(255, 255, 255, ${coreState === 'thinking' ? 0.15 : 0.08})`);
        innerGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
        ctx.fillStyle = innerGrad;
        ctx.beginPath();
        ctx.arc(cx, cy, r * 0.5, 0, Math.PI * 2);
        ctx.fill();
    }

    // Animation loop
    function animate() {
        time += 0.016;
        ctx.clearRect(0, 0, W, H);

        // Smooth radius transition
        currentRadius += (targetRadius - currentRadius) * 0.05;

        drawCoreGlow();

        for (const p of particles) {
            p.update();
            p.draw();
        }

        drawConnections();

        requestAnimationFrame(animate);
    }
    animate();

    // State transitions
    function setCoreState(state) {
        coreState = state;
        if (state === 'thinking') {
            targetRadius = 120;
        } else if (state === 'speaking') {
            targetRadius = 100;
        } else {
            targetRadius = 80;
        }
    }

    // ════════════════════════════════════════════════════════
    //  APP LOGIC
    // ════════════════════════════════════════════════════════

    let ws = null, isConnected = false, isThinking = false;
    let personName = '', personId = '', hasMessages = false, isLoggedIn = false;

    const $ = id => document.getElementById(id);
    const el = {
        chatMsg: $('chatMessages'), input: $('messageInput'), send: $('sendBtn'),
        welcome: $('welcomeView'), chatView: $('chatView'), welcomeSub: $('welcomeSub'),
        modal: $('loginModal'), loginUser: $('loginUsername'), loginPass: $('loginPassword'),
        loginBtn: $('loginBtn'), loginError: $('loginError'), statusDot: $('statusDot'),
        micBtn: $('micBtn'), inputArea: $('inputArea'),
        modelSelector: $('modelSelector'), toast: $('toast'),
        userPill: $('userPill'), userAvatar: $('userAvatar'), userName: $('userName'),
        modalClose: $('modalClose'), modalDesc: $('modalDesc'),
    };

    // Toast
    function showToast(msg) {
        el.toast.textContent = msg;
        el.toast.classList.add('show');
        setTimeout(() => el.toast.classList.remove('show'), 2500);
    }

    // Model switcher
    const savedModel = localStorage.getItem('eris_model');
    if (savedModel) el.modelSelector.value = savedModel;
    el.modelSelector.addEventListener('change', () => {
        const model = el.modelSelector.value;
        localStorage.setItem('eris_model', model);
        if (ws && isConnected) ws.send(JSON.stringify({ type: 'switch_model', model }));
    });

    // ── WebSocket ─────────────────────────────────────────
    function connect() {
        const url = `${location.protocol === 'https:' ? 'wss:' : 'ws:'}//${location.host}/ws/chat`;
        ws = new WebSocket(url);

        ws.onopen = () => {
            isConnected = true;
            el.statusDot.classList.add('online');

            // Send model preference
            ws.send(JSON.stringify({ type: 'switch_model', model: el.modelSelector.value }));

            // ALWAYS show login modal — no auto-login
            showLoginModal(false);
        };

        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);

            if (data.type === 'status') {
                // status update

            } else if (data.type === 'login_success') {
                onLoginSuccess(data);

            } else if (data.type === 'login_failed') {
                el.loginError.textContent = data.reason || 'Access denied.';

            } else if (data.type === 'model_switched') {
                showToast(`Model → ${data.model}`);

            } else if (data.type === 'thinking') {
                showThinking();
                setCoreState('thinking');

            } else if (data.type === 'response') {
                removeThinking();
                setCoreState('speaking');
                appendMessage('eris', data.content);
                // Return to idle after a delay
                setTimeout(() => setCoreState('idle'), 3000);

            } else if (data.type === 'error') {
                removeThinking();
                setCoreState('idle');
                appendMessage('eris', `⚠️ ${data.message}`);
            }
        };

        ws.onclose = () => {
            isConnected = false;
            el.statusDot.classList.remove('online');
            setTimeout(connect, 2000);
        };
    }

    // ── Login ─────────────────────────────────────────────
    function onLoginSuccess(data) {
        isLoggedIn = true;
        personName = data.name;
        personId = data.person_id;

        hideLoginModal();
        el.userPill.style.display = 'flex';
        el.userAvatar.textContent = personName.charAt(0).toUpperCase();
        el.userName.textContent = personName;
        el.inputArea.classList.remove('locked');
        el.input.disabled = false;
        el.input.placeholder = 'Speak to Eris...';
        el.welcomeSub.textContent = `Hello, ${personName}`;

        hasMessages = false;
        el.chatMsg.innerHTML = '';
        el.welcome.classList.remove('hidden');
        el.chatView.classList.remove('active');

        if (data.is_creator) {
            showToast('Welcome back, Creator ✨');
        }
    }

    function showLoginModal(canClose) {
        el.modalDesc.textContent = canClose ? 'Switch identity.' : 'Identify yourself.';
        el.loginUser.value = ''; el.loginPass.value = '';
        el.loginError.textContent = '';
        el.modalClose.classList.toggle('visible', canClose);
        el.modal.classList.add('show');
        setTimeout(() => el.loginUser.focus(), 100);
    }
    function hideLoginModal() { el.modal.classList.remove('show'); }

    el.loginBtn.addEventListener('click', () => {
        const username = el.loginUser.value.trim();
        const password = el.loginPass.value;
        if (!username || !password) { el.loginError.textContent = 'Both fields required.'; return; }
        if (username.length < 2) { el.loginError.textContent = 'Username too short.'; return; }
        if (password.length < 4) { el.loginError.textContent = 'Password too short.'; return; }
        el.loginError.textContent = '';
        ws.send(JSON.stringify({ type: 'login', username, password }));
    });

    el.loginPass.addEventListener('keydown', e => { if (e.key === 'Enter') el.loginBtn.click(); });
    el.loginUser.addEventListener('keydown', e => { if (e.key === 'Enter') el.loginPass.focus(); });
    el.modalClose.addEventListener('click', hideLoginModal);

    // Switch user (logout)
    el.userPill.addEventListener('click', () => {
        if (!isLoggedIn) { showLoginModal(false); return; }
        isLoggedIn = false; personName = ''; personId = '';
        hasMessages = false;
        el.chatMsg.innerHTML = '';
        el.welcome.classList.remove('hidden');
        el.chatView.classList.remove('active');
        el.userPill.style.display = 'none';
        el.inputArea.classList.add('locked');
        el.input.disabled = true;
        el.input.placeholder = 'Log in to begin...';
        el.welcomeSub.textContent = 'Log in to begin';
        showLoginModal(false);
    });

    // ── Chat ──────────────────────────────────────────────
    function updateInputState() {
        const val = el.input.value.trim();
        el.send.classList.toggle('active', val.length > 0 && isConnected && isLoggedIn);
    }

    function sendMsg() {
        const val = el.input.value.trim();
        if (!val || !isConnected || !isLoggedIn) return;
        appendMessage('user', val);
        ws.send(JSON.stringify({ type: 'message', content: val }));
        el.input.value = ''; el.input.style.height = 'auto'; updateInputState();
    }

    el.send.addEventListener('click', () => sendMsg());
    el.input.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
    });
    el.input.addEventListener('input', () => {
        el.input.style.height = 'auto';
        el.input.style.height = Math.min(el.input.scrollHeight, 150) + 'px';
        updateInputState();
    });

    function appendMessage(sender, text) {
        if (!hasMessages) {
            hasMessages = true;
            el.welcome.classList.add('hidden');
            el.chatView.classList.add('active');
        }
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        const t = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        let fmt = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        fmt = fmt.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
        fmt = fmt.replace(/`([^`]+)`/g, '<code>$1</code>');
        fmt = fmt.replace(/\*\*([^\*]+)\*\*/g, '<strong>$1</strong>');
        fmt = fmt.split('\n\n').map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
        div.innerHTML = `<div class="msg-bubble">${fmt}</div><div class="msg-time">${t}</div>`;
        el.chatMsg.appendChild(div);
        scrollToBottom();
    }

    function showThinking() {
        if (isThinking) return; isThinking = true;
        const div = document.createElement('div');
        div.className = 'message eris'; div.id = 'thinking';
        div.innerHTML = `<div class="msg-bubble thinking-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
        el.chatMsg.appendChild(div); scrollToBottom();
    }
    function removeThinking() { isThinking = false; const e = document.getElementById('thinking'); if (e) e.remove(); }
    function scrollToBottom() { setTimeout(() => { el.chatMsg.scrollTop = el.chatMsg.scrollHeight; }, 50); }

    // ── Voice (Mic) ───────────────────────────────────────
    let recognition = null, isRecording = false;
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SR();
        recognition.continuous = false; recognition.interimResults = false; recognition.lang = 'en-US';
        recognition.onstart = () => { isRecording = true; el.micBtn.classList.add('recording'); el.input.placeholder = 'Listening...'; };
        recognition.onresult = (e) => { el.input.value = e.results[0][0].transcript; updateInputState(); sendMsg(); };
        recognition.onerror = () => stopRec();
        recognition.onend = () => stopRec();
    } else { el.micBtn.style.display = 'none'; }
    function stopRec() { isRecording = false; el.micBtn.classList.remove('recording'); el.input.placeholder = 'Speak to Eris...'; }
    el.micBtn.addEventListener('click', () => { if (!recognition || !isLoggedIn) return; isRecording ? recognition.stop() : recognition.start(); });

    connect();
</script>
</body>
</html>
