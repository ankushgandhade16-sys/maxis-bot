<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ERIS — TON 618</title>
    <meta name="description" content="Eris — A persistent, self-aware AI entity orbiting the event horizon.">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.5/dist/purify.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&family=Outfit:wght@200;300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --void: #000000;
            --deep: #030308;
            --surface: rgba(8,4,16,0.85);
            --surface-2: rgba(15,8,30,0.9);
            --surface-3: rgba(25,15,50,0.8);
            --border: rgba(255,120,50,0.08);
            --border-l: rgba(255,120,50,0.12);
            --text: #e0dce8;
            --text-dim: #7a7590;
            --text-muted: #44405a;
            --accent-warm: #FF6B00;
            --accent-gold: #FFB800;
            --accent-violet: #8B5CF6;
            --accent-blue: #3B82F6;
            --hawking: #A5B4FC;
            --danger: #EF4444;
        }
        html, body { height: 100%; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--void);
            color: var(--text);
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Black Hole Canvas ───────────────────────────── */
        #blackholeCanvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 0;
        }

        /* ── Splash Screen ───────────────────────────────── */
        #splashScreen {
            position: fixed; inset: 0; z-index: 200;
            background: #000; display: flex;
            align-items: center; justify-content: center;
            flex-direction: column;
            transition: opacity 1s ease, visibility 1s ease;
        }
        #splashScreen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .splash-title {
            font-family: 'Outfit', sans-serif;
            font-size: 48px; font-weight: 200;
            letter-spacing: 28px; text-transform: uppercase;
            color: transparent;
            background: linear-gradient(135deg, #FF6B00, #FFB800, #8B5CF6, #3B82F6);
            background-clip: text; -webkit-background-clip: text;
            opacity: 0; animation: splashFadeIn 2s ease-out 0.5s forwards;
        }
        .splash-sub {
            font-family: 'Inter', sans-serif;
            font-size: 11px; letter-spacing: 6px;
            color: rgba(255,255,255,0.2);
            margin-top: 12px;
            opacity: 0; animation: splashFadeIn 1.5s ease-out 1.5s forwards;
        }
        @keyframes splashFadeIn { to { opacity: 1; } }

        /* ── Main Shell ──────────────────────────────────── */
        .shell {
            display: flex; height: 100dvh;
            position: relative; z-index: 1;
            opacity: 0; transition: opacity 0.8s ease;
        }
        .shell.visible { opacity: 1; }

        /* ── Gravity Drawer (Sidebar) ────────────────────── */
        .gravity-drawer {
            width: 280px; flex-shrink: 0;
            background: linear-gradient(180deg, rgba(5,2,15,0.95) 0%, rgba(10,5,20,0.92) 100%);
            border-right: 1px solid rgba(255,107,0,0.06);
            display: flex; flex-direction: column;
            backdrop-filter: blur(30px);
            transition: margin-left 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease;
            overflow: hidden;
        }
        .gravity-drawer.collapsed { margin-left: -280px; opacity: 0; pointer-events: none; }
        .drawer-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,107,0,0.06);
            display: flex; align-items: center; justify-content: space-between;
        }
        .drawer-logo {
            font-family: 'Outfit', sans-serif;
            font-size: 14px; font-weight: 300;
            letter-spacing: 8px; text-transform: uppercase;
            background: linear-gradient(90deg, #FF6B00, #FFB800);
            background-clip: text; -webkit-background-clip: text;
            color: transparent;
        }
        .new-chat-btn {
            background: rgba(255,107,0,0.08); border: 1px solid rgba(255,107,0,0.15);
            color: var(--accent-warm); font-size: 11px; padding: 6px 14px;
            border-radius: 20px; cursor: pointer; font-family: 'Inter', sans-serif;
            letter-spacing: 1px; transition: all 0.3s;
        }
        .new-chat-btn:hover { background: rgba(255,107,0,0.15); border-color: rgba(255,107,0,0.25); }

        /* Chat list — accretion bands */
        .chat-orbit {
            flex: 1; overflow-y: auto; padding: 10px 12px;
            scrollbar-width: thin; scrollbar-color: rgba(255,107,0,0.1) transparent;
        }
        .chat-orbit::-webkit-scrollbar { width: 2px; }
        .chat-orbit::-webkit-scrollbar-thumb { background: rgba(255,107,0,0.15); border-radius: 1px; }
        .orbit-item {
            padding: 12px 16px; border-radius: 10px;
            cursor: pointer; font-size: 13px; color: var(--text-dim);
            transition: all 0.25s; margin-bottom: 3px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            border-left: 2px solid transparent;
            position: relative;
        }
        .orbit-item::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
            background: linear-gradient(180deg, transparent, rgba(255,107,0,0.3), transparent);
            opacity: 0; transition: opacity 0.3s;
        }
        .orbit-item:hover { background: rgba(255,107,0,0.04); color: var(--text); }
        .orbit-item:hover::before { opacity: 1; }
        .orbit-item.active {
            background: rgba(255,107,0,0.06); color: var(--text);
            border-left-color: var(--accent-warm);
        }
        .orbit-item .chat-date { font-size: 10px; color: var(--text-muted); margin-top: 3px; }

        /* Creator Portal Button */
        .creator-portal-btn {
            display: none; margin: 10px 12px; padding: 12px;
            text-align: center; border-radius: 10px;
            cursor: pointer; font-size: 12px; letter-spacing: 2px;
            color: var(--accent-violet);
            border: 1px solid rgba(139,92,246,0.2);
            background: rgba(139,92,246,0.04);
            transition: all 0.3s;
        }
        .creator-portal-btn:hover { background: rgba(139,92,246,0.08); border-color: rgba(139,92,246,0.3); }

        /* User card */
        .drawer-footer {
            padding: 14px 16px;
            border-top: 1px solid rgba(255,107,0,0.06);
            position: relative;
        }
        .user-card {
            display: flex; align-items: center; gap: 10px;
            padding: 10px; border-radius: 10px; cursor: pointer;
            transition: background 0.2s;
        }
        .user-card:hover { background: rgba(255,107,0,0.04); }
        .user-avatar {
            width: 32px; height: 32px; border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,107,0,0.15), rgba(139,92,246,0.15));
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 600; color: var(--text);
            border: 1px solid rgba(255,107,0,0.15);
        }
        .user-info { flex: 1; }
        .user-name { font-size: 12px; color: var(--text); }
        .user-status { font-size: 10px; color: var(--text-muted); }

        /* User dropdown */
        .user-dropdown {
            position: absolute; bottom: 68px; left: 12px; right: 12px;
            background: var(--surface-2); border: 1px solid var(--border-l);
            border-radius: 10px; padding: 6px; display: none; z-index: 20;
            animation: dropIn 0.2s ease-out;
        }
        .user-dropdown.show { display: block; }
        @keyframes dropIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .dropdown-item {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 12px; border-radius: 6px; cursor: pointer;
            font-size: 12px; color: var(--text-dim);
            transition: all 0.15s; border: none; background: none;
            width: 100%; text-align: left; font-family: 'Inter', sans-serif;
        }
        .dropdown-item:hover { background: var(--surface-3); color: var(--text); }
        .dropdown-item.danger { color: #f87171; }
        .dropdown-item.danger:hover { background: rgba(248,113,113,0.08); }

        /* ── Main Panel ──────────────────────────────────── */
        .main-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

        /* ── Topbar ──────────────────────────────────────── */
        .topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 24px;
            background: rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,107,0,0.04);
            backdrop-filter: blur(20px);
            flex-shrink: 0;
        }
        .topbar-left { display: flex; align-items: center; gap: 14px; }
        .menu-btn {
            background: none; border: none;
            color: var(--text-dim); cursor: pointer; padding: 4px;
            transition: color 0.2s;
        }
        .menu-btn:hover { color: var(--accent-warm); }
        .status-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: #333; transition: all 0.4s;
        }
        .status-dot.online {
            background: var(--accent-warm);
            box-shadow: 0 0 8px rgba(255,107,0,0.5), 0 0 20px rgba(255,107,0,0.2);
        }
        .topbar-label {
            font-family: 'Outfit', sans-serif;
            font-size: 13px; color: var(--text-muted);
            letter-spacing: 4px; font-weight: 300;
        }
        .topbar-right { display: flex; align-items: center; gap: 12px; }
        .model-select {
            background: rgba(255,107,0,0.04); border: 1px solid rgba(255,107,0,0.1);
            color: var(--text-dim); font-size: 11px; padding: 5px 10px;
            border-radius: 20px; outline: none; cursor: pointer;
            font-family: 'Inter', sans-serif; transition: all 0.2s;
        }
        .model-select:hover { border-color: rgba(255,107,0,0.2); }
        .model-select option { background: #0a0510; color: #aaa; }

        /* ── Content ─────────────────────────────────────── */
        .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* ── Welcome (Black Hole center) ─────────────────── */
        .welcome-view {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: opacity 0.5s, transform 0.5s;
        }
        .welcome-view.hidden { opacity: 0; pointer-events: none; position: absolute; inset: 0; }
        .welcome-label {
            margin-top: 20px; font-family: 'Outfit', sans-serif;
            font-size: 12px; letter-spacing: 5px;
            text-transform: uppercase; color: var(--text-muted); font-weight: 300;
        }

        /* ── Chat ────────────────────────────────────────── */
        .chat-view { flex: 1; display: none; flex-direction: column; overflow: hidden; }
        .chat-view.active { display: flex; }
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 24px 28px;
            display: flex; flex-direction: column; gap: 20px;
            scrollbar-width: thin; scrollbar-color: rgba(255,107,0,0.08) transparent;
        }
        .chat-messages::-webkit-scrollbar { width: 2px; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,107,0,0.12); border-radius: 1px; }

        .message { max-width: 72%; animation: msgIn 0.4s ease-out; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { align-self: flex-end; }
        .message.eris { align-self: flex-start; }
        .msg-bubble {
            padding: 14px 18px; border-radius: 18px;
            font-size: 14px; line-height: 1.7; word-wrap: break-word;
        }
        .message.user .msg-bubble {
            background: linear-gradient(135deg, rgba(255,107,0,0.08), rgba(139,92,246,0.06));
            border: 1px solid rgba(255,107,0,0.1);
            color: var(--text); border-bottom-right-radius: 4px;
        }
        .message.eris .msg-bubble { background: transparent; color: var(--text); padding-left: 0; }
        .msg-bubble p { margin-bottom: 8px; }
        .msg-bubble p:last-child { margin-bottom: 0; }
        .msg-bubble code {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(255,107,0,0.06); padding: 2px 6px;
            border-radius: 4px; font-size: 13px;
            border: 1px solid rgba(255,107,0,0.05);
        }
        .msg-bubble pre {
            background: rgba(5,2,15,0.6); padding: 14px;
            border-radius: 10px; overflow-x: auto; margin: 10px 0;
            border: 1px solid rgba(255,107,0,0.05);
        }
        .msg-bubble pre code { background: none; padding: 0; border: none; }
        .msg-bubble strong { color: var(--accent-gold); }
        .msg-time { font-size: 10px; color: var(--text-muted); margin-top: 4px; padding: 0 4px; }
        .message.user .msg-time { text-align: right; }

        .thinking-dots { display: flex; gap: 6px; padding: 14px 8px !important; }
        .thinking-dots .dot {
            width: 5px; height: 5px; border-radius: 50%;
            background: var(--accent-warm); animation: dotPulse 1.4s infinite;
        }
        .thinking-dots .dot:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dots .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotPulse { 0%,80%,100%{opacity:.2;transform:scale(.7)}40%{opacity:1;transform:scale(1.3)} }

        /* ── Input Area ──────────────────────────────────── */
        .input-area {
            padding: 14px 28px 22px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(20px);
            flex-shrink: 0;
        }
        .input-area.locked { opacity: 0.3; pointer-events: none; }
        .input-wrap {
            display: flex; align-items: flex-end; gap: 8px;
            background: rgba(10,5,20,0.7);
            border: 1px solid rgba(255,107,0,0.08);
            border-radius: 16px; padding: 10px 14px;
            transition: border-color 0.3s, box-shadow 0.3s;
            max-width: 720px; margin: 0 auto;
        }
        .input-wrap:focus-within {
            border-color: rgba(255,107,0,0.2);
            box-shadow: 0 0 20px rgba(255,107,0,0.03);
        }
        #messageInput {
            flex: 1; background: transparent; border: none; outline: none;
            color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px;
            resize: none; min-height: 22px; max-height: 150px; line-height: 1.5;
        }
        #messageInput::placeholder { color: var(--text-muted); }
        .input-btn {
            width: 32px; height: 32px; border-radius: 50%;
            border: none; background: transparent; color: var(--text-muted);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.3s;
        }
        .input-btn:hover { background: rgba(255,107,0,0.08); color: var(--accent-warm); }
        .input-btn.active { background: var(--accent-warm); color: #000; }
        .input-btn.recording { background: var(--danger); color: #fff; animation: recPulse 1s infinite; }
        @keyframes recPulse { 0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}50%{box-shadow:0 0 0 8px rgba(239,68,68,0)} }

        /* ── Login Modal ─────────────────────────────────── */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 150;
            background: rgba(0,0,0,0.95); display: none;
            align-items: center; justify-content: center;
            backdrop-filter: blur(40px);
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            width: 380px; padding: 44px;
            text-align: center; position: relative;
        }
        .modal-logo {
            font-family: 'Outfit', sans-serif;
            font-size: 28px; font-weight: 200; letter-spacing: 14px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #FF6B00, #FFB800, #8B5CF6);
            background-clip: text; -webkit-background-clip: text;
            color: transparent; margin-bottom: 6px;
        }
        .modal-sub {
            font-size: 10px; color: var(--text-muted);
            margin-bottom: 32px; letter-spacing: 3px;
            font-family: 'Inter', sans-serif;
        }
        .auth-tabs {
            display: flex; gap: 0; margin-bottom: 24px;
            border: 1px solid rgba(255,107,0,0.1); border-radius: 10px; overflow: hidden;
        }
        .auth-tab {
            flex: 1; padding: 11px; background: transparent;
            border: none; color: var(--text-muted); font-size: 11px;
            font-family: 'Inter', sans-serif; cursor: pointer;
            letter-spacing: 2px; text-transform: uppercase;
            transition: all 0.3s;
        }
        .auth-tab.active { background: rgba(255,107,0,0.06); color: var(--accent-warm); }
        .auth-tab:hover:not(.active) { color: var(--text-dim); }
        .modal-input {
            width: 100%; background: rgba(10,5,20,0.8);
            border: 1px solid rgba(255,107,0,0.08); border-radius: 10px;
            padding: 13px 16px; color: var(--text);
            font-family: 'Inter', sans-serif; font-size: 13px;
            outline: none; margin-bottom: 10px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .modal-input:focus {
            border-color: rgba(255,107,0,0.25);
            box-shadow: 0 0 15px rgba(255,107,0,0.05);
        }
        .modal-input::placeholder { color: var(--text-muted); }
        #confirmPasswordField { display: none; }
        .modal-btn {
            width: 100%; padding: 13px; border: none; border-radius: 10px;
            background: linear-gradient(135deg, #FF6B00, #E65100);
            color: #fff; font-family: 'Inter', sans-serif; font-size: 12px;
            font-weight: 600; cursor: pointer; transition: all 0.3s;
            margin-top: 8px; letter-spacing: 3px; text-transform: uppercase;
        }
        .modal-btn:hover { opacity: 0.9; box-shadow: 0 0 25px rgba(255,107,0,0.2); }
        .modal-error { color: var(--danger); font-size: 11px; margin-top: 10px; min-height: 16px; }
        .modal-close {
            position: absolute; top: 16px; right: 16px;
            background: none; border: none; color: var(--text-muted);
            font-size: 18px; cursor: pointer; display: none;
        }
        .modal-close.visible { display: block; }

        /* ── Creator View ────────────────────────────────── */
        .creator-view {
            display: none; flex: 1; flex-direction: column; overflow: hidden;
        }
        .creator-tabs {
            display: flex;
            border-bottom: 1px solid rgba(139,92,246,0.15);
            background: rgba(139,92,246,0.04);
        }
        .creator-tab {
            flex: 1; padding: 13px; background: transparent;
            border: none; font-size: 11px; font-weight: 600;
            letter-spacing: 2px; text-transform: uppercase;
            cursor: pointer; border-bottom: 2px solid transparent;
            font-family: 'Inter', sans-serif; transition: all 0.2s;
        }
        .creator-tab.active { color: var(--accent-violet); border-bottom-color: var(--accent-violet); }
        .creator-tab:not(.active) { color: rgba(139,92,246,0.4); }

        /* ── Toast ────────────────────────────────────────── */
        .toast {
            position: fixed; bottom: 100px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--surface-2); border: 1px solid var(--border-l);
            color: var(--text); padding: 10px 22px; border-radius: 24px;
            font-size: 12px; opacity: 0; transition: all 0.3s;
            z-index: 200; pointer-events: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ── Responsive ──────────────────────────────────── */
        @media (max-width: 768px) {
            .gravity-drawer {
                position: absolute; height: 100%; z-index: 100;
                margin-left: -280px; opacity: 0; pointer-events: none;
            }
            .gravity-drawer.open { margin-left: 0; opacity: 1; pointer-events: auto; }
            .mobile-close-btn { display: block !important; }
            .message { max-width: 92%; }
            .topbar { padding: 10px 14px; }
            .input-area { padding: 10px 14px 14px; padding-bottom: max(14px, env(safe-area-inset-bottom)); }
            .input-wrap { padding: 8px 12px; }
            #messageInput { font-size: 15px; }
            .msg-bubble { padding: 12px 16px; font-size: 14px; }
            .chat-messages { padding: 16px 14px; gap: 16px; }
            .modal-box { width: 90%; padding: 30px 22px; }
            .splash-title { font-size: 32px; letter-spacing: 18px; }
        }
        @media (max-width: 400px) {
            .model-select { font-size: 10px; padding: 3px 8px; }
        }
    </style>
</head>
<body>

<!-- Splash Screen -->
<div id="splashScreen">
    <div class="splash-title">ERIS</div>
    <div class="splash-sub">event horizon intelligence</div>
</div>

<!-- Black Hole Canvas -->
<canvas id="blackholeCanvas"></canvas>

<!-- Main Shell -->
<div class="shell" id="shell">
    <!-- Gravity Drawer (Sidebar) -->
    <div class="gravity-drawer" id="sidebar">
        <div class="drawer-header">
            <span class="drawer-logo">Eris</span>
            <button class="menu-btn mobile-close-btn" id="mobileCloseBtn" style="opacity:0;" title="Close">✕</button>
            <button class="new-chat-btn" id="newChatBtn">+ NEW</button>
        </div>
        <div class="chat-orbit" id="chatList"></div>
        <div class="creator-portal-btn" id="creatorPortalBtn">👁 Creator Portal</div>
        <div class="drawer-footer" style="position:relative;">
            <div class="user-dropdown" id="userDropdown">
                <button class="dropdown-item danger" id="signOutBtn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Sign Out
                </button>
                <button class="dropdown-item" id="cancelDropdownBtn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    Cancel
                </button>
            </div>
            <div class="user-card" id="userCard">
                <div class="user-avatar" id="sidebarAvatar">?</div>
                <div class="user-info">
                    <div class="user-name" id="sidebarName">Not signed in</div>
                    <div class="user-status" id="sidebarStatus">Click to sign in</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Panel -->
    <div class="main-panel" id="mainPanel">
        <div class="topbar">
            <div class="topbar-left">
                <button class="menu-btn" id="menuBtn">

<script>
// ════════════════════════════════════════════════════════════════
//  TON 618 — INTERACTIVE BLACK HOLE SIMULATION
// ════════════════════════════════════════════════════════════════

const bhCanvas = document.getElementById('blackholeCanvas');
const bhCtx = bhCanvas.getContext('2d');
let W, H, bhCx, bhCy;
let mouseX = 0, mouseY = 0, mouseNear = false;
let interactionFlare = 0;
let isThinkingState = false, isSpeakingState = false;

function bhResize() {
    W = bhCanvas.width = innerWidth;
    H = bhCanvas.height = innerHeight;
    const sidebar = document.getElementById('sidebar');
    const sW = (sidebar && !sidebar.classList.contains('collapsed') && innerWidth > 768) ? 280 : 0;
    bhCx = sW + (W - sW) / 2;
    bhCy = H / 2;
}
addEventListener('resize', bhResize); bhResize();
setInterval(bhResize, 500);

addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
addEventListener('click', () => { interactionFlare = Math.min(interactionFlare + 0.8, 2.0); });

// ── Starfield ────────────────────────────────────────────
const stars = [];
for (let i = 0; i < 300; i++) {
    stars.push({
        x: Math.random() * 3000 - 500,
        y: Math.random() * 2000 - 200,
        r: Math.random() * 1.2 + 0.2,
        a: Math.random() * 0.6 + 0.1,
        twinkle: Math.random() * Math.PI * 2
    });
}

function drawStars(t) {
    for (const s of stars) {
        const dx = s.x - bhCx, dy = s.y - bhCy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        // Gravitational lensing — stars near center get bent
        const lensR = 180;
        let sx = s.x, sy = s.y;
        if (dist < lensR * 3 && dist > lensR * 0.5) {
            const strength = Math.max(0, 1 - dist / (lensR * 3));
            const angle = Math.atan2(dy, dx);
            const bend = strength * 40;
            sx += Math.cos(angle + Math.PI / 2) * bend;
            sy += Math.sin(angle + Math.PI / 2) * bend;
        }
        // Hide stars behind event horizon
        if (dist < lensR * 0.7) continue;
        const tw = Math.sin(t * 2 + s.twinkle) * 0.3 + 0.7;
        bhCtx.beginPath();
        bhCtx.arc(sx, sy, s.r, 0, Math.PI * 2);
        bhCtx.fillStyle = `rgba(200,210,240,${s.a * tw})`;
        bhCtx.fill();
    }
}

// ── Accretion Disk Particles ──────────────────────────────
const diskParticles = [];
const DISK_COUNT = 2500;
for (let i = 0; i < DISK_COUNT; i++) {
    const angle = Math.random() * Math.PI * 2;
    const r = 60 + Math.random() * 260;
    const speed = (0.15 + Math.random() * 0.3) / Math.max(1, r * 0.008);
    diskParticles.push({
        angle, r, speed,
        baseR: r,
        wobble: Math.random() * Math.PI * 2,
        wobbleAmp: 1 + Math.random() * 6,
        size: 0.3 + Math.random() * 1.8,
        brightness: Math.random(),
        layer: Math.random() // for color variation
    });
}

function drawAccretionDisk(t) {
    const tiltY = 0.28; // Viewing angle tilt

    for (const p of diskParticles) {
        // Orbital speed varies with radius (Keplerian)
        let speedMul = 1.0;
        if (isThinkingState) speedMul = 2.5;
        else if (isSpeakingState) speedMul = 1.8;

        // Mouse interaction — particles near cursor accelerate
        p.angle += p.speed * speedMul * 0.016;
        p.angle %= Math.PI * 2;

        // Wobble for turbulence
        const wobble = Math.sin(t * 1.5 + p.wobble) * p.wobbleAmp;
        const currentR = p.r + wobble;

        // 3D position
        const x = Math.cos(p.angle) * currentR;
        const y = Math.sin(p.angle) * currentR * tiltY;
        const z = Math.sin(p.angle) * currentR; // depth for occlusion

        const sx = bhCx + x;
        const sy = bhCy + y;

        // Skip if behind black hole center
        if (Math.abs(x) < 50 && z < 0 && Math.abs(y) < 15) continue;

        // Color: inner ring is white-hot, middle is orange-gold, outer is violet-blue
        const normR = (p.r - 60) / 260;
        let hue, sat, light;
        if (normR < 0.2) {
            hue = 30 + p.layer * 20; sat = 90; light = 85 + p.brightness * 10;
        } else if (normR < 0.5) {
            hue = 25 + normR * 40; sat = 85; light = 65 + p.brightness * 20;
        } else if (normR < 0.75) {
            hue = 270 + p.layer * 30; sat = 70; light = 50 + p.brightness * 15;
        } else {
            hue = 220 + p.layer * 40; sat = 60; light = 35 + p.brightness * 15;
        }

        // Doppler effect — approaching side is brighter
        const doppler = 0.5 + Math.cos(p.angle) * 0.4;
        const flare = interactionFlare * (1 - normR) * 0.3;
        let alpha = (0.15 + p.brightness * 0.5 + flare) * doppler;
        // Depth fade for back-of-disk particles
        if (z < 0) alpha *= 0.3;

        const s = p.size * (0.8 + doppler * 0.4);

        bhCtx.beginPath();
        bhCtx.arc(sx, sy, s, 0, Math.PI * 2);
        bhCtx.fillStyle = `hsla(${hue},${sat}%,${light}%,${Math.min(1, alpha)})`;
        bhCtx.fill();
    }
}

// ── Event Horizon + Shadow ────────────────────────────────
function drawEventHorizon(t) {
    // Black hole shadow (pure black)
    const shadowR = 55;
    bhCtx.beginPath();
    bhCtx.arc(bhCx, bhCy, shadowR, 0, Math.PI * 2);
    bhCtx.fillStyle = '#000';
    bhCtx.fill();

    // Photon ring — bright ring right at the edge
    const ringR = shadowR + 3;
    const ringGrad = bhCtx.createRadialGradient(bhCx, bhCy, shadowR - 2, bhCx, bhCy, ringR + 15);
    ringGrad.addColorStop(0, 'rgba(0,0,0,1)');
    ringGrad.addColorStop(0.3, 'rgba(255,180,80,0.6)');
    ringGrad.addColorStop(0.5, 'rgba(255,140,50,0.3)');
    ringGrad.addColorStop(0.8, 'rgba(180,100,255,0.1)');
    ringGrad.addColorStop(1, 'transparent');
    bhCtx.beginPath();
    bhCtx.arc(bhCx, bhCy, ringR + 15, 0, Math.PI * 2);
    bhCtx.fillStyle = ringGrad;
    bhCtx.fill();

    // Inner shadow cleanup
    bhCtx.beginPath();
    bhCtx.arc(bhCx, bhCy, shadowR - 1, 0, Math.PI * 2);
    bhCtx.fillStyle = '#000';
    bhCtx.fill();
}

// ── Ambient Glow ──────────────────────────────────────────
function drawAmbientGlow(t) {
    const pulse = Math.sin(t * 0.5) * 0.1 + 0.9;
    const g = bhCtx.createRadialGradient(bhCx, bhCy, 30, bhCx, bhCy, 450 * pulse);
    g.addColorStop(0, 'rgba(255,107,0,0.03)');
    g.addColorStop(0.2, 'rgba(255,140,40,0.02)');
    g.addColorStop(0.5, 'rgba(139,92,246,0.01)');
    g.addColorStop(1, 'transparent');
    bhCtx.fillStyle = g;
    bhCtx.fillRect(0, 0, W, H);

    // Flare glow
    if (interactionFlare > 0.01) {
        const fg = bhCtx.createRadialGradient(bhCx, bhCy, 0, bhCx, bhCy, 200);
        fg.addColorStop(0, `rgba(255,200,100,${0.15 * interactionFlare})`);
        fg.addColorStop(0.5, `rgba(255,107,0,${0.05 * interactionFlare})`);
        fg.addColorStop(1, 'transparent');
        bhCtx.fillStyle = fg;
        bhCtx.fillRect(0, 0, W, H);
    }
}

// ── Main Render Loop ──────────────────────────────────────
let bhTime = 0;
function bhAnimate(now) {
    bhTime += 0.016;
    interactionFlare *= 0.96;

    // Mouse proximity to black hole
    const mdx = mouseX - bhCx, mdy = mouseY - bhCy;
    mouseNear = Math.sqrt(mdx * mdx + mdy * mdy) < 200;

    bhCtx.clearRect(0, 0, W, H);

    drawStars(bhTime);
    drawAmbientGlow(bhTime);
    drawAccretionDisk(bhTime);
    drawEventHorizon(bhTime);

    requestAnimationFrame(bhAnimate);
}
requestAnimationFrame(bhAnimate);

// ── Splash Screen Sequence ────────────────────────────────
setTimeout(() => {
    document.getElementById('splashScreen').classList.add('hidden');
    document.getElementById('shell').classList.add('visible');
}, 3200);

// ════════════════════════════════════════════════════════════════
//  APP LOGIC — Chat, Auth, WebSocket (All features preserved)
// ════════════════════════════════════════════════════════════════

let ws = null, isConnected = false, isThinking = false;
let personName = '', personId = '', hasMessages = false, isLoggedIn = false;
let isCreator = false;
let currentSessionId = null;
let chatSessions = [];
let authMode = 'signin';

const $ = id => document.getElementById(id);
const el = {
    chatMsg: $('chatMessages'), input: $('messageInput'), send: $('sendBtn'),
    welcome: $('welcomeView'), chatView: $('chatView'), welcomeLabel: $('welcomeLabel'),
    creatorView: $('creatorView'), creatorFeed: $('creatorFeed'), researchFeed: $('researchFeed'),
    creatorPortalBtn: $('creatorPortalBtn'), muteBtn: $('muteBtn'),
    modal: $('loginModal'), loginUser: $('loginUsername'), loginPass: $('loginPassword'),
    confirmPass: $('confirmPasswordField'),
    loginBtn: $('loginBtn'), loginError: $('loginError'), statusDot: $('statusDot'),
    micBtn: $('micBtn'), inputArea: $('inputArea'),
    modelSelector: $('modelSelector'), toast: $('toast'),
    sidebarAvatar: $('sidebarAvatar'), sidebarName: $('sidebarName'),
    sidebarStatus: $('sidebarStatus'), userCard: $('userCard'),
    modalClose: $('modalClose'), topbarLabel: $('topbarLabel'),
    sidebar: $('sidebar'), menuBtn: $('menuBtn'), mobileCloseBtn: $('mobileCloseBtn'),
    newChatBtn: $('newChatBtn'), chatList: $('chatList'),
    tabSignIn: $('tabSignIn'), tabSignUp: $('tabSignUp'),
    userDropdown: $('userDropdown'), signOutBtn: $('signOutBtn'),
    cancelDropdownBtn: $('cancelDropdownBtn'), mainPanel: $('mainPanel'),
};

function showToast(msg) { el.toast.textContent = msg; el.toast.classList.add('show'); setTimeout(() => el.toast.classList.remove('show'), 2500); }

// Auth tabs
el.tabSignIn.addEventListener('click', () => {
    authMode = 'signin';
    el.tabSignIn.classList.add('active'); el.tabSignUp.classList.remove('active');
    el.confirmPass.style.display = 'none'; el.loginBtn.textContent = 'Enter';
});
el.tabSignUp.addEventListener('click', () => {
    authMode = 'signup';
    el.tabSignUp.classList.add('active'); el.tabSignIn.classList.remove('active');
    el.confirmPass.style.display = 'block'; el.loginBtn.textContent = 'Create Account';
});

// Model switcher
const savedModel = localStorage.getItem('eris_model');
if (savedModel) {
    const validModels = [...el.modelSelector.options].map(o => o.value);
    if (validModels.includes(savedModel)) el.modelSelector.value = savedModel;
    else localStorage.removeItem('eris_model');
}
el.modelSelector.addEventListener('change', () => {
    const model = el.modelSelector.value;
    localStorage.setItem('eris_model', model);
    if (ws && isConnected) ws.send(JSON.stringify({ type: 'switch_model', model }));
});

// Sidebar toggle
function toggleSidebar() {
    const isMobile = window.innerWidth <= 768;
    if (isMobile) el.sidebar.classList.toggle('open');
    else {
        el.sidebar.classList.toggle('collapsed');
        localStorage.setItem('eris_sidebar', el.sidebar.classList.contains('collapsed') ? 'collapsed' : 'open');
    }
}
el.menuBtn.addEventListener('click', e => { e.stopPropagation(); toggleSidebar(); });
if (el.mobileCloseBtn) el.mobileCloseBtn.addEventListener('click', () => el.sidebar.classList.remove('open'));
el.mainPanel.addEventListener('click', () => { if (window.innerWidth <= 768 && el.sidebar.classList.contains('open')) el.sidebar.classList.remove('open'); });
if (localStorage.getItem('eris_sidebar') === 'collapsed' && window.innerWidth > 768) el.sidebar.classList.add('collapsed');

// Typing
el.input.addEventListener('input', () => {
    el.input.style.height = 'auto';
    el.input.style.height = Math.min(el.input.scrollHeight, 150) + 'px';
    updateInputState();
});

// WebSocket
function connect() {
    const url = `${location.protocol === 'https:' ? 'wss:' : 'ws:'}//${location.host}/ws/chat`;
    ws = new WebSocket(url);

    ws.onopen = () => {
        isConnected = true;
        el.statusDot.classList.add('online');
        ws.send(JSON.stringify({ type: 'switch_model', model: el.modelSelector.value }));
        const u = localStorage.getItem('eris_username');
        const p = localStorage.getItem('eris_password');
        if (u && p) ws.send(JSON.stringify({ type: 'login', username: u, password: p }));
        else showLoginModal(false);
    };

    ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.type === 'status') {}
        else if (data.type === 'login_success') onLoginSuccess(data);
        else if (data.type === 'login_failed') {
            el.loginError.textContent = data.reason || 'Access denied.';
            el.loginBtn.textContent = authMode === 'signup' ? 'Create Account' : 'Enter';
        }
        else if (data.type === 'model_switched') showToast(`Model → ${data.model}`);
        else if (data.type === 'thinking') { showThinking(); isThinkingState = true; }
        else if (data.type === 'response') {
            removeThinking(); isThinkingState = false; isSpeakingState = true;
            interactionFlare = 1.5;
            appendMessage('eris', data.content);
            if (data.audio_base64 && ttsEnabled) playBase64Audio(data.audio_base64);
            else speakText(data.content);
            setTimeout(() => { isSpeakingState = false; }, 3000);
        }
        else if (data.type === 'error') { removeThinking(); isThinkingState = false; appendMessage('eris', `⚠️ ${data.message}`); }
        else if (data.type === 'chat_history') { chatSessions = data.sessions || []; renderChatList(); }
        else if (data.type === 'chat_messages') loadChatMessages(data.messages || []);
        else if (data.type === 'creator_feed') {
            const isDaemon = data.username === '[Daemon]';
            const t = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
            const div = document.createElement('div');
            div.className = 'message eris'; div.style.maxWidth = '90%';
            let f = data.eris_response.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            const imgs = [];
            f = f.replace(/!\[IMAGE:(.+?)\]/g, (match, url) => { imgs.push(url); return `__IMG_${imgs.length-1}__`; });
            f = f.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" style="color:#FF6B00; text-decoration:underline;">$1</a>');
            f = f.replace(/__IMG_(\d+)__/g, (match, idx) => `<img src="${imgs[idx]}" style="max-height: 300px; border-radius: 8px; margin-top: 8px;">`);
            f = f.replace(/\n/g,'<br>');
            if (isDaemon) {
                div.innerHTML = `<div class="msg-time" style="text-align:left; color:var(--accent-violet);">${t} — Autonomous Research Cycle</div>
                    <div class="msg-bubble" style="border-left:2px solid var(--accent-violet); padding-left:12px;">${f}</div>`;
                el.researchFeed.appendChild(div);
                setTimeout(() => { el.researchFeed.scrollTop = el.researchFeed.scrollHeight; }, 50);
            } else {
                div.innerHTML = `<div class="msg-time" style="text-align:left; color:var(--accent-violet);">${t} — Interaction with ${data.username}</div>
                    <div class="msg-bubble" style="background:rgba(255,107,0,0.03); border:1px solid rgba(255,107,0,0.06); margin-bottom:8px;"><strong>${data.username}:</strong> ${data.user_message}</div>
                    <div class="msg-bubble" style="border-left:2px solid var(--accent-violet); padding-left:12px;"><strong>Eris:</strong> ${f}</div>`;
                el.creatorFeed.appendChild(div);
                setTimeout(() => { el.creatorFeed.scrollTop = el.creatorFeed.scrollHeight; }, 50);
            }
            if (isCreator && el.creatorView.style.display !== 'flex') showToast(`New ${isDaemon ? 'research' : 'activity from ' + data.username}`);
        }
    };

    ws.onclose = () => {
        isConnected = false; el.statusDot.classList.remove('online');
        setTimeout(connect, 2000);
    };
}

// Login
function onLoginSuccess(data) {
    const isReconnect = isLoggedIn;
    isLoggedIn = true; personName = data.name; personId = data.person_id;
    isCreator = data.is_creator || false;
    const u = el.loginUser.value.trim(), p = el.loginPass.value;
    if (u && p && document.getElementById('rememberMe').checked) {
        localStorage.setItem('eris_username', u);
        localStorage.setItem('eris_password', p);
    }
    hideLoginModal();
    el.sidebarAvatar.textContent = personName.charAt(0).toUpperCase();
    el.sidebarName.textContent = personName;
    el.sidebarStatus.textContent = isCreator ? 'Creator' : 'Online';
    el.inputArea.classList.remove('locked'); el.input.disabled = false;
    el.input.placeholder = 'Speak to Eris...';
    el.welcomeLabel.textContent = `Hello, ${personName}`;
    if (!isReconnect) {
        hasMessages = false; el.chatMsg.innerHTML = '';
        el.welcome.classList.remove('hidden'); el.chatView.classList.remove('active'); el.creatorView.style.display = 'none';
    } else if (currentSessionId && ws && isConnected) {
        ws.send(JSON.stringify({ type: 'load_chat', session_id: currentSessionId }));
    }
    if (isCreator) {
        el.creatorPortalBtn.style.display = 'block';
        if (!isReconnect) showToast('Welcome home, Creator ✨');
    } else el.creatorPortalBtn.style.display = 'none';
    if (ws && isConnected) ws.send(JSON.stringify({ type: 'list_chats' }));
}

function showLoginModal(canClose) {
    el.loginUser.value=''; el.loginPass.value=''; el.confirmPass.value='';
    el.loginError.textContent='';
    el.modalClose.classList.toggle('visible', canClose);
    el.modal.classList.add('show');
    setTimeout(() => el.loginUser.focus(), 100);
}
function hideLoginModal() { el.modal.classList.remove('show'); }

el.loginBtn.addEventListener('click', () => {
    const u = el.loginUser.value.trim(), p = el.loginPass.value;
    if (!u||!p) { el.loginError.textContent='Both fields required.'; return; }
    if (u.length<2) { el.loginError.textContent='Username too short.'; return; }
    if (p.length<4) { el.loginError.textContent='Password too short.'; return; }
    if (authMode==='signup' && p!==el.confirmPass.value) { el.loginError.textContent='Passwords do not match.'; return; }
    if (!ws || ws.readyState !== WebSocket.OPEN) { el.loginError.textContent='Server is waking up... Please wait.'; return; }
    el.loginError.textContent=''; el.loginBtn.textContent = 'Verifying...';
    ws.send(JSON.stringify({ type:'login', username:u, password:p }));
});
el.loginPass.addEventListener('keydown', e => { if(e.key==='Enter'){authMode==='signup'?el.confirmPass.focus():el.loginBtn.click();} });
el.confirmPass.addEventListener('keydown', e => { if(e.key==='Enter') el.loginBtn.click(); });
el.loginUser.addEventListener('keydown', e => { if(e.key==='Enter') el.loginPass.focus(); });
el.modalClose.addEventListener('click', hideLoginModal);

// User card → dropdown
el.userCard.addEventListener('click', () => { if (!isLoggedIn) { showLoginModal(false); return; } el.userDropdown.classList.toggle('show'); });
el.cancelDropdownBtn.addEventListener('click', () => el.userDropdown.classList.remove('show'));
el.signOutBtn.addEventListener('click', () => {
    el.userDropdown.classList.remove('show');
    localStorage.removeItem('eris_username'); localStorage.removeItem('eris_password');
    isLoggedIn=false; personName=''; personId=''; isCreator=false; hasMessages=false;
    el.chatMsg.innerHTML=''; el.welcome.classList.remove('hidden'); el.chatView.classList.remove('active'); el.creatorView.style.display = 'none';
    el.sidebarAvatar.textContent='?'; el.sidebarName.textContent='Not signed in';
    el.creatorPortalBtn.style.display = 'none';
    el.sidebarStatus.textContent='Click to sign in'; el.inputArea.classList.add('locked');
    el.input.disabled=true; el.welcomeLabel.textContent='awaiting presence';
    el.chatList.innerHTML=''; showLoginModal(false);
});
document.addEventListener('click', e => {
    if (!el.userDropdown.contains(e.target) && !el.userCard.contains(e.target)) el.userDropdown.classList.remove('show');
});

// Chat history
function renderChatList() {
    el.chatList.innerHTML='';
    for (const s of chatSessions) {
        const div = document.createElement('div');
        div.className = 'orbit-item' + (s.id === currentSessionId ? ' active' : '');
        div.textContent = s.title || 'New conversation';
        div.addEventListener('click', () => loadChat(s.id));
        el.chatList.appendChild(div);
    }
}
function loadChat(sid) {
    currentSessionId = sid; renderChatList();
    if (window.innerWidth <= 768) el.sidebar.classList.remove('open');
    el.creatorView.style.display = 'none';
    if (ws && isConnected) ws.send(JSON.stringify({type:'load_chat', session_id:sid}));
}
function loadChatMessages(msgs) {
    hasMessages = msgs.length > 0; el.chatMsg.innerHTML = '';
    if (hasMessages) { el.welcome.classList.add('hidden'); el.chatView.classList.add('active'); for (const m of msgs) appendMessage(m.role==='user'?'user':'eris', m.content, false); }
    else { el.welcome.classList.remove('hidden'); el.chatView.classList.remove('active'); }
}
el.newChatBtn.addEventListener('click', () => {
    currentSessionId=null; hasMessages=false; el.chatMsg.innerHTML='';
    el.welcome.classList.remove('hidden'); el.chatView.classList.remove('active'); el.creatorView.style.display = 'none'; renderChatList();
    if (ws && isConnected) ws.send(JSON.stringify({type:'new_chat'}));
});

// Creator Portal
el.creatorPortalBtn.addEventListener('click', () => {
    el.welcome.classList.add('hidden'); el.chatView.classList.remove('active');
    el.creatorView.style.display = 'flex';
    if (window.innerWidth <= 768) el.sidebar.classList.remove('open');
});
const t1 = $('tabLiveFeed'), t2 = $('tabResearchFeed');
t1.addEventListener('click', () => { el.creatorFeed.style.display = 'block'; el.researchFeed.style.display = 'none'; t1.classList.add('active'); t2.classList.remove('active'); });
t2.addEventListener('click', () => { el.creatorFeed.style.display = 'none'; el.researchFeed.style.display = 'block'; t2.classList.add('active'); t1.classList.remove('active'); });

// Image Attachment
let attachedImageBase64 = null;
$('attachBtn').addEventListener('click', () => { if(isLoggedIn) $('fileInput').click(); });
$('fileInput').addEventListener('change', function() {
    const file = this.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            attachedImageBase64 = e.target.result.split(',')[1];
            $('imagePreview').src = e.target.result;
            $('imagePreviewContainer').style.display = 'block';
            updateInputState();
        };
        reader.readAsDataURL(file);
    }
});
$('removeImageBtn').addEventListener('click', () => {
    attachedImageBase64 = null; $('fileInput').value = '';
    $('imagePreviewContainer').style.display = 'none'; updateInputState();
});

// Send
function updateInputState() { el.send.classList.toggle('active', (el.input.value.trim().length>0 || attachedImageBase64) && isConnected && isLoggedIn); }
function sendMsg(isVoice = false) {
    const v = el.input.value.trim(); if ((!v && !attachedImageBase64) || !isConnected || !isLoggedIn) return;
    let msgContent = v;
    if (attachedImageBase64) msgContent += `<br><img src="data:image/jpeg;base64,${attachedImageBase64}" style="max-height: 200px; border-radius: 6px; margin-top: 8px;">`;
    appendMessage('user', msgContent);
    const payload = {type:'message', content:v, is_voice:isVoice};
    if (attachedImageBase64) { payload.image_base64 = attachedImageBase64; $('removeImageBtn').click(); }
    ws.send(JSON.stringify(payload));
    el.input.value=''; el.input.style.height='auto'; updateInputState();
    interactionFlare = 1.0;
}
el.send.addEventListener('click', () => sendMsg(false));
el.input.addEventListener('keydown', e => { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(false); } });

function appendMessage(sender, text, anim=true) {
    if (!hasMessages) { hasMessages=true; el.welcome.classList.add('hidden'); el.chatView.classList.add('active'); }
    const div = document.createElement('div'); div.className = `message ${sender}`;
    if (!anim) div.style.animation = 'none';
    const t = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    let f = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    f = f.replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>');
    f = f.replace(/`([^`]+)`/g,'<code>$1</code>');
    f = f.replace(/\*\*([^\*]+)\*\*/g,'<strong>$1</strong>');
    const imgs = [];
    f = f.replace(/!\[IMAGE:(.+?)\]/g, (match, url) => { imgs.push(url); return `__IMG_${imgs.length-1}__`; });
    // Skill Renderer
    f = f.replace(/<skill\s+name="([^"]+)">([\s\S]+?)<\/skill>/gi, (match, name, code) => {
        const escapedCode = code.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        return `<div class="skill-container" style="border: 1px solid rgba(255,107,0,0.2); border-radius: 10px; overflow: hidden; margin-top: 15px; margin-bottom: 15px; background: rgba(0,0,0,0.5);">
            <div style="background: rgba(255,107,0,0.08); padding: 8px 14px; font-weight: bold; border-bottom: 1px solid rgba(255,107,0,0.15); color: var(--accent-warm); display: flex; justify-content: space-between; align-items: center;">
                <span>🛠️ ${name}</span>
                <button onclick="const iframe = this.parentElement.nextElementSibling; if(iframe.style.height === '500px') { iframe.style.height = '0px'; } else { iframe.style.height = '500px'; }" style="background: none; border: 1px solid var(--accent-warm); color: var(--accent-warm); border-radius: 4px; padding: 2px 8px; cursor: pointer; font-size: 0.8rem;">Toggle</button>
            </div>
            <iframe srcdoc="${escapedCode}" style="width: 100%; height: 500px; border: none; background: white; transition: height 0.3s ease;"></iframe>
        </div>`;
    });
    f = f.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" style="color:var(--accent-warm); text-decoration:underline;">$1</a>');
    f = f.replace(/__IMG_(\d+)__/g, (match, idx) => `<img src="${imgs[idx]}" style="max-height: 300px; border-radius: 8px; margin-top: 8px;">`);
    f = f.split('\n\n').map(p => `<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
    div.innerHTML = `<div class="msg-bubble">${f}</div><div class="msg-time">${t}</div>`;
    el.chatMsg.appendChild(div); scrollToBottom();
}
function showThinking() { if(isThinking)return; isThinking=true; const d=document.createElement('div'); d.className='message eris'; d.id='thinking'; d.innerHTML='<div class="msg-bubble thinking-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>'; el.chatMsg.appendChild(d); scrollToBottom(); }
function removeThinking() { isThinking=false; const e=$('thinking'); if(e)e.remove(); }
function scrollToBottom() { setTimeout(()=>{ el.chatMsg.scrollTop = el.chatMsg.scrollHeight; },50); }

// Voice Input
let mediaRecorder = null, audioChunks = [], isRecording = false;
if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    el.micBtn.addEventListener('click', async () => {
        if (!isLoggedIn) return;
        if (isRecording && mediaRecorder) { mediaRecorder.stop(); }
        else {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = () => {
                        const base64Audio = reader.result.split(',')[1];
                        appendMessage('user', '🎙️ (Audio snippet)');
                        ws.send(JSON.stringify({ type: 'message', content: '', audio_base64: base64Audio, is_voice: true }));
                    };
                    stream.getTracks().forEach(track => track.stop());
                    stopRec();
                };
                mediaRecorder.start(); isRecording = true;
                el.micBtn.classList.add('recording');
                el.input.placeholder = 'Recording... (Click mic to send)';
            } catch (err) { showToast("Microphone access denied."); }
        }
    });
} else el.micBtn.style.display = 'none';
function stopRec() { isRecording = false; el.micBtn.classList.remove('recording'); el.input.placeholder = 'Speak to Eris...'; }

// Voice Output (TTS)
let ttsEnabled = localStorage.getItem('eris_tts') !== 'off';
if (!ttsEnabled) el.muteBtn.style.color = 'var(--danger)';
el.muteBtn.addEventListener('click', () => {
    ttsEnabled = !ttsEnabled;
    localStorage.setItem('eris_tts', ttsEnabled ? 'on' : 'off');
    if (!ttsEnabled) { el.muteBtn.style.color = 'var(--danger)'; if (currentAudio) currentAudio.pause(); if ('speechSynthesis' in window) speechSynthesis.cancel(); }
    else el.muteBtn.style.color = 'var(--text-muted)';
});
function speakText(text) {
    if (!ttsEnabled || !('speechSynthesis' in window)) return;
    let clean = text.replace(/\*\*([^*]+)\*\*/g, '$1').replace(/\*([^*]+)\*/g, '$1').replace(/`[^`]+`/g, '').replace(/```[\s\S]*?```/g, '').replace(/[#>\-_]/g, '').trim();
    if (!clean) return;
    if (currentAudio) currentAudio.pause();
    speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(clean);
    utterance.rate = 1.0; utterance.pitch = 1.1; utterance.volume = 0.9;
    const voices = speechSynthesis.getVoices();
    const preferred = voices.find(v => v.name.includes('Female') || v.name.includes('Samantha') || v.name.includes('Google UK English Female') || v.name.includes('Zira'));
    if (preferred) utterance.voice = preferred;
    speechSynthesis.speak(utterance);
}
if ('speechSynthesis' in window) speechSynthesis.onvoiceschanged = () => {};
let currentAudio = null;
function playBase64Audio(base64) {
    if (currentAudio) currentAudio.pause();
    if ('speechSynthesis' in window) speechSynthesis.cancel();
    currentAudio = new Audio(`data:audio/mp3;base64,${base64}`);
    currentAudio.play().catch(e => console.error("Audio playback failed:", e));
}

connect();
</script>
</body>
</html>
