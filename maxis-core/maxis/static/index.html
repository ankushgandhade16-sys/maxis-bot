<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ERIS — TON 618</title>
    <meta name="description" content="Eris — Persistent intelligence at the event horizon.">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.5/dist/purify.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&family=Outfit:wght@100;200;300;400;600&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --void:#000;--text:#d8d4e4;--text-dim:#6e6880;--text-muted:#3a3550;
            --accent:#FF6B00;--gold:#FFB800;--violet:#8B5CF6;--blue:#3B82F6;
            --hawking:#c4ccff;--danger:#EF4444;
            --glass:rgba(5,3,15,0.55);--glass-border:rgba(255,120,50,0.07);
            --glass-hover:rgba(255,120,50,0.04);
        }
        html,body{height:100%;overflow:hidden}
        body{font-family:'Inter',sans-serif;background:#000;color:var(--text);-webkit-font-smoothing:antialiased}

        /* ═══ WebGL Canvas — full background ═══ */
        #bhCanvas{position:fixed;inset:0;z-index:0;width:100%;height:100%}

        /* ═══ Splash ═══ */
        #splash{
            position:fixed;inset:0;z-index:300;background:#000;
            display:flex;align-items:center;justify-content:center;flex-direction:column;
            transition:opacity 1.2s cubic-bezier(.4,0,.2,1),visibility 1.2s;
        }
        #splash.gone{opacity:0;visibility:hidden;pointer-events:none}
        .s-title{
            font-family:'Outfit',sans-serif;font-size:56px;font-weight:100;
            letter-spacing:32px;text-transform:uppercase;
            color:transparent;
            background:linear-gradient(135deg,#FF6B00 0%,#FFB800 30%,#fff 50%,#8B5CF6 70%,#3B82F6 100%);
            background-clip:text;-webkit-background-clip:text;
            opacity:0;animation:fadeUp 2.2s ease 0.4s forwards;
        }
        .s-sub{
            font-family:'Outfit',sans-serif;font-size:11px;letter-spacing:8px;
            color:rgba(255,255,255,0.15);margin-top:10px;font-weight:200;
            opacity:0;animation:fadeUp 1.6s ease 1.4s forwards;
        }
        @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

        /* ═══ Login — floats over the black hole ═══ */
        .login-overlay{
            position:fixed;inset:0;z-index:150;
            display:flex;align-items:center;justify-content:center;
            background:radial-gradient(ellipse at center,rgba(0,0,0,0.3) 0%,rgba(0,0,0,0.75) 100%);
            transition:opacity 0.6s;
        }
        .login-overlay.hidden{opacity:0;pointer-events:none;visibility:hidden}
        .login-card{
            width:340px;padding:44px 36px;text-align:center;
            background:rgba(5,3,15,0.7);backdrop-filter:blur(40px);
            border:1px solid rgba(255,107,0,0.08);border-radius:20px;
            box-shadow:0 0 80px rgba(255,107,0,0.04),0 0 200px rgba(139,92,246,0.02);
        }
        .lc-logo{
            font-family:'Outfit',sans-serif;font-size:32px;font-weight:100;
            letter-spacing:16px;text-transform:uppercase;
            background:linear-gradient(90deg,#FF6B00,#FFB800);
            background-clip:text;-webkit-background-clip:text;color:transparent;
        }
        .lc-sub{font-size:9px;color:rgba(255,255,255,0.2);letter-spacing:4px;margin-top:2px;margin-bottom:28px}
        .auth-tabs{display:flex;margin-bottom:20px;border:1px solid rgba(255,107,0,0.08);border-radius:10px;overflow:hidden}
        .auth-tab{
            flex:1;padding:10px;background:none;border:none;color:var(--text-muted);
            font-size:10px;font-family:'Inter',sans-serif;cursor:pointer;
            letter-spacing:2px;text-transform:uppercase;transition:all .25s;
        }
        .auth-tab.active{background:rgba(255,107,0,0.06);color:var(--accent)}
        .l-input{
            width:100%;background:rgba(0,0,0,0.4);border:1px solid rgba(255,107,0,0.06);
            border-radius:10px;padding:12px 14px;color:var(--text);
            font-family:'Inter',sans-serif;font-size:13px;outline:none;
            margin-bottom:8px;transition:border-color .3s;
        }
        .l-input:focus{border-color:rgba(255,107,0,0.2)}
        .l-input::placeholder{color:var(--text-muted)}
        #confirmPasswordField{display:none}
        .l-btn{
            width:100%;padding:12px;border:none;border-radius:10px;margin-top:8px;
            background:linear-gradient(135deg,#FF6B00,#E65100);color:#fff;
            font-family:'Inter',sans-serif;font-size:11px;font-weight:600;
            cursor:pointer;letter-spacing:3px;text-transform:uppercase;
            transition:all .3s;
        }
        .l-btn:hover{box-shadow:0 0 30px rgba(255,107,0,0.25)}
        .l-error{color:var(--danger);font-size:11px;margin-top:8px;min-height:16px}
        .l-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer;display:none}
        .l-close.visible{display:block}

        /* ═══ App Shell — completely new layout ═══ */
        .app{position:fixed;inset:0;z-index:10;display:none;flex-direction:column}
        .app.visible{display:flex}

        /* Top bar — minimal, floating */
        .hud{
            display:flex;align-items:center;justify-content:space-between;
            padding:16px 24px;flex-shrink:0;position:relative;z-index:20;
        }
        .hud-left{display:flex;align-items:center;gap:14px}
        .hud-toggle{
            background:none;border:none;color:var(--text-dim);cursor:pointer;
            padding:6px;border-radius:8px;transition:all .2s;
        }
        .hud-toggle:hover{background:var(--glass-hover);color:var(--accent)}
        .hud-dot{width:6px;height:6px;border-radius:50%;background:#333;transition:all .4s}
        .hud-dot.on{background:var(--accent);box-shadow:0 0 10px rgba(255,107,0,.5)}
        .hud-brand{
            font-family:'Outfit',sans-serif;font-size:14px;font-weight:200;
            letter-spacing:6px;color:var(--text-muted);
        }
        .hud-right{display:flex;align-items:center;gap:12px}
        .model-sel{
            background:rgba(255,107,0,0.03);border:1px solid rgba(255,107,0,0.08);
            color:var(--text-dim);font-size:10px;padding:5px 10px;border-radius:20px;
            outline:none;cursor:pointer;font-family:'Inter',sans-serif;
        }
        .model-sel option{background:#080412;color:#aaa}

        /* ═══ Center area — the "stage" ═══ */
        .stage{flex:1;display:flex;position:relative;overflow:hidden}

        /* Welcome — visible through the black hole */
        .welcome{
            position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
            z-index:5;pointer-events:none;transition:opacity .5s;
        }
        .welcome.gone{opacity:0}
        .welcome-text{
            font-family:'Outfit',sans-serif;font-size:13px;font-weight:200;
            letter-spacing:6px;text-transform:uppercase;color:rgba(255,255,255,0.15);
            text-shadow:0 0 30px rgba(255,107,0,0.1);
        }

        /* ═══ Chat Panel — floating translucent on the right ═══ */
        .chat-panel{
            position:absolute;top:0;right:0;bottom:0;
            width:min(520px,100%);display:none;flex-direction:column;
            background:linear-gradient(180deg,rgba(5,3,15,0.75) 0%,rgba(5,3,15,0.85) 100%);
            backdrop-filter:blur(30px);
            border-left:1px solid var(--glass-border);
            z-index:15;
        }
        .chat-panel.open{display:flex}
        .chat-feed{
            flex:1;overflow-y:auto;padding:20px 24px;
            display:flex;flex-direction:column;gap:18px;
            scrollbar-width:thin;scrollbar-color:rgba(255,107,0,.08) transparent;
        }
        .chat-feed::-webkit-scrollbar{width:2px}
        .chat-feed::-webkit-scrollbar-thumb{background:rgba(255,107,0,.1)}
        .message{max-width:88%;animation:msgIn .4s ease-out}
        @keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
        .message.user{align-self:flex-end}
        .message.eris{align-self:flex-start}
        .msg-bubble{padding:14px 18px;border-radius:16px;font-size:14px;line-height:1.7;word-wrap:break-word}
        .message.user .msg-bubble{
            background:linear-gradient(135deg,rgba(255,107,0,0.1),rgba(139,92,246,0.06));
            border:1px solid rgba(255,107,0,0.1);border-bottom-right-radius:4px;
        }
        .message.eris .msg-bubble{background:transparent;padding-left:0}
        .msg-bubble p{margin-bottom:8px}.msg-bubble p:last-child{margin-bottom:0}
        .msg-bubble code{font-family:'JetBrains Mono',monospace;background:rgba(255,107,0,.05);padding:2px 6px;border-radius:4px;font-size:13px}
        .msg-bubble pre{background:rgba(0,0,0,.4);padding:14px;border-radius:10px;overflow-x:auto;margin:10px 0;border:1px solid rgba(255,107,0,.04)}
        .msg-bubble pre code{background:none;padding:0}
        .msg-bubble strong{color:var(--gold)}
        .msg-time{font-size:10px;color:var(--text-muted);margin-top:3px;padding:0 4px}
        .message.user .msg-time{text-align:right}
        .thinking-dots{display:flex;gap:6px;padding:14px 8px!important}
        .thinking-dots .dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:dP 1.4s infinite}
        .thinking-dots .dot:nth-child(2){animation-delay:.2s}
        .thinking-dots .dot:nth-child(3){animation-delay:.4s}
        @keyframes dP{0%,80%,100%{opacity:.2;transform:scale(.7)}40%{opacity:1;transform:scale(1.3)}}

        /* ═══ Input — bottom center, floating ═══ */
        .input-dock{
            padding:12px 20px 18px;
            background:linear-gradient(0deg,rgba(5,3,15,0.8) 0%,rgba(5,3,15,0.4) 100%);
            backdrop-filter:blur(20px);
            border-top:1px solid var(--glass-border);flex-shrink:0;
        }
        .input-dock.locked{opacity:.3;pointer-events:none}
        .input-row{
            display:flex;align-items:flex-end;gap:8px;
            background:rgba(0,0,0,.4);border:1px solid rgba(255,107,0,.06);
            border-radius:16px;padding:10px 14px;max-width:680px;margin:0 auto;
            transition:border-color .3s,box-shadow .3s;
        }
        .input-row:focus-within{border-color:rgba(255,107,0,.15);box-shadow:0 0 20px rgba(255,107,0,.03)}
        #messageInput{
            flex:1;background:transparent;border:none;outline:none;color:var(--text);
            font-family:'Inter',sans-serif;font-size:14px;resize:none;min-height:22px;max-height:150px;line-height:1.5;
        }
        #messageInput::placeholder{color:var(--text-muted)}
        .ib{
            width:32px;height:32px;border-radius:50%;border:none;background:none;
            color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;
        }
        .ib:hover{background:rgba(255,107,0,.08);color:var(--accent)}
        .ib.active{background:var(--accent);color:#000}
        .ib.recording{background:var(--danger);color:#fff;animation:recP 1s infinite}
        @keyframes recP{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}50%{box-shadow:0 0 0 8px rgba(239,68,68,0)}}

        /* ═══ Drawer — slides from left, completely different style ═══ */
        .drawer-overlay{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.5);display:none}
        .drawer-overlay.show{display:block}
        .drawer{
            position:fixed;top:0;bottom:0;left:0;z-index:90;
            width:300px;
            background:linear-gradient(180deg,rgba(8,4,18,0.97) 0%,rgba(5,2,12,0.98) 100%);
            border-right:1px solid rgba(255,107,0,.06);
            transform:translateX(-100%);transition:transform .35s cubic-bezier(.4,0,.2,1);
            display:flex;flex-direction:column;
        }
        .drawer.open{transform:translateX(0)}
        .dr-header{padding:20px;border-bottom:1px solid rgba(255,107,0,.05);display:flex;align-items:center;justify-content:space-between}
        .dr-logo{font-family:'Outfit',sans-serif;font-size:14px;font-weight:200;letter-spacing:8px;background:linear-gradient(90deg,#FF6B00,#FFB800);background-clip:text;-webkit-background-clip:text;color:transparent}
        .dr-close{background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:16px;padding:4px 8px}
        .dr-new{
            margin:12px 16px;padding:10px;text-align:center;
            border:1px dashed rgba(255,107,0,.12);border-radius:10px;
            color:var(--accent);font-size:11px;letter-spacing:2px;cursor:pointer;
            transition:all .2s;
        }
        .dr-new:hover{background:rgba(255,107,0,.04);border-style:solid}
        .dr-list{flex:1;overflow-y:auto;padding:4px 10px;scrollbar-width:thin;scrollbar-color:rgba(255,107,0,.08) transparent}
        .dr-list::-webkit-scrollbar{width:2px}
        .dr-list::-webkit-scrollbar-thumb{background:rgba(255,107,0,.1)}
        .dr-item{
            padding:11px 14px;border-radius:8px;cursor:pointer;
            font-size:12px;color:var(--text-dim);transition:all .2s;
            margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
            border-left:2px solid transparent;
        }
        .dr-item:hover{background:rgba(255,107,0,.03);color:var(--text)}
        .dr-item.active{border-left-color:var(--accent);background:rgba(255,107,0,.05);color:var(--text)}
        .dr-portal{
            display:none;margin:8px 16px;padding:11px;text-align:center;
            border-radius:10px;cursor:pointer;font-size:11px;letter-spacing:2px;
            color:var(--violet);border:1px solid rgba(139,92,246,.15);
            background:rgba(139,92,246,.03);transition:all .2s;
        }
        .dr-portal:hover{background:rgba(139,92,246,.06)}
        .dr-footer{padding:14px 16px;border-top:1px solid rgba(255,107,0,.05);position:relative}
        .dr-user{display:flex;align-items:center;gap:10px;padding:8px;border-radius:8px;cursor:pointer;transition:background .2s}
        .dr-user:hover{background:rgba(255,107,0,.03)}
        .dr-avatar{
            width:30px;height:30px;border-radius:50%;
            background:linear-gradient(135deg,rgba(255,107,0,.12),rgba(139,92,246,.12));
            display:flex;align-items:center;justify-content:center;
            font-size:11px;font-weight:600;border:1px solid rgba(255,107,0,.1);
        }
        .dr-uname{font-size:12px;color:var(--text)}
        .dr-ustatus{font-size:10px;color:var(--text-muted)}
        .dr-dropdown{
            position:absolute;bottom:60px;left:12px;right:12px;
            background:rgba(15,8,25,.95);border:1px solid rgba(255,107,0,.1);
            border-radius:10px;padding:6px;display:none;z-index:20;
        }
        .dr-dropdown.show{display:block}
        .dd-item{
            display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:6px;
            cursor:pointer;font-size:12px;color:var(--text-dim);transition:all .15s;
            border:none;background:none;width:100%;text-align:left;font-family:'Inter',sans-serif;
        }
        .dd-item:hover{background:rgba(255,107,0,.04);color:var(--text)}
        .dd-item.danger{color:#f87171}
        .dd-item.danger:hover{background:rgba(248,113,113,.06)}

        /* ═══ Creator View ═══ */
        .creator-panel{
            position:absolute;inset:0;display:none;flex-direction:column;z-index:16;
            background:rgba(5,3,15,0.85);backdrop-filter:blur(30px);
        }
        .creator-panel.open{display:flex}
        .cr-tabs{display:flex;border-bottom:1px solid rgba(139,92,246,.12);background:rgba(139,92,246,.03)}
        .cr-tab{
            flex:1;padding:13px;background:none;border:none;font-size:10px;font-weight:600;
            letter-spacing:2px;text-transform:uppercase;cursor:pointer;
            border-bottom:2px solid transparent;font-family:'Inter',sans-serif;transition:all .2s;
        }
        .cr-tab.active{color:var(--violet);border-bottom-color:var(--violet)}
        .cr-tab:not(.active){color:rgba(139,92,246,.35)}

        /* ═══ Toast ═══ */
        .toast{
            position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);
            background:rgba(15,8,25,.9);border:1px solid rgba(255,107,0,.1);
            color:var(--text);padding:10px 24px;border-radius:24px;font-size:12px;
            opacity:0;transition:all .3s;z-index:200;pointer-events:none;backdrop-filter:blur(20px);
        }
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

        /* ═══ Responsive ═══ */
        @media(max-width:768px){
            .chat-panel{width:100%;border-left:none}
            .hud{padding:10px 14px}
            .input-dock{padding:8px 12px 12px;padding-bottom:max(12px,env(safe-area-inset-bottom))}
            .message{max-width:95%}
            .s-title{font-size:36px;letter-spacing:20px}
            .login-card{width:88%;padding:32px 24px}
        }
    </style>

    <!-- ═══ VERTEX SHADER ═══ -->
    <script id="vs" type="x-shader/x-vertex">
        attribute vec2 a_pos;
        void main(){ gl_Position = vec4(a_pos, 0.0, 1.0); }
    </script>

    <!-- ═══ FRAGMENT SHADER — Schwarzschild Black Hole ═══ -->
    <script id="fs" type="x-shader/x-fragment">
        precision highp float;
        uniform vec2 u_res;
        uniform float u_time;
        uniform vec2 u_mouse;
        uniform float u_interact;

        #define PI 3.14159265359
        #define BH_MASS 1.5
        #define STEPS 128
        #define STEP_SIZE 0.12

        // Hash for pseudo-random
        float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
        float noise(vec2 p){
            vec2 i=floor(p), f=fract(p);
            f=f*f*(3.0-2.0*f);
            return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);
        }
        float fbm(vec2 p){
            float v=0.0, a=0.5;
            for(int i=0;i<4;i++){ v+=a*noise(p); p*=2.0; a*=0.5; }
            return v;
        }

        // Background starfield
        vec3 starfield(vec3 dir){
            vec3 col = vec3(0.0);
            // Stars
            vec2 sp = vec2(atan(dir.z, dir.x), asin(dir.y));
            float s = hash(floor(sp * 80.0));
            if(s > 0.985){
                float brightness = pow(s - 0.985, 0.3) * 60.0;
                float twinkle = 0.7 + 0.3 * sin(u_time * 3.0 + s * 100.0);
                col += vec3(0.8, 0.85, 1.0) * brightness * twinkle;
            }
            // Nebula background
            float n = fbm(sp * 3.0 + u_time * 0.01);
            col += vec3(0.02, 0.005, 0.04) * n;
            return col;
        }

        // Accretion disk color (temperature-based)
        vec3 diskColor(float r, float angle){
            // Inner: white-hot, mid: orange/gold, outer: deep red/violet
            float normR = clamp((r - 2.8) / 8.0, 0.0, 1.0);

            vec3 inner = vec3(1.0, 0.95, 0.85);    // White-hot
            vec3 mid1  = vec3(1.0, 0.6, 0.1);       // Orange
            vec3 mid2  = vec3(0.9, 0.3, 0.05);      // Deep orange-red
            vec3 outer = vec3(0.3, 0.1, 0.4);        // Violet fade

            vec3 col;
            if(normR < 0.15) col = mix(inner, mid1, normR / 0.15);
            else if(normR < 0.45) col = mix(mid1, mid2, (normR - 0.15) / 0.3);
            else col = mix(mid2, outer, (normR - 0.45) / 0.55);

            // Turbulence
            float turb = fbm(vec2(angle * 3.0 + u_time * 0.3, r * 2.0)) * 0.4 + 0.6;
            col *= turb;

            // Brightness falloff with distance
            float brightness = 1.0 / (1.0 + normR * normR * 2.0);
            col *= brightness * 2.5;

            // Doppler beaming — approaching side is much brighter
            float doppler = 0.5 + 0.5 * sin(angle + PI * 0.3);
            doppler = pow(doppler, 0.6) * 1.5 + 0.3;
            col *= doppler;

            return col;
        }

        void main(){
            vec2 uv = (gl_FragCoord.xy - 0.5 * u_res) / min(u_res.x, u_res.y);

            // Camera setup — slight offset for dramatic framing
            vec3 ro = vec3(0.0, 3.0, -18.0);  // Camera position (above, looking at center)
            vec3 lookAt = vec3(0.0, 0.0, 0.0);

            vec3 fwd = normalize(lookAt - ro);
            vec3 right = normalize(cross(vec3(0,1,0), fwd));
            vec3 up = cross(fwd, right);

            float fov = 1.8;
            vec3 rd = normalize(fwd * fov + right * uv.x + up * uv.y);

            // ── Schwarzschild ray tracing ──
            vec3 pos = ro;
            vec3 vel = rd;
            vec3 col = vec3(0.0);
            float rs = 2.0 * BH_MASS; // Schwarzschild radius
            bool hitDisk = false;
            bool absorbed = false;

            for(int i = 0; i < STEPS; i++){
                float r = length(pos);

                // Absorbed by event horizon
                if(r < rs * 0.5){
                    absorbed = true;
                    break;
                }

                // Gravitational deflection (Schwarzschild approximation)
                vec3 toCenter = -pos;
                float r2 = dot(pos, pos);
                float force = 1.5 * rs / (r2 * sqrt(r2));
                vel += toCenter * force * STEP_SIZE;

                pos += vel * STEP_SIZE;

                // Check disk intersection (disk in y=0 plane, between r=2.8 and r=12)
                float prevY = pos.y - vel.y * STEP_SIZE;
                if(!hitDisk && prevY * pos.y < 0.0){
                    // Crossed the disk plane
                    float t = -prevY / (pos.y - prevY);
                    vec3 hitPos = pos - vel * STEP_SIZE * (1.0 - t);
                    float hitR = length(hitPos.xz);

                    if(hitR > rs * 1.4 && hitR < 12.0){
                        float angle = atan(hitPos.z, hitPos.x);
                        vec3 dCol = diskColor(hitR, angle);

                        // Gravitational redshift
                        float redshift = sqrt(1.0 - rs / hitR);
                        dCol *= redshift;

                        // Opacity based on thickness
                        float opacity = smoothstep(12.0, 4.0, hitR) * 0.9;
                        col += dCol * opacity;
                        hitDisk = true;
                    }
                }

                // Far enough — sample background
                if(r > 40.0){
                    col += starfield(normalize(vel)) * (hitDisk ? 0.2 : 1.0);
                    break;
                }
            }

            if(absorbed) col = vec3(0.0);

            // Photon ring glow — thin bright ring at ~1.5 rs
            float screenR = length(uv);
            float ringR = 0.17; // Approximate screen-space radius of photon ring
            float ringDist = abs(screenR - ringR);
            float ring = exp(-ringDist * ringDist * 8000.0) * 2.0;
            col += vec3(1.0, 0.7, 0.3) * ring;

            // Secondary ring
            float ring2R = 0.155;
            float ring2Dist = abs(screenR - ring2R);
            col += vec3(0.6, 0.3, 0.8) * exp(-ring2Dist * ring2Dist * 12000.0) * 0.8;

            // Bloom / glow around the center
            float glow = exp(-screenR * screenR * 8.0) * 0.08;
            col += vec3(1.0, 0.5, 0.15) * glow;

            // Outer atmospheric glow
            float outerGlow = exp(-screenR * 3.0) * 0.03;
            col += vec3(0.4, 0.2, 0.6) * outerGlow;

            // Interaction flare
            col += vec3(1.0, 0.6, 0.2) * u_interact * exp(-screenR * screenR * 15.0) * 0.3;

            // Tone mapping
            col = col / (1.0 + col);
            col = pow(col, vec3(0.85)); // Slight gamma

            gl_FragColor = vec4(col, 1.0);
        }
    </script>
</head>

<script>
// ════════════════════════════════════════════════════════════
//  WebGL — TON 618 Black Hole Renderer
// ════════════════════════════════════════════════════════════
const canvas = document.getElementById('bhCanvas');
const gl = canvas.getContext('webgl', { antialias: false, preserveDrawingBuffer: false });

function compileShader(src, type){
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
    return s;
}

const vs = compileShader(document.getElementById('vs').textContent, gl.VERTEX_SHADER);
const fs = compileShader(document.getElementById('fs').textContent, gl.FRAGMENT_SHADER);
const prog = gl.createProgram();
gl.attachShader(prog, vs); gl.attachShader(prog, fs);
gl.linkProgram(prog); gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const uRes = gl.getUniformLocation(prog, 'u_res');
const uTime = gl.getUniformLocation(prog, 'u_time');
const uMouse = gl.getUniformLocation(prog, 'u_mouse');
const uInteract = gl.getUniformLocation(prog, 'u_interact');

let interact = 0;
let mX = 0.5, mY = 0.5;

function resize(){
    const dpr = Math.min(window.devicePixelRatio, 1.5);  // Cap for perf
    canvas.width = innerWidth * dpr;
    canvas.height = innerHeight * dpr;
    canvas.style.width = innerWidth + 'px';
    canvas.style.height = innerHeight + 'px';
    gl.viewport(0, 0, canvas.width, canvas.height);
}
addEventListener('resize', resize); resize();

addEventListener('mousemove', e => { mX = e.clientX / innerWidth; mY = 1.0 - e.clientY / innerHeight; });
addEventListener('click', () => { interact = Math.min(interact + 0.6, 1.5); });

let t0 = performance.now();
function render(){
    const now = performance.now();
    const t = (now - t0) * 0.001;
    interact *= 0.97;
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uTime, t);
    gl.uniform2f(uMouse, mX, mY);
    gl.uniform1f(uInteract, interact);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
}
requestAnimationFrame(render);

// Splash
setTimeout(() => {
    document.getElementById('splash').classList.add('gone');
    document.getElementById('loginModal').style.display = 'flex';
}, 3000);

// ════════════════════════════════════════════════════════════
//  APP LOGIC
// ════════════════════════════════════════════════════════════
let ws=null,isConnected=false,isThinking=false;
let personName='',personId='',hasMessages=false,isLoggedIn=false,isCreator=false;
let currentSessionId=null,chatSessions=[],authMode='signin';

const $=id=>document.getElementById(id);
const el={
    chatMsg:$('chatMessages'),input:$('messageInput'),send:$('sendBtn'),
    welcome:$('welcomeView'),chatView:$('chatView'),welcomeLabel:$('welcomeLabel'),
    creatorView:$('creatorView'),creatorFeed:$('creatorFeed'),researchFeed:$('researchFeed'),
    creatorPortalBtn:$('creatorPortalBtn'),muteBtn:$('muteBtn'),
    modal:$('loginModal'),loginUser:$('loginUsername'),loginPass:$('loginPassword'),
    confirmPass:$('confirmPasswordField'),
    loginBtn:$('loginBtn'),loginError:$('loginError'),statusDot:$('statusDot'),
    micBtn:$('micBtn'),inputArea:$('inputArea'),
    modelSelector:$('modelSelector'),toast:$('toast'),
    sidebarAvatar:$('sidebarAvatar'),sidebarName:$('sidebarName'),
    sidebarStatus:$('sidebarStatus'),userCard:$('userCard'),
    modalClose:$('modalClose'),topbarLabel:$('topbarLabel'),
    menuBtn:$('menuBtn'),newChatBtn:$('newChatBtn'),chatList:$('chatList'),
    tabSignIn:$('tabSignIn'),tabSignUp:$('tabSignUp'),
    userDropdown:$('userDropdown'),signOutBtn:$('signOutBtn'),
    cancelDropdownBtn:$('cancelDropdownBtn'),
    app:$('app'),drawer:$('drawer'),drawerOverlay:$('drawerOverlay'),drawerClose:$('drawerClose'),
};

function showToast(msg){el.toast.textContent=msg;el.toast.classList.add('show');setTimeout(()=>el.toast.classList.remove('show'),2500)}

// Auth tabs
el.tabSignIn.addEventListener('click',()=>{authMode='signin';el.tabSignIn.classList.add('active');el.tabSignUp.classList.remove('active');el.confirmPass.style.display='none';el.loginBtn.textContent='Enter'});
el.tabSignUp.addEventListener('click',()=>{authMode='signup';el.tabSignUp.classList.add('active');el.tabSignIn.classList.remove('active');el.confirmPass.style.display='block';el.loginBtn.textContent='Create Account'});

// Model
const savedModel=localStorage.getItem('eris_model');
if(savedModel){const v=[...el.modelSelector.options].map(o=>o.value);if(v.includes(savedModel))el.modelSelector.value=savedModel;else localStorage.removeItem('eris_model')}
el.modelSelector.addEventListener('change',()=>{const m=el.modelSelector.value;localStorage.setItem('eris_model',m);if(ws&&isConnected)ws.send(JSON.stringify({type:'switch_model',model:m}))});

// Drawer
function openDrawer(){el.drawer.classList.add('open');el.drawerOverlay.classList.add('show')}
function closeDrawer(){el.drawer.classList.remove('open');el.drawerOverlay.classList.remove('show')}
el.menuBtn.addEventListener('click',openDrawer);
el.drawerClose.addEventListener('click',closeDrawer);
el.drawerOverlay.addEventListener('click',closeDrawer);

// Typing
el.input.addEventListener('input',()=>{el.input.style.height='auto';el.input.style.height=Math.min(el.input.scrollHeight,150)+'px';updateInputState()});

// WebSocket
function connect(){
    const url=`${location.protocol==='https:'?'wss:':'ws:'}//${location.host}/ws/chat`;
    ws=new WebSocket(url);
    ws.onopen=()=>{
        isConnected=true;el.statusDot.classList.add('on');
        ws.send(JSON.stringify({type:'switch_model',model:el.modelSelector.value}));
        const u=localStorage.getItem('eris_username'),p=localStorage.getItem('eris_password');
        if(u&&p)ws.send(JSON.stringify({type:'login',username:u,password:p}));
        else showLoginModal(false);
    };
    ws.onmessage=(e)=>{
        const data=JSON.parse(e.data);
        if(data.type==='status'){}
        else if(data.type==='login_success')onLoginSuccess(data);
        else if(data.type==='login_failed'){el.loginError.textContent=data.reason||'Access denied.';el.loginBtn.textContent=authMode==='signup'?'Create Account':'Enter'}
        else if(data.type==='model_switched')showToast(`Model → ${data.model}`);
        else if(data.type==='thinking'){showThinking();interact=1.0}
        else if(data.type==='response'){removeThinking();interact=1.5;appendMessage('eris',data.content);if(data.audio_base64&&ttsEnabled)playBase64Audio(data.audio_base64);else speakText(data.content)}
        else if(data.type==='error'){removeThinking();appendMessage('eris',`⚠️ ${data.message}`)}
        else if(data.type==='chat_history'){chatSessions=data.sessions||[];renderChatList()}
        else if(data.type==='chat_messages')loadChatMessages(data.messages||[]);
        else if(data.type==='creator_feed'){
            const isDaemon=data.username==='[Daemon]';
            const t=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
            const div=document.createElement('div');div.className='message eris';div.style.maxWidth='90%';
            let f=data.eris_response.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            const imgs=[];
            f=f.replace(/!\[IMAGE:(.+?)\]/g,(m,url)=>{imgs.push(url);return`__IMG_${imgs.length-1}__`});
            f=f.replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" style="color:var(--accent);text-decoration:underline">$1</a>');
            f=f.replace(/__IMG_(\d+)__/g,(m,i)=>`<img src="${imgs[i]}" style="max-height:300px;border-radius:8px;margin-top:8px">`);
            f=f.replace(/\n/g,'<br>');
            if(isDaemon){div.innerHTML=`<div class="msg-time" style="text-align:left;color:var(--violet)">${t} — Autonomous Research</div><div class="msg-bubble" style="border-left:2px solid var(--violet);padding-left:12px">${f}</div>`;el.researchFeed.appendChild(div);setTimeout(()=>{el.researchFeed.scrollTop=el.researchFeed.scrollHeight},50)}
            else{div.innerHTML=`<div class="msg-time" style="text-align:left;color:var(--violet)">${t} — ${data.username}</div><div class="msg-bubble" style="background:rgba(255,107,0,.03);border:1px solid rgba(255,107,0,.06);margin-bottom:8px"><strong>${data.username}:</strong> ${data.user_message}</div><div class="msg-bubble" style="border-left:2px solid var(--violet);padding-left:12px"><strong>Eris:</strong> ${f}</div>`;el.creatorFeed.appendChild(div);setTimeout(()=>{el.creatorFeed.scrollTop=el.creatorFeed.scrollHeight},50)}
            if(isCreator&&el.creatorView.style.display!=='flex')showToast(`New ${isDaemon?'research':'activity from '+data.username}`);
        }
    };
    ws.onclose=()=>{isConnected=false;el.statusDot.classList.remove('on');setTimeout(connect,2000)};
}

function onLoginSuccess(data){
    const isReconnect=isLoggedIn;isLoggedIn=true;personName=data.name;personId=data.person_id;isCreator=data.is_creator||false;
    const u=el.loginUser.value.trim(),p=el.loginPass.value;
    if(u&&p&&$('rememberMe').checked){localStorage.setItem('eris_username',u);localStorage.setItem('eris_password',p)}
    hideLoginModal();
    el.sidebarAvatar.textContent=personName.charAt(0).toUpperCase();
    el.sidebarName.textContent=personName;el.sidebarStatus.textContent=isCreator?'Creator':'Online';
    el.inputArea.classList.remove('locked');el.input.disabled=false;el.input.placeholder='Speak to Eris...';
    el.welcomeLabel.textContent=`Hello, ${personName}`;
    el.app.classList.add('visible');
    if(!isReconnect){hasMessages=false;el.chatMsg.innerHTML='';el.welcome.classList.remove('gone');el.chatView.classList.remove('open');el.creatorView.style.display='none'}
    else if(currentSessionId&&ws&&isConnected)ws.send(JSON.stringify({type:'load_chat',session_id:currentSessionId}));
    if(isCreator){el.creatorPortalBtn.style.display='block';if(!isReconnect)showToast('Welcome home, Creator ✨')}else el.creatorPortalBtn.style.display='none';
    if(ws&&isConnected)ws.send(JSON.stringify({type:'list_chats'}));
}
function showLoginModal(canClose){el.loginUser.value='';el.loginPass.value='';el.confirmPass.value='';el.loginError.textContent='';el.modalClose.classList.toggle('visible',canClose);el.modal.style.display='flex';setTimeout(()=>el.loginUser.focus(),100)}
function hideLoginModal(){el.modal.classList.add('hidden')}

el.loginBtn.addEventListener('click',()=>{
    const u=el.loginUser.value.trim(),p=el.loginPass.value;
    if(!u||!p){el.loginError.textContent='Both fields required.';return}
    if(u.length<2){el.loginError.textContent='Username too short.';return}
    if(p.length<4){el.loginError.textContent='Password too short.';return}
    if(authMode==='signup'&&p!==el.confirmPass.value){el.loginError.textContent='Passwords do not match.';return}
    if(!ws||ws.readyState!==WebSocket.OPEN){el.loginError.textContent='Server waking up... wait.';return}
    el.loginError.textContent='';el.loginBtn.textContent='Verifying...';
    ws.send(JSON.stringify({type:'login',username:u,password:p}));
});
el.loginPass.addEventListener('keydown',e=>{if(e.key==='Enter'){authMode==='signup'?el.confirmPass.focus():el.loginBtn.click()}});
el.confirmPass.addEventListener('keydown',e=>{if(e.key==='Enter')el.loginBtn.click()});
el.loginUser.addEventListener('keydown',e=>{if(e.key==='Enter')el.loginPass.focus()});
el.modalClose.addEventListener('click',hideLoginModal);

el.userCard.addEventListener('click',()=>{if(!isLoggedIn){showLoginModal(false);return}el.userDropdown.classList.toggle('show')});
el.cancelDropdownBtn.addEventListener('click',()=>el.userDropdown.classList.remove('show'));
el.signOutBtn.addEventListener('click',()=>{
    el.userDropdown.classList.remove('show');localStorage.removeItem('eris_username');localStorage.removeItem('eris_password');
    isLoggedIn=false;personName='';personId='';isCreator=false;hasMessages=false;
    el.chatMsg.innerHTML='';el.welcome.classList.remove('gone');el.chatView.classList.remove('open');el.creatorView.style.display='none';
    el.sidebarAvatar.textContent='?';el.sidebarName.textContent='Not signed in';el.creatorPortalBtn.style.display='none';
    el.sidebarStatus.textContent='Click to sign in';el.inputArea.classList.add('locked');el.input.disabled=true;
    el.welcomeLabel.textContent='awaiting presence';el.chatList.innerHTML='';el.app.classList.remove('visible');
    showLoginModal(false);closeDrawer();
});
document.addEventListener('click',e=>{if(!el.userDropdown.contains(e.target)&&!el.userCard.contains(e.target))el.userDropdown.classList.remove('show')});

function renderChatList(){
    el.chatList.innerHTML='';
    for(const s of chatSessions){
        const d=document.createElement('div');d.className='dr-item'+(s.id===currentSessionId?' active':'');
        d.textContent=s.title||'New conversation';d.addEventListener('click',()=>loadChat(s.id));el.chatList.appendChild(d);
    }
}
function loadChat(sid){currentSessionId=sid;renderChatList();closeDrawer();el.creatorView.style.display='none';if(ws&&isConnected)ws.send(JSON.stringify({type:'load_chat',session_id:sid}))}
function loadChatMessages(msgs){
    hasMessages=msgs.length>0;el.chatMsg.innerHTML='';
    if(hasMessages){el.welcome.classList.add('gone');el.chatView.classList.add('open');for(const m of msgs)appendMessage(m.role==='user'?'user':'eris',m.content,false)}
    else{el.welcome.classList.remove('gone');el.chatView.classList.remove('open')}
}
el.newChatBtn.addEventListener('click',()=>{currentSessionId=null;hasMessages=false;el.chatMsg.innerHTML='';el.welcome.classList.remove('gone');el.chatView.classList.remove('open');el.creatorView.style.display='none';renderChatList();if(ws&&isConnected)ws.send(JSON.stringify({type:'new_chat'}));closeDrawer()});

el.creatorPortalBtn.addEventListener('click',()=>{el.welcome.classList.add('gone');el.chatView.classList.remove('open');el.creatorView.style.display='flex';closeDrawer()});
const t1=$('tabLiveFeed'),t2=$('tabResearchFeed');
t1.addEventListener('click',()=>{el.creatorFeed.style.display='block';el.researchFeed.style.display='none';t1.classList.add('active');t2.classList.remove('active')});
t2.addEventListener('click',()=>{el.creatorFeed.style.display='none';el.researchFeed.style.display='block';t2.classList.add('active');t1.classList.remove('active')});

let attachedImageBase64=null;
$('attachBtn').addEventListener('click',()=>{if(isLoggedIn)$('fileInput').click()});
$('fileInput').addEventListener('change',function(){const f=this.files[0];if(f){const r=new FileReader();r.onload=e=>{attachedImageBase64=e.target.result.split(',')[1];$('imagePreview').src=e.target.result;$('imagePreviewContainer').style.display='block';updateInputState()};r.readAsDataURL(f)}});
$('removeImageBtn').addEventListener('click',()=>{attachedImageBase64=null;$('fileInput').value='';$('imagePreviewContainer').style.display='none';updateInputState()});

function updateInputState(){el.send.classList.toggle('active',(el.input.value.trim().length>0||attachedImageBase64)&&isConnected&&isLoggedIn)}
function sendMsg(isVoice=false){
    const v=el.input.value.trim();if((!v&&!attachedImageBase64)||!isConnected||!isLoggedIn)return;
    let mc=v;if(attachedImageBase64)mc+=`<br><img src="data:image/jpeg;base64,${attachedImageBase64}" style="max-height:200px;border-radius:6px;margin-top:8px">`;
    appendMessage('user',mc);
    const payload={type:'message',content:v,is_voice:isVoice};
    if(attachedImageBase64){payload.image_base64=attachedImageBase64;$('removeImageBtn').click()}
    ws.send(JSON.stringify(payload));el.input.value='';el.input.style.height='auto';updateInputState();interact=1.0;
}
el.send.addEventListener('click',()=>sendMsg(false));
el.input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg(false)}});

function appendMessage(sender,text,anim=true){
    if(!hasMessages){hasMessages=true;el.welcome.classList.add('gone');el.chatView.classList.add('open')}
    const div=document.createElement('div');div.className=`message ${sender}`;if(!anim)div.style.animation='none';
    const t=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    let f=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    f=f.replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>');
    f=f.replace(/`([^`]+)`/g,'<code>$1</code>');
    f=f.replace(/\*\*([^\*]+)\*\*/g,'<strong>$1</strong>');
    const imgs=[];f=f.replace(/!\[IMAGE:(.+?)\]/g,(m,url)=>{imgs.push(url);return`__IMG_${imgs.length-1}__`});
    f=f.replace(/<skill\s+name="([^"]+)">([\s\S]+?)<\/skill>/gi,(m,name,code)=>{
        const ec=code.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        return`<div style="border:1px solid rgba(255,107,0,.2);border-radius:10px;overflow:hidden;margin:15px 0;background:rgba(0,0,0,.5)"><div style="background:rgba(255,107,0,.08);padding:8px 14px;font-weight:bold;border-bottom:1px solid rgba(255,107,0,.15);color:var(--accent);display:flex;justify-content:space-between;align-items:center"><span>🛠️ ${name}</span><button onclick="const f=this.parentElement.nextElementSibling;f.style.height=f.style.height==='500px'?'0':'500px'" style="background:none;border:1px solid var(--accent);color:var(--accent);border-radius:4px;padding:2px 8px;cursor:pointer;font-size:.8rem">Toggle</button></div><iframe srcdoc="${ec}" style="width:100%;height:500px;border:none;background:#fff;transition:height .3s"></iframe></div>`});
    f=f.replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" style="color:var(--accent);text-decoration:underline">$1</a>');
    f=f.replace(/__IMG_(\d+)__/g,(m,i)=>`<img src="${imgs[i]}" style="max-height:300px;border-radius:8px;margin-top:8px">`);
    f=f.split('\n\n').map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
    div.innerHTML=`<div class="msg-bubble">${f}</div><div class="msg-time">${t}</div>`;
    el.chatMsg.appendChild(div);scrollToBottom();
}
function showThinking(){if(isThinking)return;isThinking=true;const d=document.createElement('div');d.className='message eris';d.id='thinking';d.innerHTML='<div class="msg-bubble thinking-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';el.chatMsg.appendChild(d);scrollToBottom()}
function removeThinking(){isThinking=false;const e=$('thinking');if(e)e.remove()}
function scrollToBottom(){setTimeout(()=>{el.chatMsg.scrollTop=el.chatMsg.scrollHeight},50)}

let mediaRecorder=null,audioChunks=[],isRecording=false;
if(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia){
    el.micBtn.addEventListener('click',async()=>{
        if(!isLoggedIn)return;
        if(isRecording&&mediaRecorder)mediaRecorder.stop();
        else{try{const s=await navigator.mediaDevices.getUserMedia({audio:true});mediaRecorder=new MediaRecorder(s);audioChunks=[];
            mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);
            mediaRecorder.onstop=()=>{const b=new Blob(audioChunks,{type:'audio/webm'});const r=new FileReader();r.readAsDataURL(b);r.onloadend=()=>{const a=r.result.split(',')[1];appendMessage('user','🎙️ (Audio)');ws.send(JSON.stringify({type:'message',content:'',audio_base64:a,is_voice:true}))};s.getTracks().forEach(t=>t.stop());stopRec()};
            mediaRecorder.start();isRecording=true;el.micBtn.classList.add('recording');el.input.placeholder='Recording...'
        }catch(e){showToast('Mic access denied')}}
    });
}else el.micBtn.style.display='none';
function stopRec(){isRecording=false;el.micBtn.classList.remove('recording');el.input.placeholder='Speak to Eris...'}

let ttsEnabled=localStorage.getItem('eris_tts')!=='off';
if(!ttsEnabled)el.muteBtn.style.color='var(--danger)';
el.muteBtn.addEventListener('click',()=>{ttsEnabled=!ttsEnabled;localStorage.setItem('eris_tts',ttsEnabled?'on':'off');if(!ttsEnabled){el.muteBtn.style.color='var(--danger)';if(currentAudio)currentAudio.pause();if('speechSynthesis'in window)speechSynthesis.cancel()}else el.muteBtn.style.color='var(--text-muted)'});
function speakText(text){if(!ttsEnabled||!('speechSynthesis'in window))return;let c=text.replace(/\*\*([^*]+)\*\*/g,'$1').replace(/\*([^*]+)\*/g,'$1').replace(/`[^`]+`/g,'').replace(/```[\s\S]*?```/g,'').replace(/[#>\-_]/g,'').trim();if(!c)return;if(currentAudio)currentAudio.pause();speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(c);u.rate=1;u.pitch=1.1;u.volume=.9;const v=speechSynthesis.getVoices();const pref=v.find(v=>v.name.includes('Female')||v.name.includes('Samantha')||v.name.includes('Google UK English Female')||v.name.includes('Zira'));if(pref)u.voice=pref;speechSynthesis.speak(u)}
if('speechSynthesis'in window)speechSynthesis.onvoiceschanged=()=>{};
let currentAudio=null;
function playBase64Audio(b){if(currentAudio)currentAudio.pause();if('speechSynthesis'in window)speechSynthesis.cancel();currentAudio=new Audio(`data:audio/mp3;base64,${b}`);currentAudio.play().catch(e=>console.error('Audio fail:',e))}

connect();
</script>
</body>
</html>
