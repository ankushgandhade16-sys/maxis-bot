<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ERIS — TON 618</title>
    <meta name="description" content="Eris — Persistent intelligence at the event horizon.">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.5/dist/purify.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&family=Outfit:wght@100;200;300;400;600&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--text:#d8d4e4;--text-dim:#6e6880;--text-muted:#3a3550;--accent:#FF6B00;--gold:#FFB800;--violet:#8B5CF6;--danger:#EF4444;--glass:rgba(5,3,15,0.6);--glass-border:rgba(255,120,50,0.07)}
        html,body{height:100%;overflow:hidden}
        body{font-family:'Inter',sans-serif;background:#000;color:var(--text);-webkit-font-smoothing:antialiased}
        #bhCanvas{position:fixed;inset:0;z-index:0}

        /* ═══ Splash ═══ */
        #splash{position:fixed;inset:0;z-index:300;background:#000;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity 1.2s ease,visibility 1.2s}
        #splash.gone{opacity:0;visibility:hidden;pointer-events:none}
        .s-title{font-family:'Outfit',sans-serif;font-size:clamp(36px,8vw,60px);font-weight:100;letter-spacing:clamp(16px,4vw,32px);text-transform:uppercase;color:transparent;background:linear-gradient(135deg,#FF6B00,#FFB800 30%,#fff 50%,#8B5CF6 70%,#3B82F6);background-clip:text;-webkit-background-clip:text;opacity:0;animation:fadeUp 2s ease .5s forwards}
        .s-sub{font-family:'Outfit',sans-serif;font-size:10px;letter-spacing:8px;color:rgba(255,255,255,.12);margin-top:10px;font-weight:200;opacity:0;animation:fadeUp 1.5s ease 1.5s forwards}
        @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

        /* ═══ Login ═══ */
        .login-wrap{position:fixed;inset:0;z-index:150;display:none;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,rgba(0,0,0,.15),rgba(0,0,0,.6))}
        .login-wrap.show{display:flex}
        .login-card{width:320px;padding:40px 32px;text-align:center;background:rgba(5,3,15,.65);backdrop-filter:blur(50px);border:1px solid rgba(255,107,0,.06);border-radius:20px;box-shadow:0 0 100px rgba(255,107,0,.03),0 0 250px rgba(139,92,246,.015)}
        .lc-logo{font-family:'Outfit',sans-serif;font-size:28px;font-weight:100;letter-spacing:14px;text-transform:uppercase;background:linear-gradient(90deg,#FF6B00,#FFB800);background-clip:text;-webkit-background-clip:text;color:transparent}
        .lc-sub{font-size:8px;color:rgba(255,255,255,.15);letter-spacing:4px;margin:2px 0 26px}
        .auth-tabs{display:flex;margin-bottom:18px;border:1px solid rgba(255,107,0,.06);border-radius:8px;overflow:hidden}
        .auth-tab{flex:1;padding:9px;background:none;border:none;color:var(--text-muted);font-size:10px;font-family:'Inter',sans-serif;cursor:pointer;letter-spacing:2px;text-transform:uppercase;transition:all .25s}
        .auth-tab.active{background:rgba(255,107,0,.05);color:var(--accent)}
        .l-input{width:100%;background:rgba(0,0,0,.35);border:1px solid rgba(255,107,0,.05);border-radius:8px;padding:11px 13px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;outline:none;margin-bottom:7px;transition:border-color .3s}
        .l-input:focus{border-color:rgba(255,107,0,.18)}
        .l-input::placeholder{color:var(--text-muted)}
        #confirmPasswordField{display:none}
        .l-btn{width:100%;padding:11px;border:none;border-radius:8px;margin-top:6px;background:linear-gradient(135deg,#FF6B00,#E65100);color:#fff;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;cursor:pointer;letter-spacing:3px;text-transform:uppercase;transition:all .3s}
        .l-btn:hover{box-shadow:0 0 30px rgba(255,107,0,.2)}
        .l-error{color:var(--danger);font-size:11px;margin-top:8px;min-height:16px}
        .l-close{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--text-muted);font-size:16px;cursor:pointer;display:none}
        .l-close.visible{display:block}

        /* ═══ App ═══ */
        .app{position:fixed;inset:0;z-index:10;display:none;flex-direction:column}
        .app.on{display:flex}

        /* HUD — floating controls, no bar */
        .hud{position:absolute;top:0;left:0;right:0;z-index:30;display:flex;align-items:center;justify-content:space-between;padding:16px 20px;pointer-events:none}
        .hud>*{pointer-events:auto}
        .hud-left{display:flex;align-items:center;gap:12px}
        .hud-btn{background:rgba(0,0,0,.25);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.04);border-radius:10px;color:var(--text-dim);cursor:pointer;padding:8px;transition:all .2s;display:flex;align-items:center;justify-content:center}
        .hud-btn:hover{background:rgba(255,107,0,.06);color:var(--accent);border-color:rgba(255,107,0,.1)}
        .hud-dot{width:6px;height:6px;border-radius:50%;background:#222;transition:all .4s}
        .hud-dot.on{background:var(--accent);box-shadow:0 0 10px rgba(255,107,0,.5)}
        .hud-brand{font-family:'Outfit',sans-serif;font-size:12px;font-weight:200;letter-spacing:5px;color:rgba(255,255,255,.15)}
        .model-sel{background:rgba(0,0,0,.3);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.04);color:var(--text-dim);font-size:10px;padding:6px 10px;border-radius:10px;outline:none;cursor:pointer;font-family:'Inter',sans-serif}
        .model-sel option{background:#080412;color:#aaa}

        /* ═══ Chat — messages float over the black hole ═══ */
        .chat-area{position:absolute;top:50px;right:0;bottom:80px;width:min(540px,100%);z-index:20;display:none;flex-direction:column;overflow:hidden}
        .chat-area.on{display:flex}
        .chat-feed{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:16px;scrollbar-width:thin;scrollbar-color:rgba(255,107,0,.06) transparent;mask-image:linear-gradient(to bottom,transparent 0px,black 20px,black calc(100% - 20px),transparent 100%)}
        .chat-feed::-webkit-scrollbar{width:2px}
        .chat-feed::-webkit-scrollbar-thumb{background:rgba(255,107,0,.08)}
        .message{max-width:85%;animation:msgIn .4s ease-out}
        @keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
        .message.user{align-self:flex-end}
        .message.eris{align-self:flex-start}
        .msg-bubble{padding:13px 17px;border-radius:16px;font-size:14px;line-height:1.7;word-wrap:break-word;backdrop-filter:blur(20px)}
        .message.user .msg-bubble{background:rgba(255,107,0,.08);border:1px solid rgba(255,107,0,.1);border-bottom-right-radius:4px}
        .message.eris .msg-bubble{background:rgba(5,3,15,.5);border:1px solid rgba(255,255,255,.03);border-bottom-left-radius:4px}
        .msg-bubble p{margin-bottom:8px}.msg-bubble p:last-child{margin-bottom:0}
        .msg-bubble code{font-family:'JetBrains Mono',monospace;background:rgba(255,107,0,.05);padding:2px 6px;border-radius:4px;font-size:13px}
        .msg-bubble pre{background:rgba(0,0,0,.5);padding:14px;border-radius:10px;overflow-x:auto;margin:10px 0;border:1px solid rgba(255,107,0,.03)}
        .msg-bubble pre code{background:none;padding:0}
        .msg-bubble strong{color:var(--gold)}
        .msg-time{font-size:10px;color:var(--text-muted);margin-top:3px;padding:0 4px}
        .message.user .msg-time{text-align:right}
        .thinking-dots{display:flex;gap:6px;padding:14px 8px!important;background:transparent!important;border:none!important;backdrop-filter:none!important}
        .thinking-dots .dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:dP 1.4s infinite}
        .thinking-dots .dot:nth-child(2){animation-delay:.2s}
        .thinking-dots .dot:nth-child(3){animation-delay:.4s}
        @keyframes dP{0%,80%,100%{opacity:.2;transform:scale(.7)}40%{opacity:1;transform:scale(1.3)}}

        /* Welcome */
        .welcome{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:5;pointer-events:none;transition:opacity .5s}
        .welcome.gone{opacity:0}
        .welcome-text{font-family:'Outfit',sans-serif;font-size:12px;font-weight:200;letter-spacing:6px;text-transform:uppercase;color:rgba(255,255,255,.1);text-shadow:0 0 40px rgba(255,107,0,.08)}

        /* ═══ Input — floating pill ═══ */
        .input-dock{position:absolute;bottom:0;left:0;right:0;z-index:25;padding:12px 20px 18px}
        .input-dock.locked{opacity:.25;pointer-events:none}
        .input-row{display:flex;align-items:flex-end;gap:8px;background:rgba(5,3,15,.5);backdrop-filter:blur(30px);border:1px solid rgba(255,107,0,.05);border-radius:16px;padding:10px 14px;max-width:640px;margin:0 auto;transition:border-color .3s,box-shadow .3s}
        .input-row:focus-within{border-color:rgba(255,107,0,.12);box-shadow:0 0 20px rgba(255,107,0,.02)}
        #messageInput{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;resize:none;min-height:22px;max-height:150px;line-height:1.5}
        #messageInput::placeholder{color:var(--text-muted)}
        .ib{width:32px;height:32px;border-radius:50%;border:none;background:none;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s}
        .ib:hover{background:rgba(255,107,0,.06);color:var(--accent)}
        .ib.active{background:var(--accent);color:#000}
        .ib.recording{background:var(--danger);color:#fff;animation:recP 1s infinite}
        @keyframes recP{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}50%{box-shadow:0 0 0 8px rgba(239,68,68,0)}}

        /* ═══ Drawer — minimal ═══ */
        .drawer-bg{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.4);display:none;backdrop-filter:blur(8px);transition:opacity .4s}
        .drawer-bg.show{display:block}
        .drawer{position:fixed;top:0;bottom:0;left:0;z-index:90;width:240px;background:rgba(4,2,10,.92);backdrop-filter:blur(40px);border-right:1px solid rgba(255,107,0,.03);transform:translateX(-100%);transition:transform .5s cubic-bezier(.25,.1,.25,1);display:flex;flex-direction:column}
        .drawer.open{transform:translateX(0)}
        .dr-header{padding:16px 14px;display:flex;align-items:center;justify-content:space-between}
        .dr-logo{font-family:'Outfit',sans-serif;font-size:11px;font-weight:200;letter-spacing:8px;background:linear-gradient(90deg,#FF6B00,#FFB800);background-clip:text;-webkit-background-clip:text;color:transparent}
        .dr-close{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:12px;padding:4px 6px;opacity:.5;transition:opacity .2s}
        .dr-close:hover{opacity:1}
        .dr-new{margin:4px 12px 8px;padding:8px;text-align:center;border:1px solid rgba(255,107,0,.06);border-radius:6px;color:var(--text-dim);font-size:9px;letter-spacing:3px;cursor:pointer;transition:all .2s}
        .dr-new:hover{background:rgba(255,107,0,.04);color:var(--accent)}
        .dr-list{flex:1;overflow-y:auto;padding:2px 8px;scrollbar-width:none}
        .dr-list::-webkit-scrollbar{display:none}
        .dr-item{padding:8px 10px;border-radius:5px;cursor:pointer;font-size:11px;color:var(--text-muted);transition:all .15s;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .dr-item:hover{background:rgba(255,255,255,.03);color:var(--text-dim)}
        .dr-item.active{background:rgba(255,107,0,.04);color:var(--text)}
        .dr-portal{display:none;margin:4px 12px;padding:8px;text-align:center;border-radius:6px;cursor:pointer;font-size:9px;letter-spacing:2px;color:var(--violet);border:1px solid rgba(139,92,246,.08);transition:all .2s}
        .dr-portal:hover{background:rgba(139,92,246,.04)}
        .dr-footer{padding:10px 12px;border-top:1px solid rgba(255,255,255,.03);position:relative}
        .dr-user{display:flex;align-items:center;gap:8px;padding:6px;border-radius:6px;cursor:pointer;transition:background .2s}
        .dr-user:hover{background:rgba(255,255,255,.03)}
        .dr-avatar{width:24px;height:24px;border-radius:50%;background:rgba(255,107,0,.06);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;color:var(--text-dim)}
        .dr-uname{font-size:10px;color:var(--text-dim)}.dr-ustatus{font-size:8px;color:var(--text-muted)}
        .dr-dropdown{position:absolute;bottom:50px;left:8px;right:8px;background:rgba(8,4,16,.95);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.04);border-radius:6px;padding:3px;display:none;z-index:20}
        .dr-dropdown.show{display:block}
        .dd-item{display:flex;align-items:center;gap:6px;padding:8px 10px;border-radius:4px;cursor:pointer;font-size:10px;color:var(--text-muted);transition:all .15s;border:none;background:none;width:100%;text-align:left;font-family:'Inter',sans-serif}
        .dd-item:hover{background:rgba(255,255,255,.03);color:var(--text-dim)}
        .dd-item.danger{color:#f87171}.dd-item.danger:hover{background:rgba(248,113,113,.04)}

        /* Creator */
        .creator-panel{position:absolute;top:50px;right:0;bottom:80px;width:min(540px,100%);display:none;flex-direction:column;z-index:20;background:rgba(5,3,15,.8);backdrop-filter:blur(30px);border-left:1px solid rgba(139,92,246,.06)}
        .creator-panel.on{display:flex}
        .cr-tabs{display:flex;border-bottom:1px solid rgba(139,92,246,.1)}
        .cr-tab{flex:1;padding:12px;background:none;border:none;font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;font-family:'Inter',sans-serif;transition:all .2s}
        .cr-tab.active{color:var(--violet);border-bottom-color:var(--violet)}.cr-tab:not(.active){color:rgba(139,92,246,.3)}

        .toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(12,6,20,.85);backdrop-filter:blur(20px);border:1px solid rgba(255,107,0,.08);color:var(--text);padding:9px 22px;border-radius:20px;font-size:11px;opacity:0;transition:all .3s;z-index:200;pointer-events:none}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

        @media(max-width:768px){.chat-area,.creator-panel{width:100%;border-left:none}.s-title{letter-spacing:16px}.login-card{width:85%;padding:30px 22px}.message{max-width:95%}}
    </style>
    <script id="vs" type="x-shader/x-vertex">attribute vec2 a_pos;void main(){gl_Position=vec4(a_pos,0,1);}</script>
    <script id="fs" type="x-shader/x-fragment">
precision highp float;
uniform vec2 u_res;
uniform float u_time;
uniform float u_interact;
uniform float u_zoom;

float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float hash2(vec2 p){return fract(sin(dot(p,vec2(41.1,17.4)))*43758.5453);}
float noise(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);}
float noise3(vec3 p){return noise(p.xz+p.y*7.3);}
float fbm3(vec2 p){float v=0.,a=.5;for(int i=0;i<3;i++){v+=a*noise(p);p=p*2.1+vec2(1.7,9.2);a*=.5;}return v;}
float fbmFake3(vec3 p){return fbm3(p.xz+p.y*7.3);}

float sdBox3(vec3 p,vec3 b){vec3 d=abs(p)-b;return length(max(d,0.))+min(max(d.x,max(d.y,d.z)),0.);}
float sdRB(vec3 p,vec3 b,float r){vec3 q=abs(p)-b+r;return length(max(q,0.))-r;}
float smin(float a,float b,float k){float h=clamp(.5+.5*(b-a)/k,0.,1.);return mix(b,a,h)-k*h*(1.-h);}

// ═══ SPACE STATION SDF — PHOTOREALISTIC ═══
float mapSt(vec3 p){
    p*=.5; // Scale up station 2x
    // ── Main truss (rounded) ──
    float truss=sdRB(p,vec3(.012,.012,.55),.003);
    vec3 cb=p;cb.z=mod(cb.z+.05,.1)-.05;
    float br=min(sdRB(cb,vec3(.015,.002,.002),.001),sdRB(cb,vec3(.002,.015,.002),.001));
    br = max(br, abs(p.z) - 0.55);

    // ── Pressurized modules (rounded cylinders) ──
    float hub=sdRB(p,vec3(.058,.058,.13),.016);
    float fwM=sdRB(p-vec3(0,0,.28),vec3(.038,.038,.1),.012);
    float afM=sdRB(p+vec3(0,0,.28),vec3(.044,.044,.1),.013);
    float topL=sdRB(vec3(p.x,p.z,p.y-.12),vec3(.03,.065,.03),.009);
    float crM=sdRB(vec3(p.z,p.y,p.x),vec3(.026,.026,.08),.009);
    float uL=sdRB(p-vec3(.055,0,.14),vec3(.015,.015,.035),.005);
    float uR=sdRB(p+vec3(.055,0,-.14),vec3(.015,.015,.035),.005);

    // ── Node connectors ──
    float nd=min(min(length(p-vec3(0,0,.15))-.025,length(p+vec3(0,0,.15))-.025),min(length(p-vec3(0,.064,0))-.02,min(length(p-vec3(.055,0,.14))-.013,length(p+vec3(.055,0,.14))-.013)));

    // ── Habitat ring ──
    vec3 rp=p;rp.z+=.05;
    float ring=length(vec2(length(rp.xy)-.26,rp.z))-.03;
    float spk=min(min(sdRB(rp,vec3(.26,.004,.004),.001),sdRB(rp,vec3(.004,.26,.004),.001)),min(sdRB(vec3(rp.x*.707+rp.y*.707,rp.y*.707-rp.x*.707,rp.z),vec3(.26,.004,.004),.001),sdRB(vec3(rp.x*.707-rp.y*.707,rp.x*.707+rp.y*.707,rp.z),vec3(.26,.004,.004),.001)));

    // ── Solar arrays ──
    float sa=min(min(sdRB(p-vec3(.52,0,.22),vec3(.28,.001,.12),.001),sdRB(p-vec3(.52,0,-.22),vec3(.28,.001,.12),.001)),min(sdRB(p+vec3(.52,0,.22),vec3(.28,.001,.12),.001),sdRB(p+vec3(.52,0,-.22),vec3(.28,.001,.12),.001)));
    float sSec=min(sdRB(p-vec3(.16,.088,.35),vec3(.065,.001,.038),.001),sdRB(p+vec3(.16,-.088,.35),vec3(.065,.001,.038),.001));
    float pStr=min(min(sdRB(p-vec3(.28,0,.22),vec3(.22,.003,.003),.001),sdRB(p-vec3(.28,0,-.22),vec3(.22,.003,.003),.001)),min(sdRB(p+vec3(.28,0,.22),vec3(.22,.003,.003),.001),sdRB(p+vec3(.28,0,-.22),vec3(.22,.003,.003),.001)));

    // ── Radiator panels ──
    float rad=min(min(sdRB(p-vec3(.12,0,.22),vec3(.002,.072,.058),.001),sdRB(p+vec3(.12,0,.22),vec3(.002,.072,.058),.001)),min(sdRB(p-vec3(.12,0,-.16),vec3(.002,.062,.042),.001),sdRB(p+vec3(.12,0,-.16),vec3(.002,.062,.042),.001)));

    // ── Engine cluster ──
    float eng=min(min(length(p-vec3(.04,.04,-.57))-.018,length(p-vec3(-.04,.04,-.57))-.018),min(length(p-vec3(.04,-.04,-.57))-.018,length(p-vec3(-.04,-.04,-.57))-.018));
    float eB=sdRB(p-vec3(0,0,-.54),vec3(.055,.055,.025),.008);
    float nzl=min(min(max(length(p.xy-vec2(.04,.04))-.012,abs(p.z+.6)-.018),max(length(p.xy-vec2(-.04,.04))-.012,abs(p.z+.6)-.018)),min(max(length(p.xy-vec2(.04,-.04))-.012,abs(p.z+.6)-.018),max(length(p.xy-vec2(-.04,-.04))-.012,abs(p.z+.6)-.018)));

    // ── Fuel tanks ──
    float ft=min(max(length(vec2(p.x-.075,p.y))-.022,abs(p.z+.36)-.09),max(length(vec2(p.x+.075,p.y))-.022,abs(p.z+.36)-.09));

    // ── Comm array ──
    float ant=min(max(length(p.xz)-.003,abs(p.y-.2)-.13),length(p-vec3(0,.35,0))-.03);
    float comms=min(min(length(p-vec3(.035,.3,.03))-.01,length(p-vec3(-.035,.3,-.03))-.01),length(p-vec3(0,.3,.04))-.008);

    // ── Observatory dome ──
    float dome=max(length(p-vec3(0,.06,.33))-.028,-(p.y-.06));

    // ── Docking ports ──
    float dk=min(max(length(p.xz)-.028,abs(p.y+.12)-.022),min(max(length(p.yz)-.02,abs(p.x-.1)-.016),max(length(p.yz)-.02,abs(p.x+.1)-.016)));

    // ── Heat pipes ──
    float hp=min(max(length(vec2(p.x-.025,p.y))-.003,abs(p.z)-.5),min(max(length(vec2(p.x+.025,p.y))-.003,abs(p.z)-.5),max(length(vec2(p.x,p.y-.025))-.003,abs(p.z)-.5)));

    // ── RCS thruster blocks ──
    float rcs=min(min(min(sdRB(p-vec3(.052,.052,.37),vec3(.006,.006,.01),.002),sdRB(p-vec3(-.052,.052,.37),vec3(.006,.006,.01),.002)),min(sdRB(p-vec3(.052,-.052,.37),vec3(.006,.006,.01),.002),sdRB(p-vec3(-.052,-.052,.37),vec3(.006,.006,.01),.002))),min(sdRB(p+vec3(.052,.052,.37),vec3(.006,.006,.01),.002),sdRB(p+vec3(-.052,.052,.37),vec3(.006,.006,.01),.002)));

    // ── Airlock ──
    float airlock=max(length(vec2(p.x,p.y+.065))-.018,abs(p.z-.05)-.025);

    // ── Robotic arm ──
    float arm=min(sdRB(p-vec3(.03,.068,0),vec3(.003,.003,.12),.001),sdRB(p-vec3(.03,.068,.12),vec3(.003,.003,.08),.001));
    float armJ=length(p-vec3(.03,.068,.12))-.007;

    // ── Cupola frame ──
    float cupR=length(vec2(length(vec2(p.x,(p.y-.06)))-.022,(p.z-.33)))-.003;
    cupR=max(cupR,-(p.y-.06));

    // ── Combine (smooth unions at module junctions) ──
    float d=truss;
    d=min(d,br);
    d=smin(d,hub,.008);
    d=smin(d,fwM,.005);
    d=smin(d,afM,.005);
    d=smin(d,topL,.004);
    d=smin(d,crM,.004);
    d=min(d,min(uL,uR));
    d=smin(d,nd,.004);
    d=min(d,min(ring,spk));
    d=min(d,min(sa,sSec));
    d=min(d,pStr);
    d=min(d,rad);
    d=min(d,min(eng,min(eB,nzl)));
    d=min(d,ft);
    d=min(d,min(ant,comms));
    d=min(d,min(dome,cupR));
    d=min(d,dk);
    d=min(d,hp);
    d=min(d,rcs);
    d=min(d,airlock);
    d=min(d,min(arm,armJ));
    return d*2.;
}

vec3 nrmSt(vec3 p){vec2 e=vec2(.0005,0.);return normalize(vec3(mapSt(p+e.xyy)-mapSt(p-e.xyy),mapSt(p+e.yxy)-mapSt(p-e.yxy),mapSt(p+e.yyx)-mapSt(p-e.yyx)));}

// 4K Procedural Distance-Attenuated Bump Mapping
vec3 bumpN(vec3 n,vec3 p,float freq,float str,float dist){
    float atten=1.-smoothstep(3.,9.,dist);
    if(atten<=0.)return n;
    vec2 e=vec2(.002,0.);
    float b=fbmFake3(p*freq);
    vec3 g=vec3(fbmFake3((p+e.xyy)*freq)-b,fbmFake3((p+e.yxy)*freq)-b,fbmFake3((p+e.yyx)*freq)-b)/e.x;
    return normalize(n-g*str*atten);
}

float aoSt(vec3 p,vec3 n){
    float ao=0.,s=1.;
    for(int i=1;i<=5;i++){
        float d=.015*float(i);
        ao+=(d-mapSt(p+n*d))*s;
        s*=.55;
    }
    return clamp(1.-ao*6.,0.,1.);
}

// Ray-Traced Soft Shadows
float softShadow(vec3 ro,vec3 rd,float mint,float maxt,float k){
    float res=1.0;
    float t=mint;
    for(int i=0;i<25;i++){
        float h=mapSt(ro+rd*t);
        if(h<.001)return 0.0;
        res=min(res,k*h/t);
        t+=clamp(h,.02,.15);
        if(t>maxt)break;
    }
    return clamp(res,0.0,1.0);
}

// True Black Hole Environment Reflection Approximation
vec3 envCol(vec3 rd,float t){
    float disk=smoothstep(.03,.0,abs(rd.y));
    float angle=atan(rd.z,rd.x)+t*.1;
    float doppler=1.+dot(rd.xz,vec2(-sin(angle),cos(angle)))*1.5;
    vec3 dc=mix(vec3(1.,.8,.3),vec3(1.,.3,.05),abs(sin(angle*3.)));
    return dc*disk*pow(clamp(doppler,.1,2.),2.)+vec3(.01,.015,.025);
}

void main(){
    vec2 uv=(gl_FragCoord.xy-.5*u_res)/u_res.y;
    float t=u_time;

    // ── Station orbit ──
    float stAngle=t*.05;
    float stOrbitR=20.;
    vec3 stPos=vec3(stOrbitR*cos(stAngle),.3+.12*sin(t*.12),stOrbitR*sin(stAngle));
    vec3 stVelDir=normalize(vec3(-sin(stAngle),0.,cos(stAngle)));

    // Station orientation
    vec3 stFwd=stVelDir;
    vec3 stUp=vec3(0.,1.,0.);
    vec3 stRt=normalize(cross(stUp,stFwd));
    stUp=cross(stFwd,stRt);

    // ── Chase camera ──
    vec3 toBH=normalize(-stPos);
    vec3 camSide=normalize(cross(toBH,vec3(0,1,0)));
    vec3 roBase=stPos-toBH*6.5+vec3(0.,.9,0.)+camSide*.2;
    roBase+=camSide*.2*sin(t*.06);
    roBase.y+=.1*sin(t*.08);
    vec3 roZoom=stPos-toBH*3.+vec3(0.,.3,0.)+camSide*.4;
    vec3 ro=mix(roBase,roZoom,u_zoom);

    vec3 ta=vec3(0.);
    vec3 fwd=normalize(ta-ro);
    vec3 right=normalize(cross(fwd,vec3(0,1,0)));
    vec3 up=cross(right,fwd);
    float fov=mix(1.8,1.2,u_zoom);
    vec3 rd=normalize(fwd*fov+right*uv.x+up*uv.y);

    vec3 col=vec3(0.);
    bool hitStation=false;

    // ═══ STATION SDF RAYMARCH ═══
    {
        float bndR=2.5;
        vec3 oc=ro-stPos;
        float B=dot(oc,rd);
        float C=dot(oc,oc)-bndR*bndR;
        float D=B*B-C;
        if(D>0.){
            float tNear=max(0.,-B-sqrt(D));
            float tFar=-B+sqrt(D);
            if(tFar>0.){
                float tc=tNear+.001;
                for(int i=0;i<100;i++){
                    vec3 wp=ro+rd*tc;
                    vec3 dv=wp-stPos;
                    vec3 lp=vec3(dot(dv,stRt),dot(dv,stUp),dot(dv,stFwd));
                    float sd=mapSt(lp);
                    if(sd<.001){
                        hitStation=true;
                        vec3 ln=nrmSt(lp);
                        vec3 wn=stRt*ln.x+stUp*ln.y+stFwd*ln.z;
                        float dist=length(wp-ro);

                        // Ambient occlusion & Soft Shadows
                        float ao=aoSt(lp,ln);
                        float shadow=softShadow(lp,toBH,.005,2.0,12.0);

                        // ── Material classification (scaled coords) ──
                        vec3 sp=lp*.5; // Match SDF internal scale
                        float pnD=min(min(sdRB(sp-vec3(.52,0,.22),vec3(.28,.001,.12),.001),sdRB(sp-vec3(.52,0,-.22),vec3(.28,.001,.12),.001)),min(sdRB(sp+vec3(.52,0,.22),vec3(.28,.001,.12),.001),sdRB(sp+vec3(.52,0,-.22),vec3(.28,.001,.12),.001)));
                        float radD=min(min(sdRB(sp-vec3(.12,0,.22),vec3(.002,.072,.058),.001),sdRB(sp+vec3(.12,0,.22),vec3(.002,.072,.058),.001)),min(sdRB(sp-vec3(.12,0,-.16),vec3(.002,.062,.042),.001),sdRB(sp+vec3(.12,0,-.16),vec3(.002,.062,.042),.001)));
                        float enD=min(min(length(sp-vec3(.04,.04,-.57))-.018,length(sp-vec3(-.04,.04,-.57))-.018),min(length(sp-vec3(.04,-.04,-.57))-.018,length(sp-vec3(-.04,-.04,-.57))-.018));
                        vec3 rlp=sp;rlp.z+=.05;
                        float rnD=length(vec2(length(rlp.xy)-.26,rlp.z))-.03;
                        float hubD=sdRB(sp,vec3(.058,.058,.13),.016);
                        float fwD=sdRB(sp-vec3(0,0,.28),vec3(.038,.038,.1),.012);
                        float afD=sdRB(sp+vec3(0,0,.28),vec3(.044,.044,.1),.013);
                        float topD=sdRB(vec3(sp.x,sp.z,sp.y-.12),vec3(.03,.065,.03),.009);
                        float crossD=sdRB(vec3(sp.z,sp.y,sp.x),vec3(.026,.026,.08),.009);
                        float modD=min(fwD,afD);
                        float ftD=min(max(length(vec2(sp.x-.075,sp.y))-.022,abs(sp.z+.36)-.09),max(length(vec2(sp.x+.075,sp.y))-.022,abs(sp.z+.36)-.09));
                        float domeD=max(length(sp-vec3(0,.06,.33))-.028,-(sp.y-.06));
                        bool isModule=hubD<.006||modD<.006||topD<.006||crossD<.006;

                        // ── Window detection on modules ──
                        float isWin=0.;
                        if(isModule){
                            float wAng=atan(sp.y,sp.x);
                            isWin=step(.82,sin(wAng*14.))*step(.82,sin(sp.z*24.));
                        }
                        // Ring windows
                        float ringWin=0.;
                        if(rnD<.005){
                            float rA=atan(rlp.y,rlp.x);
                            ringWin=step(.83,sin(rA*20.))*step(.83,sin(rlp.z*40.+rA*2.));
                        }

                        vec3 hull;
                        float metallic=.3,roughness=.5;

                        if(isWin>.5){
                            hull=vec3(.04,.06,.12);
                            metallic=.08;roughness=.04;
                        } else if(ringWin>.5){
                            hull=vec3(.04,.055,.11);
                            metallic=.08;roughness=.04;
                        } else if(domeD<.004){
                            hull=vec3(.05,.07,.14);
                            metallic=.1;roughness=.03;
                        } else if(pnD<.004){
                            // Solar panels with procedural 4K hex grid bump
                            hull=vec3(.01,.015,.04);
                            float hex=step(.9,sin(sp.x*120.))*step(.9,sin(sp.z*120.));
                            hull+=vec3(.01,.02,.05)*hex;
                            // Removed high-frequency mossy bump noise
                            metallic=.3;roughness=.15;
                        } else if(radD<.004){
                            // Radiator with procedural foil crinkles
                            hull=vec3(.3,.2,.05);
                            hull+=vec3(.05,.03,.01)*fbmFake3(sp*100.);
                            wn=bumpN(wn,sp,80.,.06,dist);
                            metallic=.95;roughness=.25;
                        } else if(enD<.005){
                            hull=vec3(.15,.17,.2);
                            hull+=vec3(.06,.16,.45)*(.5+.5*sin(t*5.));
                            wn=bumpN(wn,sp,60.,.02,dist);
                            metallic=.7;roughness=.3;
                        } else if(ftD<.005){
                            hull=vec3(.48,.5,.52);
                            hull=mix(hull,vec3(.55,.22,.08),step(.95,abs(sin(sp.z*25.)))*.35);
                            wn=bumpN(wn,sp,40.,.03,dist);
                            metallic=.05;roughness=.7;
                        } else if(rnD<.005){
                            hull=vec3(.65,.67,.7); // Brighter white for ring
                            float rAng=atan(rlp.y,rlp.x);
                            vec2 pF=abs(fract(vec2(rAng*4.,rlp.z*12.))-.5);
                            float frame=smoothstep(.45,.5,max(pF.x,pF.y));
                            hull=mix(hull,vec3(.4,.42,.45),frame*.4);
                            wn=bumpN(wn,sp,50.,.01,dist);
                            metallic=.2;roughness=.4;
                        } else if(isModule){
                            hull=vec3(.7,.72,.75); // Bright white ceramic plates
                            float ang=atan(sp.y,sp.x);
                            vec2 pF=abs(fract(vec2(ang*2.23,sp.z*3.82))-.5);
                            float frame=smoothstep(.45,.5,max(pF.x,pF.y));
                            hull=mix(hull,vec3(.45,.47,.5),frame*.5);
                            wn=bumpN(wn,sp,45.,.015,dist);
                            metallic=.1;roughness=.35;
                        } else {
                            hull=vec3(.35,.37,.42); // Gray trusses
                            wn=bumpN(wn,sp,60.,.03,dist);
                            metallic=.6;roughness=.4;
                        }

                        // ── Ray-Traced PBR Lighting ──
                        vec3 viewD=normalize(ro-wp);
                        float diskLit=max(0.,dot(wn,toBH))*shadow; // Shadow applied to primary light
                        float backFill=max(0.,dot(wn,-toBH))*.15;
                        float NdV=max(0.,dot(wn,viewD));

                        vec3 diff=hull*(1.-metallic*.7)*(.15+diskLit*vec3(1.,.7,.25)*2.5+backFill*vec3(.3,.4,.7));

                        vec3 halfV=normalize(toBH+viewD);
                        float specPow=mix(16.,1024.,1.-roughness);
                        float spec=pow(max(0.,dot(wn,halfV)),specPow);
                        vec3 specCol=mix(vec3(1.,.8,.5),hull,metallic)*spec*diskLit;

                        // True Ray-Traced Reflections
                        vec3 reflDir=reflect(-viewD,wn);
                        vec3 envR=envCol(reflDir,t);
                        float reflStr=metallic*(1.-roughness)*.6;

                        // Fresnel Rim
                        float fres=pow(1.-NdV,4.);
                        reflStr=mix(reflStr,.9,fres*metallic);
                        diff+=vec3(.2,.3,.5)*fres*(1.-metallic)*.2; // Edge sheen on non-metals

                        hull=diff*ao+specCol+envR*reflStr*ao;

                        // ── Emissive ──
                        vec3 emit=vec3(0.);

                        // Glass window interior glow
                        if(isWin>.5){
                            emit+=vec3(.8,.6,.3)*.7;
                            float wAng2=atan(sp.y,sp.x);
                            float frameX=smoothstep(.0,.2,abs(sin(wAng2*14.)));
                            float frameZ=smoothstep(.0,.2,abs(sin(sp.z*24.)));
                            emit*=frameX*frameZ;
                        }
                        if(ringWin>.5){
                            emit+=vec3(.7,.55,.25)*.6;
                            float rA2=atan(rlp.y,rlp.x);
                            emit*=smoothstep(.0,.2,abs(sin(rA2*20.)))*smoothstep(.0,.2,abs(sin(rlp.z*40.+rA2*2.)));
                        }
                        if(domeD<.004) emit+=vec3(.5,.6,.8)*.5;

                        // Ring running lights
                        if(rnD<.005){
                            float rA3=atan(rlp.y,rlp.x);
                            emit+=vec3(.2,.4,.65)*step(.94,sin(rA3*16.+t*1.5))*smoothstep(.01,0.,abs(length(rlp.xy)-.29))*.45;
                        }

                        // Module joint lights
                        if(isModule&&isWin<.5){
                            emit+=vec3(.3,.42,.58)*step(.97,abs(sin(sp.z*14.)))*smoothstep(.08,.04,abs(length(sp.xy)-.06))*.35;
                        }

                        if(ftD<.005) emit+=vec3(.4,.48,.55)*step(.96,sin(sp.z*20.+t*2.))*.25;

                        hull+=vec3(.1,.16,.3)*fres*.18;
                        emit+=vec3(.35,.42,.55)*step(.96,sin(sp.z*18.))*smoothstep(.025,.01,length(sp.xy))*.3;

                        float exDst=length(sp.xz)*8.;
                        emit+=vec3(.12,.28,.7)*smoothstep(.65,0.,sp.z+.57)*exp(-exDst*exDst)*(1.-step(-.5,sp.z))*(.6+.4*sin(t*7.));

                        hull+=emit;
                        col=hull;
                        break;
                    }
                    tc+=sd;
                    if(tc>tFar) break;
                }
            }
        }
    }

    // ═══ BLACK HOLE ═══
    if(!hitStation){
        float rs=1.;
        float diskIn=3.;
        float diskOut=14.;
        vec3 pos=ro;
        vec3 vel=rd;
        bool absorbed=false;

        for(int i=0;i<200;i++){
            float rl=length(pos);
            float h=max(.04,min(.6,rl*.07));
            vec3 prev=pos;
            pos+=vel*h;
            float r2=dot(pos,pos);
            float rn=sqrt(r2);
            if(rn<rs*.5){absorbed=true;break;}
            vec3 L=cross(pos,vel);
            float L2=dot(L,L);
            vel+=-1.5*L2*pos/(r2*r2*rn)*h;
            vel=normalize(vel);
            if(prev.y*pos.y<0.){
                float tt=prev.y/(prev.y-pos.y);
                vec3 hp=mix(prev,pos,tt);
                float hr=length(hp.xz);
                if(hr>diskIn&&hr<diskOut){
                    float dn=(hr-diskIn)/(diskOut-diskIn);
                    float omega=1./pow(hr,.75);
                    float da=atan(hp.z,hp.x)+t*omega*.5;
                    vec3 dc;
                    if(dn<.08) dc=mix(vec3(1.,.97,.9),vec3(1.,.72,.18),dn/.08);
                    else if(dn<.25) dc=mix(vec3(1.,.72,.18),vec3(.88,.3,.04),(dn-.08)/.17);
                    else dc=mix(vec3(.88,.3,.04),vec3(.12,.02,0.),clamp((dn-.25)/.75,0.,1.));
                    vec3 orbV=normalize(vec3(-hp.z,0.,hp.x));
                    float dop=1.+dot(vel.xz,orbV.xz)*2.2;
                    dop=clamp(dop,.08,3.5);
                    dop=pow(dop,2.);
                    float spiral=da+hr*.3;
                    float tex=fbm3(vec2(spiral*3.5,hr*2.));
                    float str=noise(vec2(da*8.+hr*.5,hr*4.));
                    tex=.3+.7*mix(tex,str,.35);
                    float opacity=smoothstep(diskOut,diskOut*.3,hr);
                    opacity*=.5+.5*(1.-dn);
                    col+=dc*dop*tex*opacity*2.2;
                }
            }
            if(rn>50.)break;
        }

        if(!absorbed){
            // Volumetric Parallax Grid Stars - High Quality Anti-Aliased
            for(float s=40.;s<=280.;s+=40.){ // 7 layers for deep parallax without sub-pixel aliasing
                // Project ray from actual camera position onto finite spheres to create true 3D parallax
                vec3 fd = normalize(ro + vel * (s * 0.6));
                float phi=atan(fd.z,fd.x);
                float psi=asin(clamp(fd.y,-1.,1.));
                vec2 sc=vec2(phi,psi);
                
                vec2 cell=floor(sc*s);
                float hv=hash(cell);
                if(hv>.80){ // 20% density for millions of stars
                    vec2 sp=(cell+vec2(hash2(cell),hash(cell+vec2(7.3,13.1))))/s;
                    float d=length(sc-sp)*s;
                    
                    // High-quality smoothstep dot that drops to exactly 0 at cell border (0.5 max radius)
                    // This prevents any square clipping and acts as natural anti-aliasing!
                    float pt = smoothstep(0.5, 0.0, d);
                    
                    // Add variation to star core sharpness
                    float sh = mix(4.0, 16.0, hash(cell+vec2(3.1,0.)));
                    pt = pow(pt, sh);
                    
                    float b=pow((hv-.80)/.20, 2.0); // Brightness falloff to preserve deep blackness
                    float tw=.92+.08*sin(t*.3+hv*150.);
                    float temp=hash2(cell);
                    vec3 starCol=temp<.3?vec3(.7,.75,1.):temp<.6?vec3(.95,.93,.88):vec3(1.,.85,.7);
                    col+=starCol*pt*b*tw*.8;
                }
            }

            // Nebula dust clouds
            vec3 nebDir=normalize(vel);
            float neb1=fbm3(nebDir.xz*2.+vec2(3.1,1.7));
            float neb2=fbm3(nebDir.yz*1.8+vec2(5.2,2.3));
            float neb3=fbm3(nebDir.xz*3.5+nebDir.y*2.+vec2(8.1,4.2));
            col+=vec3(.06,.02,.1)*neb1*.08;
            col+=vec3(.02,.04,.08)*neb2*.06;
            col+=vec3(.04,.015,.03)*neb3*.04;
        }
    }

    col+=vec3(.005,.008,.016);
    float sr=length(uv);
    col+=vec3(.25,.08,.02)*exp(-uv.y*uv.y*40.)*exp(-sr*1.5)*.1;
    col+=vec3(1.,.5,.12)*u_interact*exp(-sr*sr*12.)*.3;
    col=1.-exp(-col*1.3);
    col=pow(col,vec3(.88));
    gl_FragColor=vec4(col,1.);
}
    </script>

<script>
// ══════════════════════════════════════════════════
//  WebGL — TON 618 Black Hole Renderer
// ══════════════════════════════════════════════════
const cv=document.getElementById('bhCanvas'),gl=cv.getContext('webgl',{antialias:false,powerPreference:'high-performance'});
function mkS(src,type){const s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(s));return s}
const prog=gl.createProgram();
gl.attachShader(prog,mkS(document.getElementById('vs').textContent,gl.VERTEX_SHADER));
gl.attachShader(prog,mkS(document.getElementById('fs').textContent,gl.FRAGMENT_SHADER));
gl.linkProgram(prog);gl.useProgram(prog);
const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
const aP=gl.getAttribLocation(prog,'a_pos');gl.enableVertexAttribArray(aP);gl.vertexAttribPointer(aP,2,gl.FLOAT,false,0,0);
const uR=gl.getUniformLocation(prog,'u_res'),uT=gl.getUniformLocation(prog,'u_time'),uI=gl.getUniformLocation(prog,'u_interact'),uZ=gl.getUniformLocation(prog,'u_zoom');
let interact=0,zoomTarget=0,zoomCurrent=0;
function rsz(){const d=Math.min(devicePixelRatio,2.);cv.width=innerWidth*d;cv.height=innerHeight*d;cv.style.width=innerWidth+'px';cv.style.height=innerHeight+'px';gl.viewport(0,0,cv.width,cv.height)}
addEventListener('resize',rsz);rsz();
addEventListener('click',()=>{interact=Math.min(interact+.5,1.5)});
let t0=performance.now();
function render(){const t=(performance.now()-t0)*.001;interact*=.97;zoomCurrent+=(zoomTarget-zoomCurrent)*.025;gl.uniform2f(uR,cv.width,cv.height);gl.uniform1f(uT,t);gl.uniform1f(uI,interact);gl.uniform1f(uZ,zoomCurrent);gl.drawArrays(gl.TRIANGLE_STRIP,0,4);requestAnimationFrame(render)}
requestAnimationFrame(render);

// Splash
setTimeout(()=>{document.getElementById('splash').classList.add('gone')},3000);

// ══════════════════════════════════════════════════
//  APP LOGIC
// ══════════════════════════════════════════════════
let ws=null,isConnected=false,isThinking=false,personName='',personId='',hasMessages=false,isLoggedIn=false,isCreator=false,currentSessionId=null,chatSessions=[],authMode='signin';
const $=id=>document.getElementById(id);
const el={chatMsg:$('chatMessages'),input:$('messageInput'),send:$('sendBtn'),welcome:$('welcomeView'),chatView:$('chatView'),welcomeLabel:$('welcomeLabel'),creatorView:$('creatorView'),creatorFeed:$('creatorFeed'),researchFeed:$('researchFeed'),creatorPortalBtn:$('creatorPortalBtn'),muteBtn:$('muteBtn'),modal:$('loginModal'),loginUser:$('loginUsername'),loginPass:$('loginPassword'),confirmPass:$('confirmPasswordField'),loginBtn:$('loginBtn'),loginError:$('loginError'),statusDot:$('statusDot'),micBtn:$('micBtn'),inputArea:$('inputArea'),modelSelector:$('modelSelector'),toast:$('toast'),sidebarAvatar:$('sidebarAvatar'),sidebarName:$('sidebarName'),sidebarStatus:$('sidebarStatus'),userCard:$('userCard'),modalClose:$('modalClose'),topbarLabel:$('topbarLabel'),menuBtn:$('menuBtn'),newChatBtn:$('newChatBtn'),chatList:$('chatList'),tabSignIn:$('tabSignIn'),tabSignUp:$('tabSignUp'),userDropdown:$('userDropdown'),signOutBtn:$('signOutBtn'),cancelDropdownBtn:$('cancelDropdownBtn'),app:$('app'),drawer:$('drawer'),drawerBg:$('drawerBg'),drawerClose:$('drawerClose')};
function showToast(m){el.toast.textContent=m;el.toast.classList.add('show');setTimeout(()=>el.toast.classList.remove('show'),2500)}

el.tabSignIn.addEventListener('click',()=>{authMode='signin';el.tabSignIn.classList.add('active');el.tabSignUp.classList.remove('active');el.confirmPass.style.display='none';el.loginBtn.textContent='Enter'});

const savedModel=localStorage.getItem('eris_model');
if(savedModel){const v=[...el.modelSelector.options].map(o=>o.value);if(v.includes(savedModel))el.modelSelector.value=savedModel;else localStorage.removeItem('eris_model')}

function openDrawer(){el.drawer.classList.add('open');el.drawerBg.classList.add('show');zoomTarget=1}

function connect(){
    const url=`${location.protocol==='https:'?'wss:':'ws:'}//${location.host}/ws/chat`;
    ws=new WebSocket(url);
    ws.onopen=()=>{isConnected=true;el.statusDot.classList.add('on');ws.send(JSON.stringify({type:'switch_model',model:el.modelSelector.value}));const u=localStorage.getItem('eris_username'),p=localStorage.getItem('eris_password');if(u&&p)ws.send(JSON.stringify({type:'login',username:u,password:p}));else showLogin(false)};
    ws.onmessage=e=>{
        const d=JSON.parse(e.data);
        if(d.type==='login_success')onLoginOK(d);
        else if(d.type==='login_failed'){el.loginError.textContent=d.reason||'Access denied.';el.loginBtn.textContent=authMode==='signup'?'Create Account':'Enter'}
        else if(d.type==='model_switched')showToast('Model → '+d.model);
        else if(d.type==='thinking'){showThinking();interact=1}
        else if(d.type==='response'){removeThinking();interact=1.5;appendMsg('eris',d.content);if(d.audio_base64&&ttsEnabled)playB64(d.audio_base64);else speakText(d.content)}
        else if(d.type==='error'){removeThinking();appendMsg('eris','⚠️ '+d.message)}
        else if(d.type==='chat_history'){chatSessions=d.sessions||[];renderChats()}
        else if(d.type==='chat_messages')loadMsgs(d.messages||[]);
        else if(d.type==='creator_feed'){
            const isDaemon=d.username==='[Daemon]';const t=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
            const div=document.createElement('div');div.className='message eris';div.style.maxWidth='90%';
            let f=d.eris_response.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
            if(isDaemon){div.innerHTML=`<div class="msg-time" style="text-align:left;color:var(--violet)">${t} — Research</div><div class="msg-bubble" style="border-left:2px solid var(--violet);padding-left:12px">${f}</div>`;el.researchFeed.appendChild(div);setTimeout(()=>{el.researchFeed.scrollTop=el.researchFeed.scrollHeight},50)}
            else{div.innerHTML=`<div class="msg-time" style="text-align:left;color:var(--violet)">${t} — ${d.username}</div><div class="msg-bubble"><strong>${d.username}:</strong> ${d.user_message.replace(/</g,'&lt;')}</div><div class="msg-bubble" style="border-left:2px solid var(--violet);padding-left:12px"><strong>Eris:</strong> ${f}</div>`;el.creatorFeed.appendChild(div);setTimeout(()=>{el.creatorFeed.scrollTop=el.creatorFeed.scrollHeight},50)}
            if(isCreator&&!el.creatorView.classList.contains('on'))showToast('New '+(isDaemon?'research':'activity from '+d.username));
        }
    };
    ws.onclose=()=>{isConnected=false;el.statusDot.classList.remove('on');setTimeout(connect,2000)};
}

function onLoginOK(d){
    const isRecon=isLoggedIn;isLoggedIn=true;personName=d.name;personId=d.person_id;isCreator=d.is_creator||false;
    const u=el.loginUser.value.trim(),p=el.loginPass.value;
    if(u&&p&&$('rememberMe').checked){localStorage.setItem('eris_username',u);localStorage.setItem('eris_password',p)}
    hideLogin();el.app.classList.add('on');
    el.sidebarAvatar.textContent=personName.charAt(0).toUpperCase();el.sidebarName.textContent=personName;el.sidebarStatus.textContent=isCreator?'Creator':'Online';
    el.inputArea.classList.remove('locked');el.input.disabled=false;el.input.placeholder='Speak to Eris...';el.welcomeLabel.textContent='Hello, '+personName;
    if(!isRecon){hasMessages=false;el.chatMsg.innerHTML='';el.welcome.classList.remove('gone');el.chatView.classList.remove('on');el.creatorView.classList.remove('on')}
    else if(currentSessionId&&ws&&isConnected)ws.send(JSON.stringify({type:'load_chat',session_id:currentSessionId}));
    if(isCreator){el.creatorPortalBtn.style.display='block';if(!isRecon)showToast('Welcome home, Creator ✨')}else el.creatorPortalBtn.style.display='none';
    if(ws&&isConnected)ws.send(JSON.stringify({type:'list_chats'}));
}
function showLogin(canClose){el.loginUser.value='';el.loginPass.value='';el.confirmPass.value='';el.loginError.textContent='';el.modalClose.classList.toggle('visible',canClose);el.modal.classList.add('show');setTimeout(()=>el.loginUser.focus(),100)}
function hideLogin(){el.modal.classList.remove('show')}

el.loginBtn.addEventListener('click',()=>{const u=el.loginUser.value.trim(),p=el.loginPass.value;if(!u||!p){el.loginError.textContent='Both fields required.';return}if(u.length<2){el.loginError.textContent='Username too short.';return}if(p.length<4){el.loginError.textContent='Password too short.';return}if(authMode==='signup'&&p!==el.confirmPass.value){el.loginError.textContent='Passwords do not match.';return}if(!ws||ws.readyState!==WebSocket.OPEN){el.loginError.textContent='Server waking up...';return}el.loginError.textContent='';el.loginBtn.textContent='Verifying...';ws.send(JSON.stringify({type:'login',username:u,password:p}))});
el.loginPass.addEventListener('keydown',e=>{if(e.key==='Enter'){authMode==='signup'?el.confirmPass.focus():el.loginBtn.click()}});
el.confirmPass.addEventListener('keydown',e=>{if(e.key==='Enter')el.loginBtn.click()});
el.loginUser.addEventListener('keydown',e=>{if(e.key==='Enter')el.loginPass.focus()});
el.modalClose.addEventListener('click',hideLogin);

el.userCard.addEventListener('click',()=>{if(!isLoggedIn){showLogin(false);return}el.userDropdown.classList.toggle('show')});
el.cancelDropdownBtn.addEventListener('click',()=>el.userDropdown.classList.remove('show'));
el.signOutBtn.addEventListener('click',()=>{
    el.userDropdown.classList.remove('show');localStorage.removeItem('eris_username');localStorage.removeItem('eris_password');
    isLoggedIn=false;personName='';personId='';isCreator=false;hasMessages=false;
    el.chatMsg.innerHTML='';el.welcome.classList.remove('gone');el.chatView.classList.remove('on');el.creatorView.classList.remove('on');
    el.sidebarAvatar.textContent='?';el.sidebarName.textContent='Not signed in';el.creatorPortalBtn.style.display='none';
    el.sidebarStatus.textContent='Click to sign in';el.inputArea.classList.add('locked');el.input.disabled=true;
    el.welcomeLabel.textContent='awaiting presence';el.chatList.innerHTML='';
    el.app.classList.remove('on');closeDrawer();showLogin(false);
});
document.addEventListener('click',e=>{if(!el.userDropdown.contains(e.target)&&!el.userCard.contains(e.target))el.userDropdown.classList.remove('show')});

function renderChats(){el.chatList.innerHTML='';for(const s of chatSessions){const d=document.createElement('div');d.className='dr-item'+(s.id===currentSessionId?' active':'');d.textContent=s.title||'New conversation';d.addEventListener('click',()=>loadChat(s.id));el.chatList.appendChild(d)}}
function loadChat(sid){currentSessionId=sid;renderChats();closeDrawer();el.creatorView.classList.remove('on');if(ws&&isConnected)ws.send(JSON.stringify({type:'load_chat',session_id:sid}))}
function loadMsgs(msgs){hasMessages=msgs.length>0;el.chatMsg.innerHTML='';if(hasMessages){el.welcome.classList.add('gone');el.chatView.classList.add('on');for(const m of msgs)appendMsg(m.role==='user'?'user':'eris',m.content,false)}else{el.welcome.classList.remove('gone');el.chatView.classList.remove('on')}}
el.newChatBtn.addEventListener('click',()=>{currentSessionId=null;hasMessages=false;el.chatMsg.innerHTML='';el.welcome.classList.remove('gone');el.chatView.classList.remove('on');el.creatorView.classList.remove('on');renderChats();if(ws&&isConnected)ws.send(JSON.stringify({type:'new_chat'}));closeDrawer()});

el.creatorPortalBtn.addEventListener('click',()=>{el.welcome.classList.add('gone');el.chatView.classList.remove('on');el.creatorView.classList.add('on');closeDrawer()});
const ct1=$('tabLiveFeed'),ct2=$('tabResearchFeed');
ct1.addEventListener('click',()=>{el.creatorFeed.style.display='block';el.researchFeed.style.display='none';ct1.classList.add('active');ct2.classList.remove('active')});
ct2.addEventListener('click',()=>{el.creatorFeed.style.display='none';el.researchFeed.style.display='block';ct2.classList.add('active');ct1.classList.remove('active')});

let attachedImageBase64=null;
$('attachBtn').addEventListener('click',()=>{if(isLoggedIn)$('fileInput').click()});
$('fileInput').addEventListener('change',function(){const f=this.files[0];if(f){const r=new FileReader();r.onload=e=>{attachedImageBase64=e.target.result.split(',')[1];$('imagePreview').src=e.target.result;$('imagePreviewContainer').style.display='block';updateInputState()};r.readAsDataURL(f)}});
$('removeImageBtn').addEventListener('click',()=>{attachedImageBase64=null;$('fileInput').value='';$('imagePreviewContainer').style.display='none';updateInputState()});

function updateInputState(){el.send.classList.toggle('active',(el.input.value.trim().length>0||attachedImageBase64)&&isConnected&&isLoggedIn)}
function sendMsg(isVoice=false){
    const v=el.input.value.trim();if((!v&&!attachedImageBase64)||!isConnected||!isLoggedIn)return;
    let mc=v;if(attachedImageBase64)mc+='<br><img src="data:image/jpeg;base64,'+attachedImageBase64+'" style="max-height:200px;border-radius:6px;margin-top:8px">';
    appendMsg('user',mc);
    const payload={type:'message',content:v,is_voice:isVoice};
    if(attachedImageBase64){payload.image_base64=attachedImageBase64;$('removeImageBtn').click()}
    ws.send(JSON.stringify(payload));el.input.value='';el.input.style.height='auto';updateInputState();interact=1;
}
el.send.addEventListener('click',()=>sendMsg(false));
el.input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg(false)}});

function appendMsg(sender,text,anim=true){
    if(!hasMessages){hasMessages=true;el.welcome.classList.add('gone');el.chatView.classList.add('on')}
    const div=document.createElement('div');div.className='message '+sender;if(!anim)div.style.animation='none';
    const t=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});

    // Extract skill tags BEFORE escaping
    let skills=[];
    text=text.replace(/<skill\s+name="([^"]+)">([\s\S]+?)<\/skill>/gi,(m,name,code)=>{skills.push({name,code});return'__SKILL_'+( skills.length-1)+'__'});

    let f=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    f=f.replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>');
    f=f.replace(/`([^`]+)`/g,'<code>$1</code>');
    f=f.replace(/\*\*([^\*]+)\*\*/g,'<strong>$1</strong>');

    const imgs=[];
    f=f.replace(/!\[IMAGE:(.+?)\]/g,(m,url)=>{imgs.push(url);return'__IMG_'+(imgs.length-1)+'__'});

    // Restore skill tags
    f=f.replace(/__SKILL_(\d+)__/g,(m,i)=>{
        const s=skills[i];const ec=s.code.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        return'<div style="border:1px solid rgba(255,107,0,.15);border-radius:10px;overflow:hidden;margin:12px 0;background:rgba(0,0,0,.4)"><div style="background:rgba(255,107,0,.06);padding:7px 12px;font-weight:bold;border-bottom:1px solid rgba(255,107,0,.1);color:var(--accent);display:flex;justify-content:space-between;align-items:center;font-size:12px"><span>🛠️ '+s.name+'</span><button onclick="const f=this.parentElement.nextElementSibling;f.style.height=f.style.height===\'500px\'?\'0\':\'500px\'" style="background:none;border:1px solid var(--accent);color:var(--accent);border-radius:4px;padding:2px 8px;cursor:pointer;font-size:.75rem">Toggle</button></div><iframe srcdoc="'+ec+'" style="width:100%;height:500px;border:none;background:#fff;transition:height .3s"></iframe></div>'});

    f=f.replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" style="color:var(--accent);text-decoration:underline">$1</a>');
    f=f.replace(/__IMG_(\d+)__/g,(m,i)=>'<img src="'+imgs[i]+'" style="max-height:300px;border-radius:8px;margin-top:8px">');
    f=f.split('\n\n').map(p=>'<p>'+p.replace(/\n/g,'<br>')+'</p>').join('');
    div.innerHTML='<div class="msg-bubble">'+f+'</div><div class="msg-time">'+t+'</div>';
    el.chatMsg.appendChild(div);scrollBot();
}
function showThinking(){if(isThinking)return;isThinking=true;const d=document.createElement('div');d.className='message eris';d.id='thinking';d.innerHTML='<div class="msg-bubble thinking-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';el.chatMsg.appendChild(d);scrollBot()}
function removeThinking(){isThinking=false;const e=$('thinking');if(e)e.remove()}
function scrollBot(){setTimeout(()=>{el.chatMsg.scrollTop=el.chatMsg.scrollHeight},50)}

let mediaRecorder=null,audioChunks=[],isRecording=false;
if(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia){el.micBtn.addEventListener('click',async()=>{if(!isLoggedIn)return;if(isRecording&&mediaRecorder)mediaRecorder.stop();else{try{const s=await navigator.mediaDevices.getUserMedia({audio:true});mediaRecorder=new MediaRecorder(s);audioChunks=[];mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);mediaRecorder.onstop=()=>{const b=new Blob(audioChunks,{type:'audio/webm'});const r=new FileReader();r.readAsDataURL(b);r.onloadend=()=>{appendMsg('user','🎙️ (Audio)');ws.send(JSON.stringify({type:'message',content:'',audio_base64:r.result.split(',')[1],is_voice:true}))};s.getTracks().forEach(t=>t.stop());stopRec()};mediaRecorder.start();isRecording=true;el.micBtn.classList.add('recording');el.input.placeholder='Recording...'}catch(e){showToast('Mic denied')}}})}else el.micBtn.style.display='none';
function stopRec(){isRecording=false;el.micBtn.classList.remove('recording');el.input.placeholder='Speak to Eris...'}

let ttsEnabled=localStorage.getItem('eris_tts')!=='off';
if(!ttsEnabled)el.muteBtn.style.color='var(--danger)';
el.muteBtn.addEventListener('click',()=>{ttsEnabled=!ttsEnabled;localStorage.setItem('eris_tts',ttsEnabled?'on':'off');if(!ttsEnabled){el.muteBtn.style.color='var(--danger)';if(currentAudio)currentAudio.pause();if('speechSynthesis'in window)speechSynthesis.cancel()}else el.muteBtn.style.color='var(--text-muted)'});
function speakText(t){if(!ttsEnabled||!('speechSynthesis'in window))return;let c=t.replace(/\*\*([^*]+)\*\*/g,'$1').replace(/\*([^*]+)\*/g,'$1').replace(/`[^`]+`/g,'').replace(/```[\s\S]*?```/g,'').replace(/[#>\-_]/g,'').trim();if(!c)return;if(currentAudio)currentAudio.pause();speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(c);u.rate=1;u.pitch=1.1;u.volume=.9;const v=speechSynthesis.getVoices();const pref=v.find(v=>v.name.includes('Female')||v.name.includes('Samantha')||v.name.includes('Zira'));if(pref)u.voice=pref;speechSynthesis.speak(u)}

<script>
// Background Music Mute Logic
const bgMuteBtn = document.getElementById('bgMuteBtn');
const bgMusic = document.getElementById('bgMusic');
let bgMuted = localStorage.getItem('bg_muted') === 'true';

function updateBgMuteIcon() {
    if (bgMuted) {
        bgMuteBtn.style.color = 'var(--danger)';
        bgMuteBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="1" y1="1" x2="23" y2="23"></line><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>';
    } else {
        bgMuteBtn.style.color = 'var(--text-muted)';
        bgMuteBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>';
    }
}

bgMusic.muted = bgMuted;
updateBgMuteIcon();

bgMuteBtn.addEventListener('click', () => {
    bgMuted = !bgMuted;
    bgMusic.muted = bgMuted;
    localStorage.setItem('bg_muted', bgMuted);
    updateBgMuteIcon();
});

// Fallback Web Audio API Space Drone
let audioCtx;
let dronePlaying = false;

function startSpaceDrone() {
    if (dronePlaying) return;
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if (!AudioContext) return;
    audioCtx = new AudioContext();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    dronePlaying = true;
    
    const masterGain = audioCtx.createGain();
    masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
    masterGain.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 5);
    masterGain.connect(audioCtx.destination);
    
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(600, audioCtx.currentTime);
    filter.Q.setValueAtTime(1, audioCtx.currentTime);
    filter.connect(masterGain);
    
    const lfo = audioCtx.createOscillator();
    lfo.type = 'sine';
    lfo.frequency.setValueAtTime(0.05, audioCtx.currentTime);
    const lfoGain = audioCtx.createGain();
    lfoGain.gain.setValueAtTime(400, audioCtx.currentTime);
    lfo.connect(lfoGain);
    lfoGain.connect(filter.frequency);
    lfo.start();
    
    const osc1 = audioCtx.createOscillator();
    osc1.type = 'sawtooth';
    osc1.frequency.setValueAtTime(146.83, audioCtx.currentTime);
    const osc2 = audioCtx.createOscillator();
    osc2.type = 'sawtooth';
    osc2.frequency.setValueAtTime(219.5, audioCtx.currentTime);
    const osc3 = audioCtx.createOscillator();
    osc3.type = 'sine';
    osc3.frequency.setValueAtTime(73.42, audioCtx.currentTime);
    const osc4 = audioCtx.createOscillator();
    osc4.type = 'sine';
    osc4.frequency.setValueAtTime(880.00, audioCtx.currentTime);
    
    const shimmerGain = audioCtx.createGain();
    shimmerGain.gain.setValueAtTime(0.05, audioCtx.currentTime);
    osc4.connect(shimmerGain);
    shimmerGain.connect(masterGain);
    
    osc1.connect(filter);
    osc2.connect(filter);
    osc3.connect(filter);
    
    osc1.start();
    osc2.start();
    osc3.start();
    osc4.start();
    console.log('Fallback: Web Audio API Space Drone initialized.');
}

// Custom Local Soundtrack Logic
let bgAudio = document.getElementById('bgMusic');
bgAudio.volume = 0.2;
let musicStarted = false;
let fallbackActive = false;

bgAudio.addEventListener('error', () => {
    fallbackActive = true;
});

function tryPlayMusic() {
    if(!musicStarted) {
        if (fallbackActive) {
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            else if (!dronePlaying) startSpaceDrone();
            musicStarted = true;
        } else {
            bgAudio.play().then(() => {
                musicStarted = true;
                console.log('Custom local background music started playing.');
            }).catch(e => {
                console.log('Audio missing or blocked, falling back to synth', e);
                fallbackActive = true;
                if (!dronePlaying) startSpaceDrone();
                musicStarted = true;
            });
        }
    } else {
        if (fallbackActive && audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    }
}

window.addEventListener('click', tryPlayMusic);
window.addEventListener('keydown', tryPlayMusic);
</script>
