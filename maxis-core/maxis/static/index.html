<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAXIS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a12;
            --bg-primary: rgba(10, 10, 18, 0.80);
            --bg-surface: rgba(16, 16, 28, 0.65);
            --bg-elevated: rgba(20, 20, 35, 0.85);
            --text-primary: #f0f0f5;
            --text-secondary: #a0a0b8;
            --text-muted: #656578;
            --accent: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.4);
            --accent-secondary: #06b6d4;
            --border: rgba(255, 255, 255, 0.04);
            --border-light: rgba(255, 255, 255, 0.08);
            --success: #10b981;
            --error: #ef4444;
            --radius: 28px;
            --radius-sm: 16px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            color: var(--text-primary);
            height: 100vh; display: flex; overflow: hidden;
            -webkit-font-smoothing: antialiased;
            background: var(--bg-deep);
        }

        /* ── Animated Aurora Background ───────────────────────── */
        .aurora-bg {
            position: fixed; inset: 0; z-index: 0; overflow: hidden;
            background: linear-gradient(180deg, #070714 0%, #0c0c1d 40%, #0d1117 100%);
        }
        .aurora-bg .orb {
            position: absolute; border-radius: 50%;
            filter: blur(120px); opacity: 0.4;
            animation: aurora-drift 20s infinite ease-in-out alternate;
        }
        .aurora-bg .orb:nth-child(1) {
            width: 600px; height: 600px; top: -200px; left: -100px;
            background: radial-gradient(circle, #6e3adb 0%, transparent 70%);
            animation-duration: 25s;
        }
        .aurora-bg .orb:nth-child(2) {
            width: 500px; height: 500px; top: 30%; right: -150px;
            background: radial-gradient(circle, #0ea5e9 0%, transparent 70%);
            animation-duration: 30s; animation-delay: -5s;
        }
        .aurora-bg .orb:nth-child(3) {
            width: 700px; height: 700px; bottom: -250px; left: 30%;
            background: radial-gradient(circle, #7c3aed 0%, #0f766e 60%, transparent 70%);
            animation-duration: 35s; animation-delay: -10s;
        }
        .aurora-bg .orb:nth-child(4) {
            width: 400px; height: 400px; top: 60%; left: 10%;
            background: radial-gradient(circle, #06b6d4 0%, transparent 70%);
            animation-duration: 22s; animation-delay: -15s; opacity: 0.25;
        }
        @keyframes aurora-drift {
            0%   { transform: translate(0, 0) scale(1); }
            33%  { transform: translate(40px, -30px) scale(1.1); }
            66%  { transform: translate(-20px, 20px) scale(0.95); }
            100% { transform: translate(30px, -10px) scale(1.05); }
        }
        /* Stars */
        .stars {
            position: absolute; inset: 0;
            background-image:
                radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
                radial-gradient(1px 1px at 30% 70%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 70% 50%, rgba(255,255,255,0.6) 0%, transparent 100%),
                radial-gradient(1px 1px at 90% 30%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1px 1px at 15% 85%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 80% 80%, rgba(255,255,255,0.7) 0%, transparent 100%),
                radial-gradient(1px 1px at 40% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
                radial-gradient(1px 1px at 60% 90%, rgba(255,255,255,0.3) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 25% 55%, rgba(255,255,255,0.5) 0%, transparent 100%);
            animation: twinkle 8s infinite ease-in-out alternate;
        }
        @keyframes twinkle { 0% { opacity: 0.7; } 100% { opacity: 1; } }

        /* ── Sidebar ──────────────────────────────────────────── */
        .sidebar {
            width: 64px; background: var(--bg-primary);
            backdrop-filter: blur(24px); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center;
            padding: 20px 0; gap: 8px; z-index: 10;
        }
        .sidebar-logo {
            width: 40px; height: 40px; border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            display: flex; align-items: center; justify-content: center;
            font-weight: 600; font-size: 16px; color: white;
            margin-bottom: 24px; box-shadow: 0 0 24px var(--accent-glow);
        }
        .sidebar-btn {
            width: 44px; height: 44px; border-radius: 12px;
            background: transparent; border: none;
            color: var(--text-muted); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .sidebar-btn:hover { color: var(--text-primary); background: var(--bg-surface); transform: scale(1.05); }
        .sidebar-btn.active { color: var(--accent); background: rgba(139, 92, 246, 0.1); }
        .sidebar-btn svg { width: 22px; height: 22px; }
        .sidebar-spacer { flex: 1; }
        .user-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background: var(--bg-surface); border: 1px solid var(--border-light);
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 500; color: var(--text-primary);
            cursor: pointer; margin-bottom: 12px; transition: all 0.2s;
        }
        .user-avatar:hover { border-color: var(--accent); }

        /* ── Main Area ────────────────────────────────────────── */
        .main {
            flex: 1; display: flex; flex-direction: column;
            position: relative; z-index: 2; overflow: hidden;
        }
        .topbar {
            display: flex; align-items: center; justify-content: flex-end;
            padding: 16px 32px; z-index: 2; gap: 12px;
        }
        .model-selector {
            padding: 6px 14px; border-radius: 20px; font-size: 12px;
            background: rgba(0,0,0,0.3); border: 1px solid var(--border-light);
            backdrop-filter: blur(10px); color: var(--text-secondary);
            cursor: pointer; font-family: inherit; outline: none;
            transition: all 0.3s; -webkit-appearance: none;
        }
        .model-selector:hover { border-color: var(--accent); color: var(--text-primary); }
        .model-selector option { background: #1a1a2e; color: #f0f0f5; }
        .emotional-pill {
            padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 500;
            background: rgba(255,255,255,0.03); border: 1px solid var(--border-light);
            backdrop-filter: blur(10px); color: var(--accent-secondary);
            letter-spacing: 0.5px; text-transform: uppercase;
            display: flex; align-items: center; gap: 6px;
        }
        .emotional-pill::before {
            content: ''; width: 6px; height: 6px; border-radius: 50%;
            background: var(--accent-secondary); box-shadow: 0 0 8px var(--accent-secondary);
        }
        .user-label {
            padding: 6px 14px; border-radius: 20px; font-size: 12px;
            background: rgba(139,92,246,0.1); border: 1px solid rgba(139,92,246,0.2);
            color: var(--accent); font-weight: 500; letter-spacing: 0.3px;
        }

        /* ── Welcome Screen ───────────────────────────────────── */
        .welcome-screen {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 24px; padding-bottom: 15vh;
            transition: opacity 0.5s, transform 0.5s;
        }
        .welcome-screen.hidden {
            opacity: 0; transform: translateY(-20px);
            pointer-events: none; position: absolute; inset: 0;
        }
        .greeting { font-size: 42px; font-weight: 300; text-align: center; line-height: 1.2; }
        .greeting span { background: linear-gradient(135deg, var(--text-primary), var(--text-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .greeting .name { background: linear-gradient(135deg, var(--accent), var(--accent-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 500; }

        /* ── Chat View ────────────────────────────────────────── */
        .chat-view { flex: 1; display: none; flex-direction: column; overflow: hidden; }
        .chat-view.active { display: flex; }
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 24px 32px;
            display: flex; flex-direction: column; gap: 24px;
            scroll-behavior: smooth; max-width: 800px; width: 100%; margin: 0 auto;
        }
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        .message { display: flex; flex-direction: column; animation: msg-in 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(10px); }
        @keyframes msg-in { to { opacity: 1; transform: translateY(0); } }
        .message.user { align-items: flex-end; }
        .message.maxis { align-items: flex-start; }
        .msg-bubble {
            max-width: 85%; padding: 16px 20px; line-height: 1.6; font-size: 15px;
            border-radius: var(--radius-sm); word-wrap: break-word; white-space: pre-wrap;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15); backdrop-filter: blur(10px);
        }
        .message.maxis .msg-bubble { background: var(--bg-surface); border: 1px solid var(--border-light); border-top-left-radius: 4px; }
        .message.user .msg-bubble { background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.3); border-top-right-radius: 4px; }
        .msg-time { font-size: 11px; color: var(--text-muted); margin-top: 6px; padding: 0 4px; }

        /* ── Input Area ───────────────────────────────────────── */
        .input-area {
            padding: 0 32px 32px; display: flex; justify-content: center;
            background: linear-gradient(to top, rgba(5,5,12,0.85) 60%, transparent); z-index: 10;
        }
        .input-pill {
            display: flex; align-items: flex-end; gap: 12px;
            background: rgba(16,16,28,0.85); backdrop-filter: blur(24px);
            border: 1px solid var(--border-light); border-radius: var(--radius);
            padding: 10px 10px 10px 24px; max-width: 760px; width: 100%;
            transition: all 0.3s; box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .input-pill:focus-within { border-color: var(--accent); box-shadow: 0 10px 40px var(--accent-glow); background: rgba(20,20,35,0.92); }
        .input-pill textarea {
            flex: 1; background: none; border: none; color: var(--text-primary);
            font-family: inherit; font-size: 15px; resize: none;
            min-height: 24px; max-height: 150px; line-height: 1.5;
            outline: none; padding: 12px 0; margin-bottom: 2px;
        }
        .input-pill textarea::placeholder { color: var(--text-muted); }
        .send-btn {
            width: 44px; height: 44px; border-radius: 50%;
            background: var(--bg-surface); border: 1px solid var(--border-light);
            color: var(--text-muted); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s; flex-shrink: 0;
        }
        .send-btn.active { background: var(--accent); border-color: var(--accent); color: white; box-shadow: 0 0 15px var(--accent-glow); }
        .send-btn.active:hover { transform: scale(1.05); }
        .send-btn svg { width: 20px; height: 20px; }
        .mic-btn {
            width: 44px; height: 44px; border-radius: 50%;
            background: transparent; border: 1px solid transparent;
            color: var(--text-muted); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s; flex-shrink: 0;
        }
        .mic-btn:hover { color: var(--text-primary); }
        .mic-btn.recording { color: #ef4444; background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
            70% { box-shadow: 0 0 0 10px rgba(239,68,68,0); }
            100% { box-shadow: 0 0 0 0 rgba(239,68,68,0); }
        }

        /* ── Login Modal ──────────────────────────────────────── */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.75);
            backdrop-filter: blur(24px); display: flex; align-items: center; justify-content: center;
            z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }
        .modal {
            background: rgba(14,14,26,0.95); border: 1px solid var(--border-light);
            border-radius: 24px; padding: 40px; max-width: 420px; width: 90%;
            transform: translateY(20px) scale(0.95);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            position: relative;
        }
        .modal-overlay.show .modal { transform: translateY(0) scale(1); }
        .modal-close {
            position: absolute; top: 16px; right: 16px;
            width: 32px; height: 32px; border-radius: 50%;
            background: rgba(255,255,255,0.05); border: 1px solid var(--border-light);
            color: var(--text-muted); cursor: pointer;
            display: none; align-items: center; justify-content: center;
            font-size: 18px; transition: all 0.2s;
        }
        .modal-close:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }
        .modal-close.visible { display: flex; }
        .modal h2 { font-size: 24px; font-weight: 500; margin-bottom: 8px; }
        .modal p { color: var(--text-secondary); font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
        .modal input {
            width: 100%; padding: 16px 20px;
            background: rgba(0,0,0,0.3); border: 1px solid var(--border-light);
            border-radius: 16px; color: white; font-family: inherit; font-size: 16px;
            outline: none; margin-bottom: 14px; transition: all 0.3s;
        }
        .modal input:focus { border-color: var(--accent); background: rgba(0,0,0,0.5); }
        .modal-actions { display: flex; flex-direction: column; gap: 10px; }
        .btn-primary {
            width: 100%; padding: 16px;
            background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
            border: none; border-radius: 16px; color: white;
            font-family: inherit; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-secondary {
            width: 100%; padding: 14px;
            background: transparent; border: 1px solid var(--border-light);
            border-radius: 16px; color: var(--text-secondary);
            font-family: inherit; font-size: 14px; cursor: pointer;
            transition: all 0.2s;
        }
        .btn-secondary:hover { border-color: var(--accent); color: var(--text-primary); }
        .login-error { color: var(--error); font-size: 13px; text-align: center; margin-bottom: 14px; min-height: 20px; }

        /* ── Thinking dots ────────────────────────────────────── */
        .thinking-dots { display: flex; gap: 6px; padding: 18px 24px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-secondary); animation: bounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        /* ── Markdown ─────────────────────────────────────────── */
        .msg-bubble code { background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 13px; }
        .msg-bubble pre { background: rgba(0,0,0,0.4); padding: 16px; border-radius: 12px; overflow-x: auto; margin: 12px 0; border: 1px solid var(--border-light); }
        .msg-bubble p { margin-bottom: 8px; }
        .msg-bubble p:last-child { margin-bottom: 0; }

        /* ── Toast ─────────────────────────────────────────────── */
        .toast {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: var(--bg-elevated); border: 1px solid var(--accent);
            padding: 10px 24px; border-radius: 12px; font-size: 13px;
            color: var(--accent); z-index: 200; opacity: 0;
            transition: all 0.3s; pointer-events: none;
            box-shadow: 0 8px 30px rgba(139,92,246,0.2);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ── Locked state (not logged in) ─────────────────────── */
        .input-area.locked { opacity: 0.4; pointer-events: none; }
    </style>
</head>
<body>
    <!-- Animated Aurora Background -->
    <div class="aurora-bg">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="stars"></div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="sidebar-logo">M</div>
        <button class="sidebar-btn active" title="Chat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></button>
        <button class="sidebar-btn" id="voiceToggleBtn" title="Voice Output: ON">
            <svg id="voiceIconOn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
            <svg id="voiceIconOff" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>
        </button>
        <div class="sidebar-spacer"></div>
        <div class="user-avatar" id="switchUserBtn" title="Log out / Switch User">?</div>
    </nav>

    <!-- Main -->
    <div class="main">
        <div class="topbar">
            <select class="model-selector" id="modelSelector" title="Switch AI Model">
                <option value="gemini-2.5-flash">⚡ 2.5 Flash</option>
                <option value="gemini-3.5-flash">🧠 3.5 Flash</option>
            </select>
            <span class="user-label" id="userLabel" style="display:none;"></span>
            <div class="emotional-pill" id="emotionalBadge">OFFLINE</div>
        </div>

        <div class="welcome-screen" id="welcomeScreen">
            <div class="greeting" id="greetingText">Hello, <span class="name">Traveler</span><br><span>What's the plan?</span></div>
        </div>

        <div class="chat-view" id="chatView">
            <div class="chat-messages" id="chatMessages"></div>
        </div>

        <div class="input-area locked" id="inputArea">
            <div class="input-pill">
                <button class="mic-btn" id="micBtn" title="Click to speak">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>
                </button>
                <textarea id="messageInput" placeholder="Log in to talk to Maxis..." rows="1" disabled></textarea>
                <button class="send-btn" id="sendBtn">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal">
            <button class="modal-close" id="modalClose">&times;</button>
            <h2 id="modalTitle">Welcome to MAXIS</h2>
            <p id="modalDesc">Log in or register a new account.</p>
            <input type="text" id="loginUsername" placeholder="Username" autocomplete="off">
            <input type="password" id="loginPassword" placeholder="Password" autocomplete="off">
            <div class="login-error" id="loginError"></div>
            <div class="modal-actions">
                <button class="btn-primary" id="loginBtn">Log In / Register</button>
                <button class="btn-secondary" id="guestCloseBtn" style="display:none;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let ws = null, isConnected = false, isThinking = false;
        let personName = '', personId = '', hasMessages = false, isLoggedIn = false;

        const $ = id => document.getElementById(id);
        const el = {
            chatMsg: $('chatMessages'), input: $('messageInput'), send: $('sendBtn'),
            welcome: $('welcomeScreen'), chatView: $('chatView'), greeting: $('greetingText'),
            modal: $('loginModal'), loginUser: $('loginUsername'), loginPass: $('loginPassword'),
            loginBtn: $('loginBtn'), loginError: $('loginError'), badge: $('emotionalBadge'),
            switchBtn: $('switchUserBtn'), micBtn: $('micBtn'), inputArea: $('inputArea'),
            voiceToggleBtn: $('voiceToggleBtn'), voiceIconOn: $('voiceIconOn'), voiceIconOff: $('voiceIconOff'),
            modelSelector: $('modelSelector'), toast: $('toast'), userLabel: $('userLabel'),
            modalClose: $('modalClose'), guestCloseBtn: $('guestCloseBtn'),
            modalTitle: $('modalTitle'), modalDesc: $('modalDesc'),
        };

        // ── Toast ─────────────────────────────────────────────
        function showToast(msg) {
            el.toast.textContent = msg; el.toast.classList.add('show');
            setTimeout(() => el.toast.classList.remove('show'), 2500);
        }

        // ── Model Switcher ────────────────────────────────────
        const savedModel = localStorage.getItem('maxis_model');
        if (savedModel) el.modelSelector.value = savedModel;

        el.modelSelector.addEventListener('change', () => {
            const model = el.modelSelector.value;
            localStorage.setItem('maxis_model', model);
            if (ws && isConnected) ws.send(JSON.stringify({ type: 'switch_model', model }));
        });

        // ── WebSocket ─────────────────────────────────────────
        function connect() {
            const url = `${location.protocol === 'https:' ? 'wss:' : 'ws:'}//${location.host}/ws/chat`;
            ws = new WebSocket(url);

            ws.onopen = () => {
                isConnected = true;
                el.badge.textContent = 'CONNECTED';

                // Send model preference
                ws.send(JSON.stringify({ type: 'switch_model', model: el.modelSelector.value }));

                // Try auto-login
                const savedUser = localStorage.getItem('maxis_username');
                const savedPass = localStorage.getItem('maxis_session_token');
                if (savedUser && savedPass) {
                    ws.send(JSON.stringify({ type: 'login', username: savedUser, password: savedPass }));
                } else {
                    showLoginModal(false); // First visit — must log in
                }
            };

            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);

                if (data.type === 'status') {
                    if (data.data?.emotional_state) el.badge.textContent = data.data.emotional_state;

                } else if (data.type === 'login_success') {
                    onLoginSuccess(data);

                } else if (data.type === 'login_failed') {
                    el.loginError.textContent = data.reason || 'Login failed.';

                } else if (data.type === 'model_switched') {
                    showToast(`Model → ${data.model}`);

                } else if (data.type === 'thinking') {
                    showThinking();

                } else if (data.type === 'response') {
                    removeThinking();
                    appendMessage('maxis', data.content);
                    if (data.emotional_state) el.badge.textContent = data.emotional_state;
                    speakResponse(data.content);

                } else if (data.type === 'error') {
                    removeThinking();
                    appendMessage('maxis', `⚠️ ${data.message}`);
                }
            };

            ws.onclose = () => {
                isConnected = false;
                el.badge.textContent = 'OFFLINE';
                updateInputState();
                setTimeout(connect, 2000);
            };
        }

        // ── Login Success ─────────────────────────────────────
        function onLoginSuccess(data) {
            isLoggedIn = true;
            personName = data.name;
            personId = data.person_id;

            // Save session
            if (el.loginUser.value) localStorage.setItem('maxis_username', el.loginUser.value);
            if (el.loginPass.value) localStorage.setItem('maxis_session_token', el.loginPass.value);

            // Update UI
            hideLoginModal();
            el.switchBtn.textContent = personName.charAt(0).toUpperCase();
            el.userLabel.textContent = personName;
            el.userLabel.style.display = 'inline';
            el.inputArea.classList.remove('locked');
            el.input.disabled = false;
            el.input.placeholder = 'Talk to Maxis...';
            updateGreeting();
            updateInputState();

            // Clear chat for this session
            hasMessages = false;
            el.chatMsg.innerHTML = '';
            el.welcome.classList.remove('hidden');
            el.chatView.classList.remove('active');

            if (data.is_creator) {
                showToast('Welcome home, Creator ✨');
            }
        }

        // ── Login Modal ───────────────────────────────────────
        function showLoginModal(canClose) {
            el.modalTitle.textContent = canClose ? 'Switch User' : 'Welcome to MAXIS';
            el.modalDesc.textContent = canClose
                ? 'Log in as a different user.'
                : 'Log in or create a new account to start chatting.';
            el.loginUser.value = ''; el.loginPass.value = '';
            el.loginError.textContent = '';
            el.modalClose.classList.toggle('visible', canClose);
            el.guestCloseBtn.style.display = canClose ? 'block' : 'none';
            el.modal.classList.add('show');
            setTimeout(() => el.loginUser.focus(), 100);
        }

        function hideLoginModal() { el.modal.classList.remove('show'); }

        el.loginBtn.addEventListener('click', () => {
            const username = el.loginUser.value.trim();
            const password = el.loginPass.value;
            if (!username || !password) { el.loginError.textContent = 'Both fields are required.'; return; }
            if (username.length < 2) { el.loginError.textContent = 'Username must be at least 2 characters.'; return; }
            if (password.length < 4) { el.loginError.textContent = 'Password must be at least 4 characters.'; return; }
            el.loginError.textContent = '';
            ws.send(JSON.stringify({ type: 'login', username, password }));
        });

        el.loginPass.addEventListener('keydown', e => { if (e.key === 'Enter') el.loginBtn.click(); });
        el.loginUser.addEventListener('keydown', e => { if (e.key === 'Enter') el.loginPass.focus(); });

        // Close button (only visible when switching users, not on first login)
        el.modalClose.addEventListener('click', hideLoginModal);
        el.guestCloseBtn.addEventListener('click', hideLoginModal);

        // Switch User (logout)
        el.switchBtn.addEventListener('click', () => {
            if (!isLoggedIn) {
                showLoginModal(false);
                return;
            }
            // Log out current user
            localStorage.removeItem('maxis_username');
            localStorage.removeItem('maxis_session_token');
            isLoggedIn = false; personName = ''; personId = '';
            hasMessages = false;
            el.chatMsg.innerHTML = '';
            el.welcome.classList.remove('hidden');
            el.chatView.classList.remove('active');
            el.switchBtn.textContent = '?';
            el.userLabel.style.display = 'none';
            el.inputArea.classList.add('locked');
            el.input.disabled = true;
            el.input.placeholder = 'Log in to talk to Maxis...';
            showLoginModal(false);
        });

        function updateGreeting() {
            if (!personName) return;
            const hr = new Date().getHours();
            const t = hr < 12 ? 'Good morning' : hr < 17 ? 'Good afternoon' : 'Good evening';
            el.greeting.innerHTML = `${t}, <span class="name">${personName}</span><br><span>What's the plan?</span>`;
        }

        function updateInputState() {
            const val = el.input.value.trim();
            el.send.classList.toggle('active', val.length > 0 && isConnected && isLoggedIn);
        }

        function sendMsg(isVoice = false) {
            const val = el.input.value.trim();
            if (!val || !isConnected || !isLoggedIn) return;
            appendMessage('user', val);
            ws.send(JSON.stringify({ type: 'message', content: val, is_voice: isVoice }));
            el.input.value = ''; el.input.style.height = 'auto'; updateInputState();
        }

        el.send.addEventListener('click', () => sendMsg());
        el.input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } });
        el.input.addEventListener('input', () => {
            el.input.style.height = 'auto';
            el.input.style.height = Math.min(el.input.scrollHeight, 150) + 'px';
            updateInputState();
        });

        function appendMessage(sender, text) {
            if (!hasMessages) { hasMessages = true; el.welcome.classList.add('hidden'); el.chatView.classList.add('active'); }
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            const t = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            let fmt = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            fmt = fmt.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
            fmt = fmt.replace(/`([^`]+)`/g, '<code>$1</code>');
            fmt = fmt.replace(/\*\*([^\*]+)\*\*/g, '<strong>$1</strong>');
            fmt = fmt.split('\n\n').map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
            div.innerHTML = `<div class="msg-bubble">${fmt}</div><div class="msg-time">${t}</div>`;
            el.chatMsg.appendChild(div); scrollToBottom();
        }

        function showThinking() {
            if (isThinking) return; isThinking = true;
            const div = document.createElement('div');
            div.className = 'message maxis'; div.id = 'thinking';
            div.innerHTML = `<div class="msg-bubble thinking-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
            el.chatMsg.appendChild(div); scrollToBottom();
        }
        function removeThinking() { isThinking = false; const e = document.getElementById('thinking'); if (e) e.remove(); }
        function scrollToBottom() { setTimeout(() => { el.chatMsg.scrollTop = el.chatMsg.scrollHeight; }, 50); }

        // ── Voice ─────────────────────────────────────────────
        let voiceEnabled = true;
        el.voiceToggleBtn.addEventListener('click', () => {
            voiceEnabled = !voiceEnabled;
            el.voiceIconOn.style.display = voiceEnabled ? 'block' : 'none';
            el.voiceIconOff.style.display = voiceEnabled ? 'none' : 'block';
            el.voiceToggleBtn.title = voiceEnabled ? "Voice Output: ON" : "Voice Output: OFF";
            if (!voiceEnabled) window.speechSynthesis.cancel();
        });

        function stripMd(t) {
            return t.replace(/\*([^\*]+)\*/g,'$1').replace(/_([^_]+)_/g,'$1')
                .replace(/\*\*/g,'').replace(/```[\s\S]*?```/g,' ').replace(/`[^`]+`/g,' ').replace(/#/g,'').trim();
        }
        function speakResponse(text) {
            if (!voiceEnabled || !window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const c = stripMd(text); if (!c) return;
            const u = new SpeechSynthesisUtterance(c);
            u.rate = 1.05; u.pitch = 1.0;
            const voices = window.speechSynthesis.getVoices();
            let v = voices.find(v=>v.name.includes('Google UK English Female')) ||
                    voices.find(v=>v.name.includes('Microsoft Hazel')) ||
                    voices.find(v=>v.name.includes('Samantha')&&v.lang.includes('en')) ||
                    voices.find(v=>v.lang==='en-GB'||v.lang==='en-US');
            if (v) u.voice = v;
            window.speechSynthesis.speak(u);
        }
        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };

        // ── Speech Recognition ────────────────────────────────
        let recognition = null, isRecording = false;
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SR();
            recognition.continuous = false; recognition.interimResults = false; recognition.lang = 'en-US';
            recognition.onstart = () => { isRecording = true; el.micBtn.classList.add('recording'); el.input.placeholder = "Listening..."; window.speechSynthesis.cancel(); };
            recognition.onresult = (e) => { el.input.value = e.results[0][0].transcript; updateInputState(); sendMsg(true); };
            recognition.onerror = () => stopRecording();
            recognition.onend = () => stopRecording();
        } else { el.micBtn.style.display = 'none'; }

        function toggleRecording() { if (!recognition || !isLoggedIn) return; isRecording ? recognition.stop() : recognition.start(); }
        function stopRecording() { isRecording = false; el.micBtn.classList.remove('recording'); el.input.placeholder = "Talk to Maxis..."; }
        el.micBtn.addEventListener('click', toggleRecording);

        connect();
    </script>
</body>
</html>
